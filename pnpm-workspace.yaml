packages:
  - "packages/*"
  - "packages/e2e/agents/mock"
  - "packages/e2e/agents/mock-api"
  - "packages/e2e/playwright"
  - "packages/agents/pi-agent/workspace/.pi/agent/extensions/*"
minimumReleaseAge: 10080 # 7 days (in minutes)
trustPolicy: no-downgrade
trustPolicyExclude:
  # rollup@2.80.0 is pinned by transitive deps still on the v2 line while
  # the rest of the tree is on v4.60.1. pnpm's `no-downgrade` policy flags
  # it because v2 predates the trust signals (OIDC provenance, trusted
  # publisher) added to v4. Same upstream (rollup team), no open security
  # advisories at the time of exclusion; only a publisher-side signal
  # regression. Transitive-only, not a direct dep.
  - "rollup@2.80.0"
  # semver@6.3.1 is the legacy semver-v6 line pulled in by transitive deps
  # that haven't moved to v7 yet. Same upstream as semver@7.7.4 in the
  # tree (npm core team), no open advisories at the time of exclusion;
  # `no-downgrade` flagged it for the same publisher-side trust delta as
  # rollup@2.80.0. Transitive-only.
  - "semver@6.3.1"
  # chokidar dropped OIDC provenance for 4.0.2/4.0.3 (Dec 2024) — same
  # maintainer (paulmillr), GitHub tag matches, restored in 5.0.0 via
  # `trustedPublisher: github`. Benign publisher-side workflow change.
  - "chokidar@4.0.3"
  # tinyexec@1.2.2 downgraded from trusted-publisher (1.1.1) to provenance-
  # attestation. Same upstream (tinylibs), no open advisories. Pulled in
  # transitively by vitest. Only surfaces in `pnpm deploy --legacy` paths
  # (platform-base Dockerfile) because legacy deploy bypasses the lockfile
  # and re-resolves to latest. Normal pnpm install pins 1.1.1 via the
  # lockfile and is unaffected.
  - "tinyexec@1.2.2"
  # @mariozechner/clipboard 0.3.6 (2026-05-16) dropped OIDC provenance that
  # 0.3.0–0.3.5 had — same upstream (mariozechner), benign publisher-side
  # workflow change. Pulled in transitively by @earendil-works/pi-coding-agent
  # via the pi-dynamic-providers extension; the platform-specific subpackages
  # below ride the same version. Re-evaluate when clipboard restores
  # provenance.
  - "@mariozechner/clipboard@0.3.6"
  - "@mariozechner/clipboard-darwin-arm64@0.3.6"
  - "@mariozechner/clipboard-darwin-x64@0.3.6"
  - "@mariozechner/clipboard-darwin-universal@0.3.6"
  - "@mariozechner/clipboard-linux-arm64-gnu@0.3.6"
  - "@mariozechner/clipboard-linux-arm64-musl@0.3.6"
  - "@mariozechner/clipboard-linux-riscv64-gnu@0.3.6"
  - "@mariozechner/clipboard-linux-x64-gnu@0.3.6"
  - "@mariozechner/clipboard-linux-x64-musl@0.3.6"
  - "@mariozechner/clipboard-win32-arm64-msvc@0.3.6"
  - "@mariozechner/clipboard-win32-x64-msvc@0.3.6"
minimumReleaseAgeExclude:
  # CVE-2026-45736 security fix — released 2026-05-12, inside the 7-day window
  - "ws@8.20.1"
  # Pinned in the pi-agent workspace mise config and the pi-dynamic-providers
  # extension to keep the extension's types aligned with the runtime fork that
  # actually loads against them (issue #375). The fork ships its core/ai/tui
  # packages at the same version; bump all four together with the mise
  # config. Safe to drop from this list once the chosen version ages past 7 days.
  - "@earendil-works/pi-coding-agent@0.79.1"
  - "@earendil-works/pi-agent-core@0.79.1"
  - "@earendil-works/pi-ai@0.79.1"
  - "@earendil-works/pi-tui@0.79.1"
allowBuilds:
  # grpc-tools downloads the protoc binary in a postinstall step; needed
  # by `mise run api-server:gen:proto` (ts-proto codegen for ext_authz).
  grpc-tools: true
  koffi: true
  protobufjs: true
  sharp: true
  # esbuild's postinstall extracts the per-platform native binary; without
  # it, vite/tsup/vitest fail to start. pnpm 10 errors on un-approved build
  # scripts even when `--frozen-lockfile`, so we have to list it.
  esbuild: true
