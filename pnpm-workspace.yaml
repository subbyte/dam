packages:
  - "packages/*"
  - "packages/agents/pi-agent/workspace/.pi/agent/extensions/*"
minimumReleaseAge: 10080 # 7 days (in minutes)
trustPolicy: no-downgrade
allowBuilds:
  # grpc-tools downloads the protoc binary in a postinstall step; needed
  # by `mise run api-server:gen:proto` (ts-proto codegen for ext_authz).
  grpc-tools: true
  koffi: true
  protobufjs: true
  sharp: true
  # esbuild's postinstall extracts the per-platform native binary; without
  # it, vite/tsup/vitest fail to start. pnpm 10 errors on un-approved build
  # scripts even when `--frozen-lockfile`, so we have to list it.
  esbuild: true
