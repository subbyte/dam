[tools]
nodejs = "24"

# Go
go = "1.25"
"go:honnef.co/go/tools/cmd/staticcheck" = "latest"
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"

# Java + Maven — required by keycloakify to package the theme JAR (packages/keycloak-theme)
java = "21"
maven = "latest"

# Kubernetes
helm = "latest"
kubeconform = "latest"
"lima" = "2"

# Security scanning
"zizmor" = "latest"

# misc
fd = "latest"
yq = "latest"
gum = "latest"

[settings]
experimental = true
task.disable_spec_from_run_scripts = true
raw = true

[hooks]
postinstall = ["{{ mise_bin }} setup"]

[task_config]
includes = [
    "./tasks.toml",
    "packages/agent-runtime/tasks.toml",
    "packages/agent-runtime-api/tasks.toml",
    "packages/agents/bob/tasks.toml",
    "packages/agents/claude-code/tasks.toml",
    "packages/agents/codex/tasks.toml",
    "packages/agents/google-workspace/tasks.toml",
    "packages/agents/pi-agent/tasks.toml",
    "packages/api-server/tasks.toml",
    "packages/api-server-api/tasks.toml",
    "packages/cli/tasks.toml",
    "packages/controller/tasks.toml",
    "packages/db/tasks.toml",
    "packages/keycloak-theme/tasks.toml",
    "packages/platform-base/tasks.toml",
    "packages/ui/tasks.toml",
    "packages/e2e/agents/mock/tasks.toml",
    "packages/e2e/agents/mock-api/tasks.toml",
    "packages/e2e/playwright/tasks.toml",
    "deploy/helm/tasks.toml",
    "deploy/tasks.toml",
]
