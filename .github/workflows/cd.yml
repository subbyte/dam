name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_PREFIX: quay.io/dam-agents

jobs:
  check:
    name: mise check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run setup
      - run: mise run check

  build-images:
    needs: [check]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - component: controller
            dockerfile: packages/controller/Dockerfile
            context: packages/controller
          - component: api-server
            dockerfile: packages/api-server/Dockerfile
            context: .
          - component: ui
            dockerfile: packages/ui/Dockerfile
            context: .
          - component: platform-base
            dockerfile: packages/platform-base/Dockerfile
            context: .
          - component: keycloak
            dockerfile: packages/keycloak-theme/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      # The Keycloak image bakes a Keycloakify-built theme JAR; building the
      # JAR requires Java + Maven via mise, which the docker builder image
      # doesn't carry. Build it on the runner first, then docker/build-push
      # COPYs the pre-built artifact.
      - if: matrix.component == 'keycloak'
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - if: matrix.component == 'keycloak'
        run: mise run setup && mise run keycloak-theme:build:jar
      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=,format=long
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  build-agents:
    needs: [build-images]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - component: claude-code
            dockerfile: packages/agents/claude-code/Dockerfile
            context: packages/agents/claude-code
          - component: google-workspace-agent
            dockerfile: packages/agents/google-workspace/Dockerfile
            context: packages/agents/google-workspace
          - component: pi-agent
            dockerfile: packages/agents/pi-agent/Dockerfile
            context: packages/agents/pi-agent
          - component: bob
            dockerfile: packages/agents/bob/Dockerfile
            context: packages/agents/bob
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=,format=long
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}/platform-base:${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  publish:
    needs: [build-agents]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
      - name: Log in to Helm OCI registry
        run: echo "${{ secrets.QUAY_PASSWORD }}" | helm registry login quay.io --username ${{ secrets.QUAY_USERNAME }} --password-stdin
      - id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" =~ [Rr][Cc] ]]; then
            echo "npmTag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "npmTag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Push Helm chart (release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          helm package deploy/helm/platform --version ${{ steps.version.outputs.version }} --app-version ${{ steps.version.outputs.version }}
          helm push platform-${{ steps.version.outputs.version }}.tgz oci://quay.io/dam-agents/charts
      - name: Push Helm chart (main)
        if: github.ref == 'refs/heads/main'
        run: |
          helm package deploy/helm/platform --version 0.0.0-main.${{ github.run_number }} --app-version ${{ github.sha }}
          helm push platform-0.0.0-main.${{ github.run_number }}.tgz oci://quay.io/dam-agents/charts
          helm package deploy/helm/platform --version 0.0.0-main --app-version ${{ github.sha }}
          helm push platform-0.0.0-main.tgz oci://quay.io/dam-agents/charts

      - name: Publish CLI to npm
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mise run setup
          mise run cli:build
          pnpm --filter @dam-agents/cli publish --access public --no-git-checks --provenance --tag ${{ steps.version.outputs.npmTag }}
