name: CI/CD

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_PREFIX: quay.io/dam-agents
  # early opt-in, remove after 2026-06-16:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    name: mise check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          # CRD checks diff against history: crd-backwards-compatibility vs the
          # latest v* tag, crd-schema-generation vs the origin/main merge-base.
          fetch-depth: 0
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run setup
      - run: mise run check

  test:
    name: mise test
    if: github.event_name != 'schedule' && !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run setup
      - run: mise run test

  appversion:
    name: derive app version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      composite: ${{ steps.c.outputs.composite }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - id: c
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          short="${SHA:0:12}"
          if [ "$REF_TYPE" = "tag" ] && [ "${REF_NAME#v}" != "$REF_NAME" ]; then
            composite="${REF_NAME#v}"
          else
            appver="$(grep -E '^appVersion:' deploy/helm/platform/Chart.yaml | head -n1 | sed -E 's/^appVersion:[[:space:]]*//; s/["'"'"']//g')"
            composite="${appver}-dev-${short}"
          fi
          echo "composite=$composite" >> "$GITHUB_OUTPUT"
          echo "::notice::composite app version: $composite"

  build-images:
    needs: [check]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      matrix:
        component: [controller, api-server, ui, platform-base, keycloak]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
          - component: controller
            dockerfile: packages/controller/Dockerfile
            context: packages/controller
          - component: api-server
            dockerfile: packages/api-server/Dockerfile
            context: .
          - component: ui
            dockerfile: packages/ui/Dockerfile
            context: .
          - component: platform-base
            dockerfile: packages/platform-base/Dockerfile
            context: .
          - component: keycloak
            dockerfile: packages/keycloak-theme/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - if: matrix.component == 'keycloak'
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - if: matrix.component == 'keycloak'
        run: mise run setup && mise run keycloak-theme:build
      - id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ env.IMAGE_PREFIX }}/${{ matrix.component }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.component }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}-${{ matrix.arch }}
      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.component }}-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  merge-images:
    name: merge multi-arch manifests
    needs: [build-images, appversion]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        component: [controller, api-server, ui, platform-base, keycloak]
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: digests-${{ matrix.component }}-*
          path: /tmp/digests
          merge-multiple: true
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.component }}
          tags: |
            type=sha,prefix=,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ needs.appversion.outputs.composite }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - name: Create manifest list and push
        env:
          IMAGE: ${{ env.IMAGE_PREFIX }}/${{ matrix.component }}
        run: |
          set -euo pipefail
          cd /tmp/digests
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "$IMAGE@sha256:%s " *)

  build-agents:
    needs: [merge-images]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      matrix:
        component: [claude-code, codex, pi-agent, bob]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
          - component: claude-code
            dockerfile: packages/agents/claude-code/Dockerfile
            context: packages/agents/claude-code
          - component: codex
            dockerfile: packages/agents/codex/Dockerfile
            context: packages/agents/codex
          - component: pi-agent
            dockerfile: packages/agents/pi-agent/Dockerfile
            context: packages/agents/pi-agent
          - component: bob
            dockerfile: packages/agents/bob/Dockerfile
            context: packages/agents/bob
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ env.IMAGE_PREFIX }}/${{ matrix.component }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}/platform-base:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.component }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}-${{ matrix.arch }}
      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.component }}-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  merge-agents:
    name: merge multi-arch agent manifests
    needs: [build-agents, appversion]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        component: [claude-code, codex, pi-agent, bob]
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: digests-${{ matrix.component }}-*
          path: /tmp/digests
          merge-multiple: true
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.component }}
          tags: |
            type=sha,prefix=,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ needs.appversion.outputs.composite }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - name: Create manifest list and push
        env:
          IMAGE: ${{ env.IMAGE_PREFIX }}/${{ matrix.component }}
        run: |
          set -euo pipefail
          cd /tmp/digests
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "$IMAGE@sha256:%s " *)

  build-nous:
    # nous builds FROM claude-code (not platform-base), so it runs after the
    # agent manifests are merged and pulls its base by the same per-commit tag.
    needs: [merge-agents]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: packages/agents/nous
          file: packages/agents/nous/Dockerfile
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ env.IMAGE_PREFIX }}/nous,push-by-digest=true,name-canonical=true,push=true
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}/claude-code:${{ github.sha }}
          cache-from: type=gha,scope=nous-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=nous-${{ matrix.arch }}
      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-nous-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  merge-nous:
    name: merge multi-arch nous manifest
    needs: [build-nous, appversion]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: digests-nous-*
          path: /tmp/digests
          merge-multiple: true
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE_PREFIX }}/nous
          tags: |
            type=sha,prefix=,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ needs.appversion.outputs.composite }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - name: Create manifest list and push
        env:
          IMAGE: ${{ env.IMAGE_PREFIX }}/nous
        run: |
          set -euo pipefail
          cd /tmp/digests
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "$IMAGE@sha256:%s " *)

  build-openevolve:
    # openevolve builds FROM claude-code (not platform-base), so it runs after
    # the agent manifests are merged and pulls its base by the same per-commit tag.
    needs: [merge-agents]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: packages/agents/openevolve
          file: packages/agents/openevolve/Dockerfile
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ env.IMAGE_PREFIX }}/openevolve,push-by-digest=true,name-canonical=true,push=true
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}/claude-code:${{ github.sha }}
          cache-from: type=gha,scope=openevolve-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=openevolve-${{ matrix.arch }}
      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-openevolve-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  merge-openevolve:
    name: merge multi-arch openevolve manifest
    needs: [build-openevolve, appversion]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: digests-openevolve-*
          path: /tmp/digests
          merge-multiple: true
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE_PREFIX }}/openevolve
          tags: |
            type=sha,prefix=,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ needs.appversion.outputs.composite }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - name: Create manifest list and push
        env:
          IMAGE: ${{ env.IMAGE_PREFIX }}/openevolve
        run: |
          set -euo pipefail
          cd /tmp/digests
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "$IMAGE@sha256:%s " *)

  build-mock:
    name: build mock (e2e fixture)
    needs: [merge-images]
    if: github.event_name != 'schedule' && !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: packages/e2e/agents/mock/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/mock:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}/platform-base:${{ github.sha }}
          cache-from: type=gha,scope=mock
          cache-to: type=gha,mode=max,scope=mock

  e2e:
    name: mise e2e
    needs: [merge-images, merge-agents, build-mock]
    if: github.event_name != 'schedule' && !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IS_SANDBOX: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - name: Pull built images from registry
        env:
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          for c in controller api-server ui keycloak claude-code codex pi-agent bob mock; do
            docker pull "$IMAGE_PREFIX/$c:$SHA"
            docker tag "$IMAGE_PREFIX/$c:$SHA" "platform-$c:latest"
          done
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run setup
      - run: mise run e2e
        env:
          SKIP_IMAGE_BUILD: "1"

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            packages/e2e/playwright/playwright-report/
            packages/e2e/playwright/test-results/
          retention-days: 7
          if-no-files-found: ignore

  publish:
    needs: [merge-agents, merge-nous, merge-openevolve, appversion]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: false
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - name: Log in to Helm OCI registry
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
        run: echo "$QUAY_PASSWORD" | helm registry login quay.io --username "$QUAY_USERNAME" --password-stdin
      - id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" =~ [Rr][Cc] ]]; then
            echo "npmTag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "npmTag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Helm chart dependencies
        run: mise run helm:deps

      - name: Push Helm chart (release)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VERSION: ${{ steps.version.outputs.version }}
          COMPOSITE: ${{ needs.appversion.outputs.composite }}
        run: |
          helm package deploy/helm/platform --version "$VERSION" --app-version "$COMPOSITE"
          helm push "platform-${VERSION}.tgz" oci://quay.io/dam-agents/charts
      - name: Push Helm chart (main)
        if: github.ref == 'refs/heads/main'
        env:
          RUN_NUMBER: ${{ github.run_number }}
          COMPOSITE: ${{ needs.appversion.outputs.composite }}
        run: |
          helm package deploy/helm/platform --version "0.0.0-main.${RUN_NUMBER}" --app-version "$COMPOSITE"
          helm push "platform-0.0.0-main.${RUN_NUMBER}.tgz" oci://quay.io/dam-agents/charts
          helm package deploy/helm/platform --version 0.0.0-main --app-version "$COMPOSITE"
          helm push platform-0.0.0-main.tgz oci://quay.io/dam-agents/charts

      - name: Publish CLI to npm
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NPM_TAG: ${{ steps.version.outputs.npmTag }}
        run: |
          mise run setup
          mise run cli:build
          pnpm --filter @dam-agents/cli publish --access public --no-git-checks --provenance --tag "$NPM_TAG"

  go-vuln:
    name: mise controller:scan:govulncheck
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run controller:setup

      - name: Detect vulnerabilities
        run: |
          set -euo pipefail
          results=$(mise run controller:scan:govulncheck --json) || true
          out=$(printf '%s' "$results" | jq -s '
            (reduce .[] as $m ({}; if $m.osv then . + {($m.osv.id): $m.osv} else . end)) as $defs
            | [ .[]
                | select(.finding != null and .finding.trace[0].function != null)
                | .finding as $f
                | { id: $f.osv,
                    fixed: ($f.fixed_version // ""),
                    package: ($f.trace[0].package // $f.trace[0].module),
                    summary: ($defs[$f.osv].summary // ""),
                    details: ($defs[$f.osv].details // ""),
                    aliases: (($defs[$f.osv].aliases // []) | join(", ")) } ]
            | unique_by(.id)
            | map({
                title: ("[" + .id + "] vulnerability in " + .package + " (govulncheck)"),
                searchTerms: [.id, .package],
                comment: ("Still present. Package: `" + .package + "`. Fixed in: `" + (if .fixed == "" then "—" else .fixed end) + "`."),
                body: ([
                  "**Source:** govulncheck (Go call-graph analysis)",
                  "**ID:** [`" + .id + "`](https://pkg.go.dev/vuln/" + .id + ")" + (if .aliases == "" then "" else " (aliases: " + .aliases + ")" end),
                  "**Package:** `" + .package + "`",
                  "**Fixed in:** `" + (if .fixed == "" then "—" else .fixed end) + "`",
                  "",
                  .summary,
                  "",
                  .details
                ] | join("\n"))
              })
          ')
          printf '%s\n' "${out:-[]}" > findings.json
          echo "::notice::govulncheck: $(jq length findings.json) finding(s)"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: findings-go-vuln
          path: findings.json
          if-no-files-found: ignore
          retention-days: 1

  npm-audit:
    name: mise common:scan:npm-audit
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run common:setup:pnpm
      - name: Detect vulnerabilities
        run: |
          set -euo pipefail
          results=$(mise run common:scan:npm-audit --json) || true
          out=$(printf '%s' "$results" | jq '
            [ (.advisories // {}) | to_entries[] | .value
              | { id: (((.cves // []) | first) // .github_advisory_id // (.id | tostring)),
                  module: .module_name,
                  severity: (.severity // "unknown"),
                  vtitle: (.title // ""),
                  url: (.url // ""),
                  patched: (.patched_versions // ""),
                  recommendation: (.recommendation // ""),
                  overview: (.overview // "") } ]
            | unique_by(.id + "|" + .module)
            | map({
                title: ("[" + .id + "] " + .severity + " vulnerability in " + .module + " (pnpm audit)"),
                searchTerms: [.id, .module],
                comment: ("Still present. Package: `" + .module + "`. Patched: `" + (if .patched == "" then "—" else .patched end) + "`."),
                body: ([
                  "**Source:** pnpm audit (npm advisory database)",
                  "**Advisory:** [`" + .id + "`](" + .url + ") (" + .severity + ")",
                  "**Package:** `" + .module + "`",
                  "**Patched versions:** `" + (if .patched == "" then "—" else .patched end) + "`",
                  "**Recommendation:** " + (if .recommendation == "" then "—" else .recommendation end),
                  "",
                  "**" + .vtitle + "**",
                  "",
                  .overview
                ] | join("\n"))
              })
          ')
          printf '%s\n' "${out:-[]}" > findings.json
          echo "::notice::pnpm audit: $(jq length findings.json) finding(s)"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: findings-npm-audit
          path: findings.json
          if-no-files-found: ignore
          retention-days: 1

  mend-sca:
    name: Mend SCA
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    env:
      MEND_URL: https://ibmets.whitesourcesoftware.com
      MEND_EMAIL: eal_apm0047897service_user@ibm.com
      MEND_USER_KEY: ${{ secrets.MEND_USER_KEY }}
      MEND_ORGNAME: Enterprise Applications
      MEND_PRODUCTNAME: EAL_APM0047897
      MEND_PROJECTNAME: platform-sca
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Mend CLI
        run: |
          curl -fsSL https://downloads.mend.io/cli/linux_amd64/mend -o /usr/local/bin/mend
          chmod +x /usr/local/bin/mend

      - name: Detect vulnerabilities
        run: |
          set -euo pipefail

          results=$(mend dep --dir . \
            --scope "${MEND_ORGNAME}//${MEND_PRODUCTNAME}//${MEND_PROJECTNAME}" \
            --update --format json --non-interactive)

          out=$(echo "$results" | jq '
            [.. | objects | select(.vulnerabilities) |
              .name as $lib | .vulnerabilities[] |
              { cve: .name, severity: .severity, score: .cvss3_score,
                description: .description, url: .url,
                library: $lib, fix: (.topFix.fixResolution // "—") }]
            | unique_by(.cve + "|" + .library)
            | map({
                title: ("[" + .cve + "] " + .severity + " vulnerability in " + .library + " (SCA)"),
                searchTerms: [.cve, .library],
                comment: ("Still present. Library: `" + .library + "`. Fix: `" + .fix + "`."),
                body: ([
                  "**Source:** Mend SCA",
                  "**CVE:** [`" + .cve + "`](" + .url + ") (" + .severity + ", CVSS " + (.score | tostring) + ")",
                  "**Library:** `" + .library + "`",
                  "**Fix:** `" + .fix + "`",
                  "",
                  .description
                ] | join("\n"))
              })
          ')
          printf '%s\n' "${out:-[]}" > findings.json
          echo "::notice::Mend SCA: $(jq length findings.json) finding(s)"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: findings-mend-sca
          path: findings.json
          if-no-files-found: ignore
          retention-days: 1

  trivy-tasks:
    name: mise tasks | grep ':scan:trivy$'
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tasks: ${{ steps.list.outputs.tasks }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - id: list
        run: |
          set -euo pipefail
          tasks=$(mise tasks ls --json | jq -c '[.[].name | select(endswith(":scan:trivy"))]')
          echo "Discovered trivy scan tasks: $tasks"
          echo "tasks=$tasks" >> "$GITHUB_OUTPUT"

  container-scan:
    name: mise run ${{ matrix.task }}
    needs: [trivy-tasks, merge-images, merge-agents, merge-nous, merge-openevolve]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        task: ${{ fromJSON(needs.trivy-tasks.outputs.tasks) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Detect vulnerabilities
        id: scan
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
          TASK: ${{ matrix.task }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          echo "artifact=findings-$(echo "$TASK" | tr ':' '-')" >> "$GITHUB_OUTPUT"
          echo '[]' > findings.json
          if [ -n "${QUAY_USERNAME:-}" ] && [ -n "${QUAY_PASSWORD:-}" ]; then
            echo "${QUAY_PASSWORD}" | docker login quay.io -u "${QUAY_USERNAME}" --password-stdin
          fi
          report=$(mise run "$TASK" --json --tag="$SHA") || {
            echo "::notice::Trivy scan skipped for ${TASK} (no ${SHA} image — build may have failed); see log"
            exit 0
          }
          out=$(echo "$report" | jq --arg task "$TASK" '
            (.ArtifactName // "") as $image
            | ($image | split("/") | last | split(":") | first) as $component
            | [ (.Results // [])[] | (.Vulnerabilities // [])[]
                | { id: .VulnerabilityID, pkg: .PkgName, installed: .InstalledVersion,
                    fixed: (.FixedVersion // ""), severity: (.Severity // "UNKNOWN"),
                    vtitle: (.Title // ""), url: (.PrimaryURL // ""),
                    description: (.Description // "") } ]
            | unique_by(.id + "|" + .pkg)
            | map({
                title: ("[" + .id + "] " + .severity + " vulnerability in " + $component + " (" + .pkg + ")"),
                searchTerms: [.id, $component, .pkg],
                comment: ("Still present in `" + $component + "`. Package: `" + .pkg + "` " + .installed + ". Fixed in: `" + (if .fixed == "" then "—" else .fixed end) + "`."),
                body: ([
                  "**Source:** Trivy (`" + $task + "`)",
                  "**Image:** `" + $image + "`",
                  "**CVE:** [`" + .id + "`](" + .url + ") (" + .severity + ")",
                  "**Package:** `" + .pkg + "` " + .installed,
                  "**Fixed in:** `" + (if .fixed == "" then "—" else .fixed end) + "`",
                  "",
                  .vtitle,
                  "",
                  .description
                ] | join("\n"))
              })
          ')
          printf '%s\n' "${out:-[]}" > findings.json
          echo "::notice::Trivy (${TASK}): $(jq length findings.json) finding(s)"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: ${{ steps.scan.outputs.artifact }}
          path: findings.json
          if-no-files-found: ignore
          retention-days: 1

  manage-security-issues:
    name: File security issues
    needs: [go-vuln, npm-audit, mend-sca, container-scan]
    if: ${{ always() && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: findings-*
          path: findings
      - name: Reconcile issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          files=(findings/*/findings.json)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::notice::no findings artifacts to process"
            exit 0
          fi
          mapfile -t findings < <(jq -c -s 'add // [] | unique_by(.title) | .[]' "${files[@]}")
          echo "Processing ${#findings[@]} finding(s) across all scanners"
          footer="See [docs/security/supply-chain.md](../blob/main/docs/security/supply-chain.md) for the remediation flow."

          confirmed=()
          for finding in "${findings[@]}"; do
            title=$(jq -r '.title' <<<"$finding")
            body=$(jq -r '.body' <<<"$finding")
            query=$(jq -r '.searchTerms | map("\"" + . + "\"") | join(" ")' <<<"$finding")
            existing=$(gh issue list \
              --repo "${GITHUB_REPOSITORY}" \
              --state open \
              --search "in:title ${query}" \
              --json number \
              --jq '.[0].number // empty')
            if [ -n "$existing" ]; then
              confirmed+=("$existing")
              continue
            fi
            url=$(gh issue create \
              --repo "${GITHUB_REPOSITORY}" \
              --title "$title" \
              --body "$(printf '%s\n\n---\n%s\n' "$body" "$footer")" \
              --label "security,vulnerability")
            confirmed+=("${url##*/}")
          done

          mapfile -t open_issues < <(gh issue list \
            --repo "${GITHUB_REPOSITORY}" \
            --state open \
            --label "vulnerability" \
            --author "github-actions[bot]" \
            --limit 200 \
            --json number \
            --jq '.[].number')

          for issue_num in "${open_issues[@]}"; do
            for c in "${confirmed[@]}"; do
              [ "$c" = "$issue_num" ] && continue 2
            done
            gh issue close "$issue_num" \
              --repo "${GITHUB_REPOSITORY}" \
              --comment "Vulnerability no longer detected by scanners."
          done
