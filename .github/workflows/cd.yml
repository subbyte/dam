name: CI/CD

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_PREFIX: quay.io/dam-agents
  # early opt-in, remove after 2026-06-16:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    name: mise check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run setup
      - run: mise run check

  test:
    name: mise test
    if: github.event_name != 'schedule' && !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run setup
      - run: mise run test

  build-images:
    needs: [check]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - component: controller
            dockerfile: packages/controller/Dockerfile
            context: packages/controller
          - component: api-server
            dockerfile: packages/api-server/Dockerfile
            context: .
          - component: ui
            dockerfile: packages/ui/Dockerfile
            context: .
          - component: platform-base
            dockerfile: packages/platform-base/Dockerfile
            context: .
          - component: keycloak
            dockerfile: packages/keycloak-theme/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - if: matrix.component == 'keycloak'
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - if: matrix.component == 'keycloak'
        run: mise run setup && mise run keycloak-theme:build
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.component }}
          tags: |
            type=sha,prefix=,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ startsWith(github.ref, 'refs/tags/v') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  build-agents:
    needs: [build-images]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - component: claude-code
            dockerfile: packages/agents/claude-code/Dockerfile
            context: packages/agents/claude-code
          - component: codex
            dockerfile: packages/agents/codex/Dockerfile
            context: packages/agents/codex
          - component: pi-agent
            dockerfile: packages/agents/pi-agent/Dockerfile
            context: packages/agents/pi-agent
          - component: bob
            dockerfile: packages/agents/bob/Dockerfile
            context: packages/agents/bob
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.component }}
          tags: |
            type=sha,prefix=,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ startsWith(github.ref, 'refs/tags/v') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}/platform-base:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  build-mock:
    name: build mock (e2e fixture)
    needs: [build-images]
    if: github.event_name != 'schedule' && !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: packages/e2e/agents/mock/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/mock:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}/platform-base:${{ github.sha }}
          cache-from: type=gha,scope=mock
          cache-to: type=gha,mode=max,scope=mock

  e2e:
    name: mise e2e
    needs: [build-images, build-agents, build-mock]
    if: github.event_name != 'schedule' && !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IS_SANDBOX: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - name: Pull built images from registry
        env:
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          for c in controller api-server ui keycloak claude-code codex pi-agent bob mock; do
            docker pull "$IMAGE_PREFIX/$c:$SHA"
            docker tag "$IMAGE_PREFIX/$c:$SHA" "platform-$c:latest"
          done
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run setup
      - run: mise run e2e
        env:
          SKIP_IMAGE_BUILD: "1"

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            packages/e2e/playwright/playwright-report/
            packages/e2e/playwright/test-results/
          retention-days: 7
          if-no-files-found: ignore

  publish:
    needs: [build-agents]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: false
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - name: Log in to Helm OCI registry
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
        run: echo "$QUAY_PASSWORD" | helm registry login quay.io --username "$QUAY_USERNAME" --password-stdin
      - id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" =~ [Rr][Cc] ]]; then
            echo "npmTag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "npmTag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Push Helm chart (release)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          helm package deploy/helm/platform --version "$VERSION" --app-version "$VERSION"
          helm push "platform-${VERSION}.tgz" oci://quay.io/dam-agents/charts
      - name: Push Helm chart (main)
        if: github.ref == 'refs/heads/main'
        env:
          RUN_NUMBER: ${{ github.run_number }}
          SHA: ${{ github.sha }}
        run: |
          helm package deploy/helm/platform --version "0.0.0-main.${RUN_NUMBER}" --app-version "$SHA"
          helm push "platform-0.0.0-main.${RUN_NUMBER}.tgz" oci://quay.io/dam-agents/charts
          helm package deploy/helm/platform --version 0.0.0-main --app-version "$SHA"
          helm push platform-0.0.0-main.tgz oci://quay.io/dam-agents/charts

      - name: Publish CLI to npm
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NPM_TAG: ${{ steps.version.outputs.npmTag }}
        run: |
          mise run setup
          mise run cli:build
          pnpm --filter @dam-agents/cli publish --access public --no-git-checks --provenance --tag "$NPM_TAG"

  go-vuln:
    name: mise controller:scan:govulncheck
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run controller:setup

      - name: Scan and file issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # JSON mode always exits 0; findings come from the stream, not the code.
          results=$(mise run controller:scan:govulncheck --json) || true

          # Keep only symbol-level (actually called) findings, joined with their
          # OSV definition, one issue per advisory id.
          mapfile -t findings < <(printf '%s' "$results" | jq -c -s '
            (reduce .[] as $m ({}; if $m.osv then . + {($m.osv.id): $m.osv} else . end)) as $defs
            | [ .[]
                | select(.finding != null and .finding.trace[0].function != null)
                | .finding as $f
                | { id: $f.osv,
                    fixed: ($f.fixed_version // ""),
                    package: ($f.trace[0].package // $f.trace[0].module),
                    summary: ($defs[$f.osv].summary // ""),
                    details: ($defs[$f.osv].details // ""),
                    aliases: (($defs[$f.osv].aliases // []) | join(", ")) }]
            | unique_by(.id)
            | .[]')

          if [ "${#findings[@]}" -eq 0 ]; then
            echo "::notice::govulncheck: no called vulnerabilities detected"
            exit 0
          fi

          for finding in "${findings[@]}"; do
            id=$(echo "$finding" | jq -r '.id')
            fixed=$(echo "$finding" | jq -r '.fixed')
            package=$(echo "$finding" | jq -r '.package')
            summary=$(echo "$finding" | jq -r '.summary')
            details=$(echo "$finding" | jq -r '.details')
            aliases=$(echo "$finding" | jq -r '.aliases')
            url="https://pkg.go.dev/vuln/${id}"

            title="[${id}] vulnerability in ${package} (govulncheck)"

            existing=$(gh issue list \
              --repo "${GITHUB_REPOSITORY}" \
              --state open \
              --search "in:title \"${id}\" \"${package}\"" \
              --json number \
              --jq '.[0].number // empty')

            if [ -n "$existing" ]; then
              gh issue comment "$existing" \
                --repo "${GITHUB_REPOSITORY}" \
                --body "Still present. Package: \`${package}\`. Fixed in: \`${fixed:-—}\`."
              continue
            fi

            issue_body=$(printf '%s\n' \
              "**Source:** govulncheck (Go call-graph analysis)" \
              "**ID:** [\`${id}\`](${url})${aliases:+ (aliases: ${aliases})}" \
              "**Package:** \`${package}\`" \
              "**Fixed in:** \`${fixed:-—}\`" \
              "" \
              "${summary}" \
              "" \
              "${details}" \
              "" \
              "---" \
              "See [docs/security/supply-chain.md](../blob/main/docs/security/supply-chain.md) for the remediation flow.")

            gh issue create \
              --repo "${GITHUB_REPOSITORY}" \
              --title "$title" \
              --body "$issue_body" \
              --label "security,vulnerability"
          done

  npm-audit:
    name: mise common:scan:npm-audit
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run common:setup:pnpm
      - name: Scan and file issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          results=$(mise run common:scan:npm-audit --json) || true
          mapfile -t findings < <(printf '%s' "$results" | jq -c '
            [ (.advisories // {}) | to_entries[] | .value
              | { id: (((.cves // []) | first) // .github_advisory_id // (.id | tostring)),
                  module: .module_name,
                  severity: (.severity // "unknown"),
                  title: (.title // ""),
                  url: (.url // ""),
                  patched: (.patched_versions // ""),
                  recommendation: (.recommendation // ""),
                  overview: (.overview // "") }]
            | unique_by(.id + "|" + .module)
            | .[]')

          if [ "${#findings[@]}" -eq 0 ]; then
            echo "::notice::pnpm audit: no vulnerabilities detected"
            exit 0
          fi

          for finding in "${findings[@]}"; do
            id=$(echo "$finding" | jq -r '.id')
            module=$(echo "$finding" | jq -r '.module')
            severity=$(echo "$finding" | jq -r '.severity')
            title_text=$(echo "$finding" | jq -r '.title')
            url=$(echo "$finding" | jq -r '.url')
            patched=$(echo "$finding" | jq -r '.patched')
            recommendation=$(echo "$finding" | jq -r '.recommendation')
            overview=$(echo "$finding" | jq -r '.overview')

            title="[${id}] ${severity} vulnerability in ${module} (pnpm audit)"

            existing=$(gh issue list \
              --repo "${GITHUB_REPOSITORY}" \
              --state open \
              --search "in:title \"${id}\" \"${module}\"" \
              --json number \
              --jq '.[0].number // empty')

            if [ -n "$existing" ]; then
              gh issue comment "$existing" \
                --repo "${GITHUB_REPOSITORY}" \
                --body "Still present. Package: \`${module}\`. Patched: \`${patched:-—}\`."
              continue
            fi

            issue_body=$(printf '%s\n' \
              "**Source:** pnpm audit (npm advisory database)" \
              "**Advisory:** [\`${id}\`](${url}) (${severity})" \
              "**Package:** \`${module}\`" \
              "**Patched versions:** \`${patched:-—}\`" \
              "**Recommendation:** ${recommendation:-—}" \
              "" \
              "**${title_text}**" \
              "" \
              "${overview}" \
              "" \
              "---" \
              "See [docs/security/supply-chain.md](../blob/main/docs/security/supply-chain.md) for the remediation flow.")

            gh issue create \
              --repo "${GITHUB_REPOSITORY}" \
              --title "$title" \
              --body "$issue_body" \
              --label "security,vulnerability"
          done

  mend-sca:
    name: Mend SCA
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    timeout-minutes: 15
    env:
      MEND_URL: https://ibmets.whitesourcesoftware.com
      MEND_EMAIL: eal_apm0047897service_user@ibm.com
      MEND_USER_KEY: ${{ secrets.MEND_USER_KEY }}
      MEND_ORGNAME: Enterprise Applications
      MEND_PRODUCTNAME: EAL_APM0047897
      MEND_PROJECTNAME: platform-sca
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Mend CLI
        run: |
          curl -fsSL https://downloads.mend.io/cli/linux_amd64/mend -o /usr/local/bin/mend
          chmod +x /usr/local/bin/mend

      - name: Run SCA scan and file issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          results=$(mend dep --dir . \
            --scope "${MEND_ORGNAME}//${MEND_PRODUCTNAME}//${MEND_PROJECTNAME}" \
            --update --format json --non-interactive)

          mapfile -t findings < <(echo "$results" | jq -c '
            [.. | objects | select(.vulnerabilities) |
              .name as $lib | .vulnerabilities[] |
              { cve: .name, severity: .severity, score: .cvss3_score,
                description: .description, url: .url,
                library: $lib, fix: (.topFix.fixResolution // "—") }]
            | unique_by(.cve + "|" + .library)
            | .[]')

          if [ "${#findings[@]}" -eq 0 ]; then
            echo "::notice::Mend SCA: no vulnerabilities detected"
            exit 0
          fi

          for finding in "${findings[@]}"; do
            cve=$(echo "$finding" | jq -r '.cve')
            severity=$(echo "$finding" | jq -r '.severity')
            score=$(echo "$finding" | jq -r '.score')
            description=$(echo "$finding" | jq -r '.description')
            url=$(echo "$finding" | jq -r '.url')
            library=$(echo "$finding" | jq -r '.library')
            fix=$(echo "$finding" | jq -r '.fix')

            title="[${cve}] ${severity} vulnerability in ${library} (SCA)"

            existing=$(gh issue list \
              --repo "${GITHUB_REPOSITORY}" \
              --state open \
              --search "in:title \"${cve}\" \"${library}\"" \
              --json number \
              --jq '.[0].number // empty')

            if [ -n "$existing" ]; then
              gh issue comment "$existing" \
                --repo "${GITHUB_REPOSITORY}" \
                --body "Still present. Library: \`${library}\`. Fix: \`${fix}\`."
              continue
            fi

            issue_body=$(printf '%s\n' \
              "**Source:** Mend SCA" \
              "**CVE:** [\`${cve}\`](${url}) (${severity}, CVSS ${score})" \
              "**Library:** \`${library}\`" \
              "**Fix:** \`${fix}\`" \
              "" \
              "${description}" \
              "" \
              "---" \
              "See [docs/security/supply-chain.md](../blob/main/docs/security/supply-chain.md) for the remediation flow.")

            gh issue create \
              --repo "${GITHUB_REPOSITORY}" \
              --title "$title" \
              --body "$issue_body" \
              --label "security,vulnerability"
          done

  trivy-tasks:
    name: mise tasks | grep ':scan:trivy$'
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tasks: ${{ steps.list.outputs.tasks }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - id: list
        run: |
          set -euo pipefail
          tasks=$(mise tasks ls --json | jq -c '[.[].name | select(endswith(":scan:trivy"))]')
          echo "Discovered trivy scan tasks: $tasks"
          echo "tasks=$tasks" >> "$GITHUB_OUTPUT"

  container-scan:
    name: mise run ${{ matrix.task }}
    needs: [trivy-tasks, build-images, build-agents]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        task: ${{ fromJSON(needs.trivy-tasks.outputs.tasks) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Scan and file issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
          TASK: ${{ matrix.task }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ -n "${QUAY_USERNAME:-}" ] && [ -n "${QUAY_PASSWORD:-}" ]; then
            echo "${QUAY_PASSWORD}" | docker login quay.io -u "${QUAY_USERNAME}" --password-stdin
          fi

          report=$(mise run "$TASK" --json --tag="$SHA") || {
            echo "::notice::Trivy scan skipped for ${TASK} (no ${SHA} image — build may have failed); see log"
            exit 0
          }

          image=$(echo "$report" | jq -r '.ArtifactName // empty')
          component=$(echo "$image" | awk -F/ '{print $NF}' | cut -d: -f1)

          mapfile -t findings < <(echo "$report" | jq -c '
            [ (.Results // [])[] | (.Vulnerabilities // [])[]
              | { id: .VulnerabilityID, pkg: .PkgName, installed: .InstalledVersion,
                  fixed: (.FixedVersion // ""), severity: (.Severity // "UNKNOWN"),
                  title: (.Title // ""), url: (.PrimaryURL // ""),
                  description: (.Description // "") } ]
            | unique_by(.id + "|" + .pkg)
            | .[]')

          if [ "${#findings[@]}" -eq 0 ]; then
            echo "::notice::Trivy: no vulnerabilities in ${image}"
            exit 0
          fi

          for finding in "${findings[@]}"; do
            id=$(echo "$finding" | jq -r '.id')
            pkg=$(echo "$finding" | jq -r '.pkg')
            installed=$(echo "$finding" | jq -r '.installed')
            fixed=$(echo "$finding" | jq -r '.fixed')
            severity=$(echo "$finding" | jq -r '.severity')
            title_text=$(echo "$finding" | jq -r '.title')
            url=$(echo "$finding" | jq -r '.url')
            description=$(echo "$finding" | jq -r '.description')

            title="[${id}] ${severity} vulnerability in ${component} (${pkg})"

            existing=$(gh issue list \
              --repo "${GITHUB_REPOSITORY}" \
              --state open \
              --search "in:title \"${id}\" \"${component}\" \"${pkg}\"" \
              --json number \
              --jq '.[0].number // empty')

            if [ -n "$existing" ]; then
              gh issue comment "$existing" \
                --repo "${GITHUB_REPOSITORY}" \
                --body "Still present in \`${component}\`. Package: \`${pkg}\` ${installed}. Fixed in: \`${fixed:-—}\`."
              continue
            fi

            issue_body=$(printf '%s\n' \
              "**Source:** Trivy (\`${TASK}\`)" \
              "**Image:** \`${image}\`" \
              "**CVE:** [\`${id}\`](${url}) (${severity})" \
              "**Package:** \`${pkg}\` ${installed}" \
              "**Fixed in:** \`${fixed:-—}\`" \
              "" \
              "${title_text}" \
              "" \
              "${description}" \
              "" \
              "---" \
              "See [docs/security/supply-chain.md](../blob/main/docs/security/supply-chain.md) for the remediation flow.")

            gh issue create \
              --repo "${GITHUB_REPOSITORY}" \
              --title "$title" \
              --body "$issue_body" \
              --label "security,vulnerability"
          done
