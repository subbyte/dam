name: Daily

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-vuln:
    name: mise controller:scan:govulncheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run controller:setup

      - name: Scan and file issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # JSON mode always exits 0; findings come from the stream, not the code.
          results=$(mise run controller:scan:govulncheck --json) || true

          # Keep only symbol-level (actually called) findings, joined with their
          # OSV definition, one issue per advisory id.
          mapfile -t findings < <(printf '%s' "$results" | jq -c -s '
            (reduce .[] as $m ({}; if $m.osv then . + {($m.osv.id): $m.osv} else . end)) as $defs
            | [ .[]
                | select(.finding != null and .finding.trace[0].function != null)
                | .finding as $f
                | { id: $f.osv,
                    fixed: ($f.fixed_version // ""),
                    package: ($f.trace[0].package // $f.trace[0].module),
                    summary: ($defs[$f.osv].summary // ""),
                    details: ($defs[$f.osv].details // ""),
                    aliases: (($defs[$f.osv].aliases // []) | join(", ")) }]
            | unique_by(.id)
            | .[]')

          if [ "${#findings[@]}" -eq 0 ]; then
            echo "::notice::govulncheck: no called vulnerabilities detected"
            exit 0
          fi

          for finding in "${findings[@]}"; do
            id=$(echo "$finding" | jq -r '.id')
            fixed=$(echo "$finding" | jq -r '.fixed')
            package=$(echo "$finding" | jq -r '.package')
            summary=$(echo "$finding" | jq -r '.summary')
            details=$(echo "$finding" | jq -r '.details')
            aliases=$(echo "$finding" | jq -r '.aliases')
            url="https://pkg.go.dev/vuln/${id}"

            title="[${id}] vulnerability in ${package} (govulncheck)"

            existing=$(gh issue list \
              --repo "${GITHUB_REPOSITORY}" \
              --state open \
              --search "in:title \"${id}\" \"${package}\"" \
              --json number \
              --jq '.[0].number // empty')

            if [ -n "$existing" ]; then
              gh issue comment "$existing" \
                --repo "${GITHUB_REPOSITORY}" \
                --body "Still present. Package: \`${package}\`. Fixed in: \`${fixed:-—}\`."
              continue
            fi

            issue_body=$(printf '%s\n' \
              "**Source:** govulncheck (Go call-graph analysis)" \
              "**ID:** [\`${id}\`](${url})${aliases:+ (aliases: ${aliases})}" \
              "**Package:** \`${package}\`" \
              "**Fixed in:** \`${fixed:-—}\`" \
              "" \
              "${summary}" \
              "" \
              "${details}" \
              "" \
              "---" \
              "See [docs/security/supply-chain.md](../blob/main/docs/security/supply-chain.md) for the remediation flow.")

            gh issue create \
              --repo "${GITHUB_REPOSITORY}" \
              --title "$title" \
              --body "$issue_body" \
              --label "security,vulnerability"
          done

  npm-audit:
    name: mise common:scan:npm-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run common:setup:pnpm
      - name: Scan and file issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          results=$(mise run common:scan:npm-audit --json) || true
          mapfile -t findings < <(printf '%s' "$results" | jq -c '
            [ (.advisories // {}) | to_entries[] | .value
              | { id: (((.cves // []) | first) // .github_advisory_id // (.id | tostring)),
                  module: .module_name,
                  severity: (.severity // "unknown"),
                  title: (.title // ""),
                  url: (.url // ""),
                  patched: (.patched_versions // ""),
                  recommendation: (.recommendation // ""),
                  overview: (.overview // "") }]
            | unique_by(.id + "|" + .module)
            | .[]')

          if [ "${#findings[@]}" -eq 0 ]; then
            echo "::notice::pnpm audit: no vulnerabilities detected"
            exit 0
          fi

          for finding in "${findings[@]}"; do
            id=$(echo "$finding" | jq -r '.id')
            module=$(echo "$finding" | jq -r '.module')
            severity=$(echo "$finding" | jq -r '.severity')
            title_text=$(echo "$finding" | jq -r '.title')
            url=$(echo "$finding" | jq -r '.url')
            patched=$(echo "$finding" | jq -r '.patched')
            recommendation=$(echo "$finding" | jq -r '.recommendation')
            overview=$(echo "$finding" | jq -r '.overview')

            title="[${id}] ${severity} vulnerability in ${module} (pnpm audit)"

            existing=$(gh issue list \
              --repo "${GITHUB_REPOSITORY}" \
              --state open \
              --search "in:title \"${id}\" \"${module}\"" \
              --json number \
              --jq '.[0].number // empty')

            if [ -n "$existing" ]; then
              gh issue comment "$existing" \
                --repo "${GITHUB_REPOSITORY}" \
                --body "Still present. Package: \`${module}\`. Patched: \`${patched:-—}\`."
              continue
            fi

            issue_body=$(printf '%s\n' \
              "**Source:** pnpm audit (npm advisory database)" \
              "**Advisory:** [\`${id}\`](${url}) (${severity})" \
              "**Package:** \`${module}\`" \
              "**Patched versions:** \`${patched:-—}\`" \
              "**Recommendation:** ${recommendation:-—}" \
              "" \
              "**${title_text}**" \
              "" \
              "${overview}" \
              "" \
              "---" \
              "See [docs/security/supply-chain.md](../blob/main/docs/security/supply-chain.md) for the remediation flow.")

            gh issue create \
              --repo "${GITHUB_REPOSITORY}" \
              --title "$title" \
              --body "$issue_body" \
              --label "security,vulnerability"
          done

  mend-sca:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    timeout-minutes: 15
    env:
      MEND_URL: https://ibmets.whitesourcesoftware.com
      MEND_EMAIL: eal_apm0047897service_user@ibm.com
      MEND_USER_KEY: ${{ secrets.MEND_USER_KEY }}
      MEND_ORGNAME: Enterprise Applications
      MEND_PRODUCTNAME: EAL_APM0047897
      MEND_PROJECTNAME: platform-sca
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Mend CLI
        run: |
          curl -fsSL https://downloads.mend.io/cli/linux_amd64/mend -o /usr/local/bin/mend
          chmod +x /usr/local/bin/mend

      - name: Run SCA scan and file issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          results=$(mend dep --dir . \
            --scope "${MEND_ORGNAME}//${MEND_PRODUCTNAME}//${MEND_PROJECTNAME}" \
            --update --format json --non-interactive)

          mapfile -t findings < <(echo "$results" | jq -c '
            [.. | objects | select(.vulnerabilities) |
              .name as $lib | .vulnerabilities[] |
              { cve: .name, severity: .severity, score: .cvss3_score,
                description: .description, url: .url,
                library: $lib, fix: (.topFix.fixResolution // "—") }]
            | unique_by(.cve + "|" + .library)
            | .[]')

          if [ "${#findings[@]}" -eq 0 ]; then
            echo "::notice::Mend SCA: no vulnerabilities detected"
            exit 0
          fi

          for finding in "${findings[@]}"; do
            cve=$(echo "$finding" | jq -r '.cve')
            severity=$(echo "$finding" | jq -r '.severity')
            score=$(echo "$finding" | jq -r '.score')
            description=$(echo "$finding" | jq -r '.description')
            url=$(echo "$finding" | jq -r '.url')
            library=$(echo "$finding" | jq -r '.library')
            fix=$(echo "$finding" | jq -r '.fix')

            title="[${cve}] ${severity} vulnerability in ${library} (SCA)"

            existing=$(gh issue list \
              --repo "${GITHUB_REPOSITORY}" \
              --state open \
              --search "in:title \"${cve}\" \"${library}\"" \
              --json number \
              --jq '.[0].number // empty')

            if [ -n "$existing" ]; then
              gh issue comment "$existing" \
                --repo "${GITHUB_REPOSITORY}" \
                --body "Still present. Library: \`${library}\`. Fix: \`${fix}\`."
              continue
            fi

            issue_body=$(printf '%s\n' \
              "**Source:** Mend SCA" \
              "**CVE:** [\`${cve}\`](${url}) (${severity}, CVSS ${score})" \
              "**Library:** \`${library}\`" \
              "**Fix:** \`${fix}\`" \
              "" \
              "${description}" \
              "" \
              "---" \
              "See [docs/security/supply-chain.md](../blob/main/docs/security/supply-chain.md) for the remediation flow.")

            gh issue create \
              --repo "${GITHUB_REPOSITORY}" \
              --title "$title" \
              --body "$issue_body" \
              --label "security,vulnerability"
          done

  trivy-tasks:
    name: mise tasks | grep ':scan:trivy$'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tasks: ${{ steps.list.outputs.tasks }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - id: list
        run: |
          set -euo pipefail
          tasks=$(mise tasks ls --json | jq -c '[.[].name | select(endswith(":scan:trivy"))]')
          echo "Discovered trivy scan tasks: $tasks"
          echo "tasks=$tasks" >> "$GITHUB_OUTPUT"

  container-scan:
    name: mise run ${{ matrix.task }}
    needs: trivy-tasks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        task: ${{ fromJSON(needs.trivy-tasks.outputs.tasks) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Scan and file issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
          TASK: ${{ matrix.task }}
        run: |
          set -euo pipefail

          if [ -n "${QUAY_USERNAME:-}" ] && [ -n "${QUAY_PASSWORD:-}" ]; then
            echo "${QUAY_PASSWORD}" | docker login quay.io -u "${QUAY_USERNAME}" --password-stdin
          fi

          report=$(mise run "$TASK" --json --tag=latest) || {
            echo "::notice::Trivy scan skipped for ${TASK} (image may not be published yet); see log"
            exit 0
          }

          image=$(echo "$report" | jq -r '.ArtifactName // empty')
          component=$(echo "$image" | awk -F/ '{print $NF}' | cut -d: -f1)

          mapfile -t findings < <(echo "$report" | jq -c '
            [ (.Results // [])[] | (.Vulnerabilities // [])[]
              | { id: .VulnerabilityID, pkg: .PkgName, installed: .InstalledVersion,
                  fixed: (.FixedVersion // ""), severity: (.Severity // "UNKNOWN"),
                  title: (.Title // ""), url: (.PrimaryURL // ""),
                  description: (.Description // "") } ]
            | unique_by(.id + "|" + .pkg)
            | .[]')

          if [ "${#findings[@]}" -eq 0 ]; then
            echo "::notice::Trivy: no vulnerabilities in ${image}"
            exit 0
          fi

          for finding in "${findings[@]}"; do
            id=$(echo "$finding" | jq -r '.id')
            pkg=$(echo "$finding" | jq -r '.pkg')
            installed=$(echo "$finding" | jq -r '.installed')
            fixed=$(echo "$finding" | jq -r '.fixed')
            severity=$(echo "$finding" | jq -r '.severity')
            title_text=$(echo "$finding" | jq -r '.title')
            url=$(echo "$finding" | jq -r '.url')
            description=$(echo "$finding" | jq -r '.description')

            title="[${id}] ${severity} vulnerability in ${component} (${pkg})"

            existing=$(gh issue list \
              --repo "${GITHUB_REPOSITORY}" \
              --state open \
              --search "in:title \"${id}\" \"${component}\" \"${pkg}\"" \
              --json number \
              --jq '.[0].number // empty')

            if [ -n "$existing" ]; then
              gh issue comment "$existing" \
                --repo "${GITHUB_REPOSITORY}" \
                --body "Still present in \`${component}\`. Package: \`${pkg}\` ${installed}. Fixed in: \`${fixed:-—}\`."
              continue
            fi

            issue_body=$(printf '%s\n' \
              "**Source:** Trivy (\`${TASK}\`)" \
              "**Image:** \`quay.io/dam-agents/${component}:latest\`" \
              "**CVE:** [\`${id}\`](${url}) (${severity})" \
              "**Package:** \`${pkg}\` ${installed}" \
              "**Fixed in:** \`${fixed:-—}\`" \
              "" \
              "${title_text}" \
              "" \
              "${description}" \
              "" \
              "---" \
              "See [docs/security/supply-chain.md](../blob/main/docs/security/supply-chain.md) for the remediation flow.")

            gh issue create \
              --repo "${GITHUB_REPOSITORY}" \
              --title "$title" \
              --body "$issue_body" \
              --label "security,vulnerability"
          done
