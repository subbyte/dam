# Lima VM template for platform k3s cluster
# Based on template:k3s with custom port forwarding

images:
  - location: https://cloud-images.ubuntu.com/releases/noble/release/ubuntu-24.04-server-cloudimg-arm64.img
    arch: aarch64
  - location: https://cloud-images.ubuntu.com/releases/noble/release/ubuntu-24.04-server-cloudimg-amd64.img
    arch: x86_64

cpus: 4
memory: 4GiB
disk: 100GiB

containerd:
  system: false
  user: false

provision:
  - mode: system
    script: |
      #!/bin/sh
      set -e
      echo "[platform-provision] Installing nfs-common (required for platform-rwx NFS mounts)..."
      DEBIAN_FRONTEND=noninteractive apt-get update
      DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends nfs-common
      echo "[platform-provision] mount.nfs4: $(command -v mount.nfs4 || echo MISSING)"
      # Bound kubelet container-log usage at ~30 MiB per pod so a chatty/looping
      # pod can't fill the dev VM disk (issue #244). cluster:install also
      # ensures this file exists on existing VMs.
      mkdir -p /etc/rancher/k3s
      cat > /etc/rancher/k3s/config.yaml << 'EOF'
      kubelet-arg:
        - "container-log-max-size=10Mi"
        - "container-log-max-files=3"
      EOF
      if [ ! -d /var/lib/rancher/k3s ]; then
        curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server --write-kubeconfig-mode 644 --https-listen-port 16443" sh -
      fi
      # Configure Traefik to also listen on port 4444 (auto-forwarded by lima)
      mkdir -p /var/lib/rancher/k3s/server/manifests
      cat > /var/lib/rancher/k3s/server/manifests/traefik-config.yaml << 'EOF'
      apiVersion: helm.cattle.io/v1
      kind: HelmChartConfig
      metadata:
        name: traefik
        namespace: kube-system
      spec:
        valuesContent: |
          ports:
            platform:
              port: 4444
              expose:
                default: true
              exposedPort: 4444
              protocol: TCP
      EOF

probes:
  - mode: readiness
    description: k3s is ready
    script: |
      #!/bin/bash
      set -eux -o pipefail
      if ! timeout 30s bash -c "until test -f /etc/rancher/k3s/k3s.yaml; do sleep 3; done"; then
        echo >&2 "k3s is not running yet"
        exit 1
      fi

copyToHost:
  - guest: /etc/rancher/k3s/k3s.yaml
    host: "{{.Dir}}/copied-from-guest/kubeconfig.yaml"
    deleteOnStop: true

portForwards:
  - guestPort: 4444
    hostPort: 4444
  - guestPort: 16443
    hostPort: 16443
  # Deny-by-default: lima otherwise auto-forwards every 0.0.0.0 listener in the
  # guest (e.g. Traefik's :80/:443, kubelet :10250, rpcbind :111) and clobbers
  # host ports used by other projects. guestIP: 0.0.0.0 + proto: any is lima's
  # canonical catch-all; must come after the explicit allows above.
  # See https://github.com/lima-vm/lima/issues/2901 — ignore rules with the
  # default guestIP (127.0.0.1) are deliberately skipped for 0.0.0.0 listeners.
  - guestIP: 0.0.0.0
    proto: any
    ignore: true

message: |
  k3s is ready. Access services via http://platform.localhost:4444
  KUBECONFIG: {{.Dir}}/copied-from-guest/kubeconfig.yaml
