# -- Shell environment --

["cluster:kubeconfig"]
description = 'Print the KUBECONFIG path for the cluster. Usage: export KUBECONFIG="$(mise run cluster:kubeconfig)"'
quiet = true
run = '''
#!/usr/bin/env bash
if [ -n "${IS_SANDBOX:-}" ]; then
  echo "/etc/rancher/k3s/k3s.yaml"
else
  echo "$HOME/.lima/platform-k3s/copied-from-guest/kubeconfig.yaml"
fi
'''

["cluster:env"]
description = 'Open a subshell with env for local cluster'
quiet = true
raw = true
run = '''                                                                                                                                                                                                                                                                                                                                                                                              
#!/usr/bin/env bash

export KUBECONFIG="$(mise run cluster:kubeconfig)"

CALLER=$(ps -o comm= -p $(ps -o ppid= -p $PPID) 2>/dev/null)
CALLER="${CALLER:-$SHELL}"
case "$(basename "$CALLER")" in
  bash) exec bash --rcfile <(echo 'source ~/.bashrc; PS1="(platform) $PS1"') ;;
  zsh)
    ZDOTDIR=$(mktemp -d)
    cat > "$ZDOTDIR/.zshrc" <<'ZRC'
[[ -f ~/.zshenv ]] && source ~/.zshenv
[[ -f ~/.zshrc ]]  && source ~/.zshrc
PS1="(platform) $PS1"
command rm -rf "$ZDOTDIR"
ZRC
    export ZDOTDIR
    exec zsh
    ;;
  fish) exec fish -C 'functions -c fish_prompt _orig_fish_prompt; function fish_prompt; echo -n "(platform) "; _orig_fish_prompt; end' ;;
  *)    exec "$CALLER" ;;
esac
'''


# -- Image builds (docker only, no k3s interaction) --

["image:controller"]
description = "Build controller Docker image"
dir = "{{config_root}}"
run = 'docker build -t platform-controller:latest packages/controller/'

["image:apiserver"]
description = "Build api-server Docker image"
dir = "{{config_root}}"
run = 'docker build -f packages/api-server/Dockerfile -t platform-api-server:latest .'

["image:ui"]
description = "Build UI Docker image"
dir = "{{config_root}}"
run = 'docker build -f packages/ui/Dockerfile -t platform-ui:latest .'

["image:agent"]
description = "Build agent Docker images (platform-base + claude-code + google-workspace + pi-agent + code-guardian)"
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
set -eo pipefail
docker build -f packages/platform-base/Dockerfile -t platform-base .
docker build -t platform-claude-code:latest packages/agents/claude-code
docker build -t platform-google-workspace-agent:latest packages/agents/google-workspace
docker build -t platform-pi-agent:latest packages/agents/pi-agent
docker build -t platform-code-guardian:latest packages/agents/code-guardian
'''

# -- Cluster lifecycle (k3s via lima) --
#
# When IS_SANDBOX is set, it is assumed we are already _inside_ a VM.
#
# Both install and upgrade share the same flow:
#   ensure VM/k3s → cert-manager → build images → load into k3s → helm install/upgrade
#
# install: provisions VM/k3s if needed, uses helm install
# upgrade: assumes VM/k3s exists, uses helm upgrade

["cluster:install"]
description = "Create k3s cluster, build images, install cert-manager + Platform chart. Options: --vm-name=NAME --lima-template=PATH --helm-values=PATH --set=key=val --no-restart"
depends = ["image:controller", "image:apiserver", "image:ui", "image:agent"]
dir = "{{config_root}}"
raw = true
run = '''
#!/usr/bin/env bash
set -eo pipefail

LIMA_INSTANCE="platform-k3s"
LIMA_TEMPLATE="deploy/lima-k3s.yaml"
HELM_VALUES=""
HELM_EXTRA_ARGS=()
NO_RESTART=false
DEV_VALUES="deploy/helm/platform/values-dev.yaml"
for arg in "$@"; do
  case "$arg" in
    --vm-name=*) LIMA_INSTANCE="${arg#--vm-name=}" ;;
    --lima-template=*) LIMA_TEMPLATE="${arg#--lima-template=}" ;;
    --helm-values=*) HELM_VALUES="${arg#--helm-values=}" ;;
    --set=*) HELM_EXTRA_ARGS+=("$arg") ;;
    --no-restart) NO_RESTART=true ;;
  esac
done

# 1. Provision cluster and set KUBECONFIG
if [ -n "${IS_SANDBOX:-}" ]; then
  KUBECONFIG="/etc/rancher/k3s/k3s.yaml"
  if [ ! -d /var/lib/rancher/k3s ]; then
    echo "Provisioning k3s on host (sandbox mode)..."
    echo "Installing NFS client for RWX PVC support..."
    # Sandbox host distro varies (Ubuntu / Fedora / Alpine in Locki); pick
    # the package manager that's actually present rather than assume Debian.
    if command -v apt-get >/dev/null 2>&1; then
      sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
      sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends nfs-common
    elif command -v dnf >/dev/null 2>&1; then
      sudo dnf install -y nfs-utils
      # Lima provision scripts shell out to apt-get; stub it so the loop
      # below doesn't fail on a non-Debian host. Idempotent.
      [ -x /usr/local/bin/apt-get ] || (
        sudo install -m 0755 /dev/stdin /usr/local/bin/apt-get <<'SHIM'
#!/bin/sh
exit 0
SHIM
      )
    else
      echo "FATAL: neither apt-get nor dnf found; install nfs-common/nfs-utils manually." >&2
      exit 1
    fi
    echo "mount.nfs4: $(command -v mount.nfs4 || echo MISSING)"
    for i in $(seq 0 $(($(yq '.provision | length' "$LIMA_TEMPLATE") - 1))); do
      yq ".provision[$i].script" "$LIMA_TEMPLATE" | sudo bash
    done
  fi
  echo "Waiting for k3s to be ready..."
  for _ in $(seq 1 60); do [ -f "$KUBECONFIG" ] && break; sleep 2; done
  for _ in $(seq 1 60); do kubectl --kubeconfig="$KUBECONFIG" get nodes -o name 2>/dev/null | grep -q . && break; sleep 2; done
else
  KUBECONFIG="$HOME/.lima/$LIMA_INSTANCE/copied-from-guest/kubeconfig.yaml"
  if ! limactl list -q 2>/dev/null | grep -qx "$LIMA_INSTANCE"; then
    echo "Creating k3s VM ($LIMA_INSTANCE)..."
    limactl create --name="$LIMA_INSTANCE" "$LIMA_TEMPLATE" --tty=false
  fi
  STATUS=$(limactl list --json | python3 -c "import sys,json; [print(json.loads(l)['status']) for l in sys.stdin if json.loads(l)['name']=='$LIMA_INSTANCE']" 2>/dev/null || echo "Stopped")
  if [ "$STATUS" != "Running" ]; then
    echo "Starting k3s VM..."
    limactl start "$LIMA_INSTANCE"
  fi
  echo "Waiting for k3s to be ready..."
  for _ in $(seq 1 60); do kubectl --kubeconfig="$KUBECONFIG" get nodes -o name 2>/dev/null | grep -q . && break; sleep 2; done
fi
# k3s writes kubeconfig before the node registers; the for-loop above
# ensures ≥1 node exists, otherwise `kubectl wait --all` would error
# immediately with "no matching resources found".
kubectl --kubeconfig="$KUBECONFIG" wait --for=condition=Ready node --all --timeout=120s

# 1b. Ensure k3s container-log rotation is configured (issue #244 upgrade
# path for VMs created before this flag was added). New VMs already have
# /etc/rancher/k3s/config.yaml from the lima provision script.
K3S_CONFIG_YAML='kubelet-arg:
  - "container-log-max-size=10Mi"
  - "container-log-max-files=3"
'
if [ -n "${IS_SANDBOX:-}" ]; then
  if ! sudo grep -q container-log-max-size /etc/rancher/k3s/config.yaml 2>/dev/null; then
    echo "Configuring k3s container log rotation (issue #244)..."
    sudo mkdir -p /etc/rancher/k3s
    printf '%s' "$K3S_CONFIG_YAML" | sudo tee /etc/rancher/k3s/config.yaml >/dev/null
    sudo systemctl restart k3s
    kubectl --kubeconfig="$KUBECONFIG" wait --for=condition=Ready node --all --timeout=120s
  fi
else
  if ! limactl shell "$LIMA_INSTANCE" sudo grep -q container-log-max-size /etc/rancher/k3s/config.yaml 2>/dev/null; then
    echo "Configuring k3s container log rotation (issue #244)..."
    limactl shell "$LIMA_INSTANCE" sudo mkdir -p /etc/rancher/k3s
    printf '%s' "$K3S_CONFIG_YAML" | limactl shell "$LIMA_INSTANCE" sudo tee /etc/rancher/k3s/config.yaml >/dev/null
    limactl shell "$LIMA_INSTANCE" sudo systemctl restart k3s
    kubectl --kubeconfig="$KUBECONFIG" wait --for=condition=Ready node --all --timeout=120s
  fi
fi

# 2. Install cert-manager
if ! kubectl --kubeconfig="$KUBECONFIG" get ns cert-manager >/dev/null 2>&1; then
  echo "Installing cert-manager..."
  kubectl --kubeconfig="$KUBECONFIG" apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
  echo "Waiting for cert-manager to be ready..."
  kubectl --kubeconfig="$KUBECONFIG" -n cert-manager wait --for=condition=Available deployment --all --timeout=120s
else
  echo "cert-manager already installed"
fi

# 2b. Install Istio ambient + Gateway-API CRDs (required by ADR-041).
# Pinned: Gateway API v1.2.0 stable channel (introduced Gateway/HTTPRoute v1
# and the gatewayClassName: istio-waypoint shape). Istio 1.29.x is the
# floor for ambient L7 with locked-down waypoint HCM.
GATEWAY_API_VERSION="v1.2.0"
ISTIO_VERSION="1.29.1"

if ! kubectl --kubeconfig="$KUBECONFIG" get crd gateways.gateway.networking.k8s.io >/dev/null 2>&1; then
  echo "Installing Gateway API CRDs ($GATEWAY_API_VERSION)..."
  kubectl --kubeconfig="$KUBECONFIG" apply -f "https://github.com/kubernetes-sigs/gateway-api/releases/download/$GATEWAY_API_VERSION/standard-install.yaml"
else
  echo "Gateway API CRDs already installed"
fi

echo "Ensuring Istio ambient mesh ($ISTIO_VERSION)..."
helm repo add istio https://istio-release.storage.googleapis.com/charts >/dev/null 2>&1 || true
helm repo update istio >/dev/null

# Install-only path. Avoids helm upgrade conflicts with istiod, which
# patches `istiod-default-validator` ValidatingWebhookConfiguration's
# `failurePolicy` after start; a subsequent `helm upgrade istio-base`
# fails server-side apply because pilot-discovery owns that field.
# This task is the dev install loop, not the prod upgrade path; in-place
# Istio upgrades are an out-of-band operation when needed.
istio_install_if_missing() {
  local release="$1" chart="$2"
  shift 2
  if helm --kubeconfig="$KUBECONFIG" -n istio-system status "$release" >/dev/null 2>&1; then
    echo "  $release already installed, skipping"
    return 0
  fi
  helm --kubeconfig="$KUBECONFIG" install "$release" "$chart" \
    -n istio-system --version "$ISTIO_VERSION" --create-namespace --wait "$@"
}

istio_install_if_missing istio-base istio/base
istio_install_if_missing istiod istio/istiod --set profile=ambient
# k3s places CNI dirs at non-upstream paths (/var/lib/rancher/k3s/...).
# Without these overrides istio-cni-node loops "no networks found in
# /host/etc/cni/net.d" and ambient redirection never engages.
istio_install_if_missing istio-cni istio/cni \
  --set profile=ambient \
  --set cni.cniBinDir=/var/lib/rancher/k3s/data/cni \
  --set cni.cniConfDir=/var/lib/rancher/k3s/agent/etc/cni/net.d
istio_install_if_missing ztunnel istio/ztunnel
kubectl --kubeconfig="$KUBECONFIG" -n istio-system rollout status ds/ztunnel --timeout=120s
kubectl --kubeconfig="$KUBECONFIG" -n istio-system rollout status ds/istio-cni-node --timeout=120s

# Release namespace must be ambient so the api-server pod and the
# Istio-synthesised waypoint Pod participate in mesh mTLS. The helm
# install below targets the `default` namespace; label it now (the
# chart's validate-istio.yaml asserts this label is present).
kubectl --kubeconfig="$KUBECONFIG" label namespace default istio.io/dataplane-mode=ambient --overwrite

# 3. Load images into k3s (built by depends: image:*)
echo "Loading images into k3s..."
tar="/tmp/platform-images.tar"
docker save -o "$tar" platform-controller:latest platform-api-server:latest platform-ui:latest platform-claude-code:latest platform-google-workspace-agent:latest platform-pi-agent:latest platform-code-guardian:latest
if [ -n "${IS_SANDBOX:-}" ]; then
  docker image prune --all --force >/dev/null 2>&1 || true
  sudo k3s ctr images import "$tar"
else
  limactl copy "$tar" "$LIMA_INSTANCE":"$tar"
  limactl shell "$LIMA_INSTANCE" sudo k3s ctr images import "$tar"
fi
rm -f "$tar"

# 4. Helm install or upgrade
# Dev-cluster defaults (overridable via --set)
DEV_DEFAULTS=(--set keycloak.admin.password=admin)

# Detect btrfs-backed clusters (Fedora hosts default to btrfs) and bypass
# the bundled nfs-ganesha provisioner — it returns EREMOTEIO on every write
# against a btrfs export (userspace ganesha hits ENOSYS on handle-based
# syscalls). Switch to the cluster's default RWO local-path instead.
# ext4/xfs hosts (lima Ubuntu and most production storage) are unaffected.
if [ -n "${IS_SANDBOX:-}" ]; then
  ROOT_FSTYPE=$(df -T / 2>/dev/null | awk 'NR==2 {print $2}')
else
  ROOT_FSTYPE=$(limactl shell "$LIMA_INSTANCE" df -T / 2>/dev/null | awk 'NR==2 {print $2}')
fi
if [ "$ROOT_FSTYPE" = "btrfs" ]; then
  echo "Detected btrfs root — bypassing nfs-ganesha (broken on btrfs), using RWO local-path."
  HELM_EXTRA_ARGS+=(
    --set controller.agentStorageClass=local-path
    --set controller.agentAccessMode=ReadWriteOnce
    --set nfsProvisioner.enabled=false
  )
fi

echo "Installing/upgrading Platform chart..."
# No --wait: the keycloak-provision post-install hook imports the platform realm
# after deployments come up. With --wait, helm would block on readiness
# before the hook runs.
if [ -z "$HELM_VALUES" ] && [ -f "$DEV_VALUES" ]; then
    HELM_VALUES="$DEV_VALUES"
    echo "Using dev overrides: $DEV_VALUES"
  fi
  helm --kubeconfig="$KUBECONFIG" upgrade --install platform deploy/helm/platform -f deploy/helm/platform/values-local.yaml --timeout 15m ${HELM_VALUES:+-f "$HELM_VALUES"} "${DEV_DEFAULTS[@]}" "${HELM_EXTRA_ARGS[@]}"

# 5. Restart pods to pick up new local images (dev only — :latest tags don't trigger rollout)
if [ "$NO_RESTART" = true ]; then
  echo "Skipping pod restart (--no-restart)"
else
  echo "Restarting pods..."
  kubectl --kubeconfig="$KUBECONFIG" rollout restart deployment platform-controller platform-apiserver platform-ui
  # Agent pods are managed by the controller (StatefulSets in platform-agents) and
  # pin :latest too — delete them so they come back on the freshly loaded image.
  kubectl --kubeconfig="$KUBECONFIG" delete pods -n platform-agents --all --ignore-not-found
fi

# 6. Wait for all Platform deployments to become Available (replaces helm --wait,
# but happens AFTER post-install hooks have run, so no deadlock).
echo "Waiting for deployments to be ready..."
kubectl --kubeconfig="$KUBECONFIG" wait --for=condition=Available deployment --all --timeout=10m

# 7. Prune dangling image layers (issue #244). After repeated reinstalls,
# old `:latest` SHAs lose their tag to the freshly imported one and become
# `<none>:<none>`. Drop only those — `crictl rmi --prune` would also wipe
# tagged-but-unpinned images like the agent ones we just loaded (no
# instance pods exist yet to pin them).
echo "Pruning dangling images..."
PRUNE_DANGLING='sudo k3s crictl images 2>/dev/null | sed -nE "s/^<none>[[:space:]]+<none>[[:space:]]+([^[:space:]]+).*/\\1/p" | xargs -r sudo k3s crictl rmi >/dev/null 2>&1 || true'
if [ -n "${IS_SANDBOX:-}" ]; then
  bash -c "$PRUNE_DANGLING"
else
  limactl shell "$LIMA_INSTANCE" bash -c "$PRUNE_DANGLING"
fi

echo ""
echo "=== Cluster ready ==="
echo "KUBECONFIG=$KUBECONFIG"
echo ""
kubectl --kubeconfig="$KUBECONFIG" get pods
'''

["cluster:build-apiserver"]
description = "Build and load API server image into k3s, restart apiserver pod"
depends = ["image:apiserver"]
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
set -eo pipefail

echo "Loading into k3s..."
tar="/tmp/platform-api-server.tar"
docker save platform-api-server:latest -o "$tar"

if [ -n "${IS_SANDBOX:-}" ]; then
  KUBECONFIG="/etc/rancher/k3s/k3s.yaml"
  sudo k3s ctr images import "$tar"
else
  LIMA_INSTANCE="platform-k3s"
  KUBECONFIG="$HOME/.lima/$LIMA_INSTANCE/copied-from-guest/kubeconfig.yaml"
  limactl copy "$tar" "$LIMA_INSTANCE":"$tar"
  limactl shell "$LIMA_INSTANCE" sudo k3s ctr images import "$tar"
fi
rm -f "$tar"

echo "Restarting apiserver pod..."
kubectl --kubeconfig="$KUBECONFIG" rollout restart deployment platform-apiserver
kubectl --kubeconfig="$KUBECONFIG" rollout status deployment platform-apiserver --timeout=60s

# Drop image layers no longer pinned by a running container (issue #244).
if [ -n "${IS_SANDBOX:-}" ]; then
  sudo k3s crictl rmi --prune >/dev/null 2>&1 || true
else
  limactl shell "$LIMA_INSTANCE" sudo k3s crictl rmi --prune >/dev/null 2>&1 || true
fi

echo "Done."
'''

["cluster:build-ui"]
description = "Build and load UI image into k3s, restart UI pod"
depends = ["image:ui"]
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
set -eo pipefail

echo "Loading into k3s..."
tar="/tmp/platform-ui.tar"
docker save platform-ui:latest -o "$tar"

if [ -n "${IS_SANDBOX:-}" ]; then
  KUBECONFIG="/etc/rancher/k3s/k3s.yaml"
  sudo k3s ctr images import "$tar"
else
  LIMA_INSTANCE="platform-k3s"
  KUBECONFIG="$HOME/.lima/$LIMA_INSTANCE/copied-from-guest/kubeconfig.yaml"
  limactl copy "$tar" "$LIMA_INSTANCE":"$tar"
  limactl shell "$LIMA_INSTANCE" sudo k3s ctr images import "$tar"
fi
rm -f "$tar"

echo "Restarting UI pod..."
kubectl --kubeconfig="$KUBECONFIG" rollout restart deployment platform-ui
kubectl --kubeconfig="$KUBECONFIG" rollout status deployment platform-ui --timeout=60s

if [ -n "${IS_SANDBOX:-}" ]; then
  sudo k3s crictl rmi --prune >/dev/null 2>&1 || true
else
  limactl shell "$LIMA_INSTANCE" sudo k3s crictl rmi --prune >/dev/null 2>&1 || true
fi

echo "Done."
'''

["cluster:build-agent"]
description = "Build and load agent images into k3s, restart agent pods"
depends = ["image:agent"]
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
set -eo pipefail

echo "Loading into k3s..."
tar="/tmp/platform-agent-images.tar"
docker save platform-claude-code:latest platform-google-workspace-agent:latest platform-pi-agent:latest platform-code-guardian:latest -o "$tar"

if [ -n "${IS_SANDBOX:-}" ]; then
  KUBECONFIG="/etc/rancher/k3s/k3s.yaml"
  sudo k3s ctr images import "$tar"
else
  LIMA_INSTANCE="platform-k3s"
  KUBECONFIG="$HOME/.lima/$LIMA_INSTANCE/copied-from-guest/kubeconfig.yaml"
  limactl copy "$tar" "$LIMA_INSTANCE":"$tar"
  limactl shell "$LIMA_INSTANCE" sudo k3s ctr images import "$tar"
fi
rm -f "$tar"

echo "Restarting agent pods..."
kubectl --kubeconfig="$KUBECONFIG" delete pods -n platform-agents --all 2>/dev/null || true

# Prune dangling layers: old `:latest` SHAs that just lost their tag to the
# freshly imported one. Skip `crictl rmi --prune` here — when no instance
# pods are running, our just-loaded agent images are unpinned and would
# get wiped. (issue #244)
PRUNE_DANGLING='sudo k3s crictl images 2>/dev/null | sed -nE "s/^<none>[[:space:]]+<none>[[:space:]]+([^[:space:]]+).*/\\1/p" | xargs -r sudo k3s crictl rmi >/dev/null 2>&1 || true'
if [ -n "${IS_SANDBOX:-}" ]; then
  bash -c "$PRUNE_DANGLING"
else
  limactl shell "$LIMA_INSTANCE" bash -c "$PRUNE_DANGLING"
fi

echo "Done. Agent pods will restart with new image."
'''

["cluster:kubectl"]
description = "Run kubectl against the platform-k3s cluster. Usage: mise run cluster:kubectl -- get pods"
raw = true
run = '''
#!/usr/bin/env bash
if [ -n "${IS_SANDBOX:-}" ]; then
  KUBECONFIG="/etc/rancher/k3s/k3s.yaml"
else
  KUBECONFIG="$HOME/.lima/platform-k3s/copied-from-guest/kubeconfig.yaml"
fi
exec kubectl --kubeconfig="$KUBECONFIG" "$@"
'''

["cluster:shell"]
description = "Open a shell inside the k3s VM (or run command directly in sandbox mode)"
raw = true
run = '''
#!/usr/bin/env bash
if [ -n "${IS_SANDBOX:-}" ]; then
  if [ $# -eq 0 ]; then
    exec bash
  else
    exec "$@"
  fi
else
  exec limactl shell platform-k3s "$@"
fi
'''

["cluster:stop"]
description = "Stop the k3s VM (preserves data)"
run = '''
#!/usr/bin/env bash
set -eo pipefail
if [ -n "${IS_SANDBOX:-}" ]; then
  sudo systemctl stop k3s
else
  limactl stop platform-k3s
fi
'''

["cluster:uninstall"]
description = "Uninstall Platform chart and clean up all resources"
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
set -eo pipefail
if [ -n "${IS_SANDBOX:-}" ]; then
  KUBECONFIG="/etc/rancher/k3s/k3s.yaml"
else
  KUBECONFIG="$HOME/.lima/platform-k3s/copied-from-guest/kubeconfig.yaml"
fi
KCTL=(kubectl --kubeconfig="$KUBECONFIG")

# Drain RWX-mounting workloads BEFORE helm uninstall. The chart ships the NFS
# provisioner that backs `platform-rwx`; once helm uninstall removes it, any
# pod still mounting one of its PVCs hangs in Terminating (kubelet can't
# unmount from the dead NFS server) and blocks namespace deletion forever.
if "${KCTL[@]}" get ns platform-agents >/dev/null 2>&1; then
  echo "Draining platform-agents while NFS provisioner is still alive..."
  "${KCTL[@]}" -n platform-agents delete sts --all --wait=true --timeout=60s 2>/dev/null || true
  "${KCTL[@]}" -n platform-agents wait --for=delete pod --all --timeout=60s 2>/dev/null || true
  "${KCTL[@]}" -n platform-agents delete pvc --all --wait=true --timeout=60s 2>/dev/null || true
  "${KCTL[@]}" delete ns platform-agents --ignore-not-found --wait=true --timeout=60s 2>/dev/null || true
fi

helm --kubeconfig="$KUBECONFIG" uninstall platform || true

# Clean up StatefulSet-managed PVCs in the release namespace (postgres, redis,
# nfs-provisioner export). These aren't owned by the helm release, so helm
# leaves them behind. Delete them AFTER helm uninstall — pods are gone now,
# so pvc-protection finalizers clear immediately.
"${KCTL[@]}" delete pvc --all --ignore-not-found 2>/dev/null || true

echo "Platform uninstalled and cleaned up. Use 'mise run cluster:delete' to remove the entire cluster."
'''

["cluster:delete"]
description = "Delete the entire k3s cluster (destroys all data). Options: --vm-name=NAME --force"
raw = true
run = '''
#!/usr/bin/env bash
set -eo pipefail

LIMA_INSTANCE="platform-k3s"
FORCE=false
for arg in "$@"; do
  case "$arg" in
    --vm-name=*) LIMA_INSTANCE="${arg#--vm-name=}" ;;
    --force) FORCE=true ;;
  esac
done

if [ "$FORCE" != "true" ]; then
  if [ -n "${IS_SANDBOX:-}" ]; then
    echo "This will uninstall k3s and delete all cluster data."
  else
    echo "This will delete the k3s VM ($LIMA_INSTANCE) and all cluster data."
  fi
  read -p "Continue? [y/N] " -r
  if [[ ! $REPLY =~ ^[Yy]$ ]]; then
    echo "Cancelled."
    exit 0
  fi
fi

if [ -n "${IS_SANDBOX:-}" ]; then
  /usr/local/bin/k3s-uninstall.sh 2>/dev/null || true
  echo "k3s uninstalled from host."
else
  limactl delete --force "$LIMA_INSTANCE" 2>/dev/null || true
  echo "k3s cluster ($LIMA_INSTANCE) deleted."
fi
'''

["cluster:reclaim"]
description = "Reclaim disk in the dev cluster: prune unused images, delete completed/failed pods, surface orphan PVCs."
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
set -eo pipefail
if [ -n "${IS_SANDBOX:-}" ]; then
  KUBECONFIG="/etc/rancher/k3s/k3s.yaml"
  RUN_IN_VM="sudo"
else
  LIMA_INSTANCE="platform-k3s"
  KUBECONFIG="$HOME/.lima/$LIMA_INSTANCE/copied-from-guest/kubeconfig.yaml"
  RUN_IN_VM="limactl shell $LIMA_INSTANCE sudo"
fi

echo "[1/4] Pruning unreferenced images from containerd..."
$RUN_IN_VM k3s crictl rmi --prune || true

echo "[2/4] Deleting Succeeded/Failed pods cluster-wide..."
kubectl --kubeconfig="$KUBECONFIG" delete pod -A --field-selector=status.phase=Succeeded --ignore-not-found
kubectl --kubeconfig="$KUBECONFIG" delete pod -A --field-selector=status.phase=Failed --ignore-not-found

echo "[3/4] Checking for orphan agent PVCs..."
# Cross-reference platform.ai/instance label on each PVC against existing instance
# ConfigMaps. The controller GCs orphans every 10m; this just surfaces any that
# look stuck. Forced deletion is left to the operator.
ORPHANS=()
while IFS='|' read -r ns pvc inst; do
  [ -z "$pvc" ] && continue
  if ! kubectl --kubeconfig="$KUBECONFIG" -n "$ns" get configmap "$inst" >/dev/null 2>&1; then
    ORPHANS+=("$ns/$pvc (instance: $inst)")
  fi
done < <(
  kubectl --kubeconfig="$KUBECONFIG" get pvc -A -l platform.ai/instance \
    -o jsonpath='{range .items[*]}{.metadata.namespace}|{.metadata.name}|{.metadata.labels.platform\.ai/instance}{"\n"}{end}'
)
if [ "${#ORPHANS[@]}" -eq 0 ]; then
  echo "  no orphan PVCs found"
else
  echo "  ${#ORPHANS[@]} orphan PVC(s):"
  printf '    %s\n' "${ORPHANS[@]}"
  echo "  controller will GC them automatically; or delete manually with: kubectl delete pvc -n <ns> <name>"
fi

echo "[4/4] Disk usage on the cluster VM:"
$RUN_IN_VM df -h /
'''

["cluster:status"]
description = "Show cluster and pod status. Options: --watch (continuous refresh every 2s)"
raw = true
run = '''
#!/usr/bin/env bash
set -eo pipefail
if [ -n "${IS_SANDBOX:-}" ]; then
  KUBECONFIG="/etc/rancher/k3s/k3s.yaml"
else
  KUBECONFIG="$HOME/.lima/platform-k3s/copied-from-guest/kubeconfig.yaml"
fi

STATUS_CMD="
if [ -n \"${IS_SANDBOX:-}\" ]; then
  echo '=== k3s service ==='
  sudo systemctl is-active k3s || true
else
  echo '=== Lima VM ==='
  limactl list
fi
echo ''
echo '=== Nodes ==='
kubectl --kubeconfig='$KUBECONFIG' get nodes 2>/dev/null || echo 'Cluster not reachable'
echo ''
echo '=== Pods (default) ==='
kubectl --kubeconfig='$KUBECONFIG' get pods 2>/dev/null || true
echo ''
echo '=== Pods (platform-agents) ==='
kubectl --kubeconfig='$KUBECONFIG' get pods -n platform-agents 2>/dev/null || true
"

case "${1:-}" in
  --watch|-w)
    tput civis 2>/dev/null
    trap 'tput cnorm 2>/dev/null; exit' INT TERM
    while true; do
      tput home 2>/dev/null
      eval "$STATUS_CMD" | sed $'s/$/\033[K/'
      tput ed 2>/dev/null
      sleep 0.5
    done
    ;;
  *) eval "$STATUS_CMD" ;;
esac
'''


["cluster:logs"]
description = "Show api-server pod logs"
run = '''
#!/usr/bin/env bash
set -eo pipefail
if [ -n "${IS_SANDBOX:-}" ]; then
  KUBECONFIG="/etc/rancher/k3s/k3s.yaml"
else
  KUBECONFIG="$HOME/.lima/platform-k3s/copied-from-guest/kubeconfig.yaml"
fi
kubectl --kubeconfig="$KUBECONFIG" logs -l app.kubernetes.io/component=apiserver --all-containers --tail=50
'''
