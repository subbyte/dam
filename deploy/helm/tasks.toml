["helm:check"]
depends = ["helm:check:*"]

["helm:check:lint"]
dir = "{{config_root}}/deploy/helm/platform"
run = "helm lint ."

["helm:check:render"]
dir = "{{config_root}}/deploy/helm/platform"
run = "helm template platform . | kubeconform -strict -summary -skip Certificate,Issuer,ClusterIssuer"

["helm:setup"]
alias = "helm:build"
run = "echo 'No build step for helm chart'"
