# E2E test cluster overlay. Layered on top of values-local.yaml
# by `mise run e2e`. Flips the e2e.enabled gate so the api-server registers
# its control tRPC namespace and the mock harness becomes drivable from
# Playwright. values-local.yaml already enables `keycloak.testUser` (dev/dev).

e2e:
  enabled: true

# Second user for the foreign-fork Slack spec (07-slack). The primary
# dev/dev user comes from values-local.yaml's keycloak.testUser.
keycloak:
  testUser2:
    enabled: true
    username: dev2
    password: dev2

# Only the mock image is built for the e2e cluster — disable claude-code,
# the one other template values-local.yaml leaves enabled.
agentTemplates:
  claude-code:
    enabled: false
