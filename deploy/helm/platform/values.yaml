# -- Brand customization — display name, slash-command identifier, and UI
# theme accent colors. Surfaced to the UI at runtime via `GET /api/brand`
# (the api-server reads these from BRAND_* env vars set below). The
# internal codename ("platform") and the K8s annotation domain
# ("agent-platform.ai/...") are permanent and unrelated to brand; this
# section is the only knob users see.
brand:
  # Display name shown in the PWA manifest, OAuth dynamic client_name,
  # skill-publish git author, and the Keycloak realm display name (sign-in
  # heading + tab title).
  name: DAM
  # Lowercase identifier (DNS/URL-safe). Used for the Slack slash command
  # (`/<short> login`), GitHub publish branch prefix, and git-author email
  # local-part.
  short: dam
  # Marketing tagline shown as the browser tab title in the web app (the
  # `name` expansion). Empty string falls back to `name`.
  tagline: "Deploy Agents Massively"
  # UI theme — applied at runtime as CSS custom properties so a brand
  # change requires no UI rebuild.
  theme:
    light:
      accent: "#1D6BE1"
      accentHover: "#1556B8"
      accentLight: "#eaf2fe"
    dark:
      accent: "#3C92FD"
      accentHover: "#2F88FD"
      accentLight: "#0f1f3a"
  # Optional SVG override for the brand icon. The api-server serves it at
  # `/api/brand/icon.svg` and rasterizes on demand for the favicon, PWA
  # install icons, and apple-touch-icon. Empty string falls back to the
  # bundled default. Use `helm install --set-file brand.icon=./my-logo.svg`
  # for the easiest override workflow.
  icon: ""

# -- Terms of Use shown at the api-server acceptance gate. Both fields are
# required; the chart refuses to install when either is unset. Bump
# `terms.version` on every material change to re-prompt every user; the
# server records `sha256(text)` on each Acceptance row as proof binding.
terms:
  # Markdown content rendered at /terms and on the login page. Supply via
  # `helm install --set-file terms.text=./TERMS.md`.
  text: ""
  # Free-form re-prompt trigger (e.g. "2026-05-25", "v1"). Operator
  # judgment — whitespace edits don't bump this.
  version: ""

# -- Base domain for the app. UI and API share this host; the ingress
# splits `/api/*` to the api-server and everything else to the UI. Keycloak
# lives at `keycloak.{domain}`.
# Override for production, e.g. "example.com"
domain: localhost
# -- Port appended to public URLs (empty for standard 80/443)
port: "4444"
# -- URL scheme (http for local dev, https for production)
scheme: http

# -- Explicit external URLs.
#
# `urls.ui` overrides the app host (UI + API). `urls.api` is honored as a
# back-compat fallback when `urls.ui` is unset. `urls.keycloak` overrides
# the Keycloak host.
#
# Each override must be a complete URL including scheme. The hostname is
# what the cluster expects in the Host header (used as the rule host when
# `ingress.enabled: true`); Keycloak uses the full URL as its issuer and as
# `KC_HOSTNAME`, and the API server uses it for browser-facing redirects.
#
# If you keep the bundled Ingress enabled with TLS, remember to align
# `ingress.tls[].hosts` with the override hostnames — see the note on
# `ingress.tls` below.
urls:
  ui: "" # default: {scheme}://{domain}{:port}
  api: "" # back-compat fallback for urls.ui; same host
  keycloak: "" # default: {scheme}://keycloak.{domain}{:port}

# -- Pull secrets for all pods managed by this chart.
# Agent pods (managed by the controller) also inherit these secrets.
# Example:
#   imagePullSecrets:
#     - name: my-registry-secret
imagePullSecrets: []

# -- Annotations added to every chart-managed workload (Deployments,
# StatefulSets and the setup/migration Jobs). Use for cluster-wide policy or
# tooling that targets workload objects. Per-component `annotations` override
# these on collision; chart-internal annotations (e.g. Helm hooks) always win.
commonAnnotations: {}

# -- Annotations added to the pod template of every chart-managed workload.
# This is what injection operators read — e.g. set
# `instrumentation.opentelemetry.io/inject-sdk: "true"` here to opt the whole
# platform into OpenTelemetry auto-instrumentation. Per-component
# `podAnnotations` override these; chart-internal annotations (config
# checksums) always win.
commonPodAnnotations: {}

# -- Kubelet probes for chart-managed pods (api-server, ui, keycloak,
# postgres, redis) AND controller-managed agent / fork pods. Set
# `enabled: false` to drop all readiness/liveness/startup probes — escape
# hatch for clusters where the kubelet's probe behavior is causing churn
# (false-positive restarts, slow rollouts). Plumbed into the controller via
# `AGENT_PROBES_ENABLED` so newly reconciled pods follow the same setting.
probes:
  enabled: true

# -- Istio ambient mesh settings. Istio is a hard prerequisite of
# this chart — `validate-istio.yaml` fails install if the mesh is missing.
# `mise run cluster:install` provisions Istio out-of-band (mirroring how
# cert-manager is treated). There is no `enabled: false` mode; an
# unauthenticated harness port is not a supported configuration.
istio:
  # SPIFFE trust domain. Default for an istioctl ambient install.
  trustDomain: cluster.local
  # Name of the waypoint Gateway that fronts the api-server's harness
  # Service. Istio's mesh-controller synthesises the waypoint Deployment
  # + Pod from the Gateway resource declared in apiserver/waypoint.yaml.
  waypointName: apiserver-waypoint

# -- Target namespace for agent workloads (agents, templates, schedules, forks)
agentNamespace: platform-agents

# -- Whether to create the agent namespace (disable if it already exists or is managed externally)
createAgentNamespace: true

# -- OpenShift-specific knobs. No-op on vanilla Kubernetes.
openshift:
  scc:
    # Custom `anyuid-cap-net` SCC for agent pods on OpenShift. Modeled on
    # the built-in `anyuid` SCC (runAsUser: RunAsAny so the iptablesInit
    # init container can run as root; the agent container itself stays at
    # image USER 65532), with NET_ADMIN + NET_RAW added to
    # allowedCapabilities. Renders a cluster-scoped SCC + RoleBinding to
    # all SAs in `agentNamespace`. Default ON — required for
    # `iptablesInit`, harmless otherwise (OpenShift admission still
    # prefers more restrictive SCCs when the pod doesn't request the
    # extra capabilities).
    anyuidCapNet:
      enabled: false

# -- Shared local PostgreSQL instance
# Set enabled: false when using external/cloud DBs for all services.
postgres:
  enabled: true
  # -- Extra annotations for the StatefulSet object / its pod template
  # (merged over commonAnnotations / commonPodAnnotations).
  annotations: {}
  podAnnotations: {}
  image: registry.access.redhat.com/hi/postgresql:18

  # -- Three Postgres roles: one per service plus a dedicated SUPERUSER for
  # DBA work. The two app roles are NOSUPERUSER and own only their own
  # database, so a leaked app credential is bounded to one service's data.
  # The admin role has `ALTER ROLE … SET log_statement = 'all'` attached so
  # DBA sessions are statement-logged by default. Passwords are
  # auto-generated on first install if left null.
  #
  # `adminUser` is the cluster's bootstrap superuser (Postgres `POSTGRES_USER`
  # at init). It defaults to `platform` — the name an existing single-role
  # cluster already bootstrapped with — so an upgrade reuses that superuser
  # in place rather than renaming it (Postgres forbids renaming the role you
  # are connected as, and the bootstrap superuser cannot be demoted anyway).
  #
  # The role/database layout is applied by the idempotent SQL in
  # `postgres.yaml` (ConfigMap key `01-roles.sql`), run both on first PGDATA
  # init and by the post-install/post-upgrade migration Job
  # (`postgres-migrate-roles.yaml`); the latter converges an existing
  # single-superuser cluster with no manual SQL.
  apiserverUser: platform_apiserver
  apiserverPassword: null
  keycloakUser: platform_keycloak
  keycloakPassword: null
  adminUser: platform
  adminPassword: null

  storage: 5Gi
  storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # -- Event logging. Authentication events (connect, disconnect, failed
  # auth) and admin events (DDL — CREATE/ALTER/DROP, GRANT/REVOKE, ROLE
  # changes) are surfaced on the pod's stderr so the external log
  # collector picks them up. The image's default logging-collector +
  # file output is disabled in favor of plain stderr (kubectl logs).
  # These are passed to the server as `-c` flags (see postgres.yaml)
  # because the image's postgresql.conf has no drop-in include dir.
  #
  # JSON-format logs aren't used: PG's `jsonlog` destination requires
  # the file-based logging_collector, which writes to files instead of
  # stderr. Plain text with a structured prefix is the canonical
  # Postgres-in-K8s pattern; the external log shipper parses the
  # prefix.
  log:
    # -- Prefix on every log line. Default is a key=value-ish layout:
    # timestamp, pid, user@db (only on backend processes via %q), client
    # host, application_name.
    linePrefix: "%m [%p] %q%u@%d from %h app=%a "

    # -- Authentication events (PG 18 enum). Comma-separated subset of:
    # receipt, authentication, authorization, setup_durations. Failed
    # auth is always logged regardless of this setting.
    connections: "authentication,authorization"

    # -- Log session-close events (with session duration).
    disconnections: "on"

    # -- Admin-statement audit. `ddl` covers CREATE / ALTER / DROP
    # including roles and grants. Set to `all` for full query log
    # (very noisy), `mod` to also catch INSERT/UPDATE/DELETE.
    statement: "ddl"

# -- Shared Redis instance.
# Used as the cross-replica pub/sub primitive — first consumer is HITL ext_authz
# wake-ups. Persistence uses AOF with `everysec`; the
# platform tolerates losing recent ephemeral data on restart (Postgres remains
# the source of truth for anything durable).
redis:
  enabled: true
  # -- Extra annotations for the StatefulSet object / its pod template
  # (merged over commonAnnotations / commonPodAnnotations).
  annotations: {}
  podAnnotations: {}
  image: registry.access.redhat.com/hi/valkey:9.0
  port: 6379
  storage: 1Gi
  storageClass: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# -- Agent-telemetry backend (ClickStack). Off by default. Requires the clickstack-operators
# chart installed out-of-band first (deploy/tasks.toml). See docs/architecture/observability.md.
# Keys other than `enabled`/`collector` are forwarded to the clickstack subchart.
clickstack:
  enabled: false

  # Our own OTLP collector (replaces the subchart's OpAMP/token-gated one): static config,
  # no auth, gated by the AuthorizationPolicy in templates/clickstack/.
  collector:
    annotations: {}
    podAnnotations: {}
    image: quay.io/dam-agents/opentelemetry-collector-contrib:0.146.1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 512Mi

  # --- forwarded to the clickstack subchart ---
  # Third-party images pinned to the quay.io/dam-agents mirror (mirror these by hand):
  #   hyperdx:2.27.0                 <- docker.hyperdx.io/hyperdx/hyperdx:2.27.0
  #   clickhouse-server:25.7-alpine  <- clickhouse/clickhouse-server:25.7-alpine
  #   clickhouse-keeper:25.7-alpine  <- clickhouse/clickhouse-keeper:25.7-alpine
  #   busybox:1.37.0                 <- busybox
  # Production must override clickstack.hyperdx.secrets.* (placeholders by default).

  otel-collector:
    enabled: false        # we run our own collector (above)

  hyperdx:
    deployment:
      image:
        repository: quay.io/dam-agents/hyperdx
        tag: "2.27.0"
      waitForMongodb:
        image: "quay.io/dam-agents/busybox:1.37.0"

  clickhouse:
    # Without an explicit image the operator injects its built-in default
    # (docker.io/clickhouse/clickhouse-keeper:latest) — pin to the mirror and
    # match the server tag. Merges over the subchart's keeper.spec defaults.
    keeper:
      spec:
        containerTemplate:
          image:
            repository: quay.io/dam-agents/clickhouse-keeper
            tag: "25.7-alpine"
    cluster:
      spec:
        containerTemplate:
          image:
            repository: quay.io/dam-agents/clickhouse-server
            tag: "25.7-alpine"
        dataVolumeClaimSpec:
          resources:
            requests:
              storage: 20Gi

# -- Keycloak (OIDC identity provider)
keycloak:
  enabled: true
  # -- Extra annotations for the Deployment object / its pod template
  # (merged over commonAnnotations / commonPodAnnotations).
  annotations: {}
  podAnnotations: {}
  # The Keycloak image is a first-party build that bakes the
  # Keycloakify theme JAR on top of upstream Keycloak. The upstream
  # version is pinned in `packages/keycloak-theme/Dockerfile`.
  image:
    repository: quay.io/dam-agents/keycloak
    tag: "" # defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent
  configCliImage: quay.io/adorsys/keycloak-config-cli:latest-26.5.4
  port: 8080

  # -- Additional Keycloak server features. The chart always enables a required
  # base — `token-exchange` (the API server depends on it) and
  # `admin-fine-grained-authz:v1` — and appends these to it, rendered into the
  # single `--features=` arg (a second `--features` would override, not merge).
  # List only extras here, e.g. `opentelemetry-logs` to enable OTLP log export.
  extraFeatures: []

  # -- Admin credentials (for Keycloak admin console)
  admin:
    user: admin
    # password is auto-generated if not set
    password: null

  # -- Realm and OIDC client configuration
  realm: platform
  clientId: platform-ui
  apiAudience: platform-api
  # -- Realm role required to access the API. Users without this role get 403.
  # Leave empty to allow all authenticated users.
  requiredRole: ""
  # -- Realm role granting read access to the inspector endpoints
  # (`GET /api/usage`, `GET /api/usage/report`). The chart auto-creates this role
  # plus an `inspectors` group mapped to it; grant access by adding users to
  # the group via the Keycloak admin UI. For bulk assignment use `kcadm.sh`
  # or the Keycloak admin REST API; for SSO-federated installs, map your
  # upstream group to the `inspectors` group. Set to empty string to disable
  # usage-data access entirely (the endpoint will not be mounted).
  inspectorRole: "platform-inspector"
  # -- Confidential client for API server
  apiClientId: platform-api
  apiClientSecret: ""
  # -- Public client for the dam CLI (Device Authorization Grant, RFC 8628).
  # Surfaced to the CLI via `/api/auth/config` as `cliClientId`.
  cliClientId: platform-cli

  # -- Additional redirect URIs and web origins to register on the public
  # `clientId` client. The chart always allows `{urls.ui}/*` and the Vite
  # dev port; use these to register extra dev hosts (e.g. `127.0.0.1:4444`,
  # tunnel URLs) without editing the realm template. Each entry is passed
  # through verbatim — wildcards (`/*`) are supported by Keycloak.
  extraRedirectUris: []
  extraWebOrigins: []

  # -- Event logging. Login + admin events are emitted to stdout via the
  # built-in `jboss-logging` event listener so they ride the cluster log
  # pipeline to whatever external log service is collecting pod logs.
  #
  # Login events are NOT persisted to the Keycloak DB (eventsEnabled: false
  # in the realm import) — pod logs are the source of truth. Admin-event
  # metadata IS persisted (low volume), but request-body detail is NOT
  # (adminEventsDetailsEnabled: false in the realm import): those bodies can
  # carry plaintext credentials on user-create/update and Keycloak keeps
  # them indefinitely (no built-in expiration), while the log pipeline is
  # the audit source of truth regardless. Set `adminEventsEnabled: false`
  # in the realm import to stop admin events firing on the listener too.
  #
  # The listener emits successes at `debug` and errors at `warn` by
  # default. We raise success-level to `info` so successful logins appear
  # under the default root log level without touching log categories.
  # See https://www.keycloak.org/server/all-provider-config (search for
  # `spi-events-listener-jboss-logging`).
  events:
    # -- Log level for successful auth / admin events.
    successLevel: "info"
    # -- Log level for error events (LOGIN_ERROR, etc.).
    errorLevel: "warn"

  # -- Keycloak logging output.
  log:
    # -- Console output format. Only `default` and `json` are valid;
    # Keycloak rejects any other value at startup. `default` is
    # human-readable plain text; `json` is structured one-record-per-line,
    # friendlier for external log aggregators (Loki / ELK / Datadog).
    # Local dev overrides this to `default` in `values-local.yaml` for
    # readable `kubectl logs`.
    consoleOutput: "json"

  # -- Extra environment variables appended verbatim to the Keycloak container.
  # The chart does not model Keycloak's still-evolving OpenTelemetry options, so
  # wire observability here. All signals push over OTLP to a collector — traces,
  # metrics, and logs share one endpoint and one auth header:
  #   extraEnv:
  #     - name: KC_TRACING_ENABLED
  #       value: "true"
  #     - name: KC_TRACING_ENDPOINT
  #       value: "http://otel-collector:4317"
  #     - name: KC_TELEMETRY_HEADER_AUTHORIZATION  # token from a Secret, never inline
  #       valueFrom:
  #         secretKeyRef: { name: otel-creds, key: authorization }
  # Each entry is a raw corev1.EnvVar (name/value or name/valueFrom). Appended
  # after the chart's own env, so an entry reusing a built-in KC_ name overrides
  # it (Kubernetes env is last-wins).
  extraEnv: []

  # -- Test user bootstrapped via realm import.
  # DISABLED by default — production deployments must not ship a known credential.
  # Local dev and e2e tests (via values-local.yaml) enable it.
  testUser:
    enabled: false
    username: null
    password: null

  # -- Second test user for e2e foreign-user (fork) scenarios.
  # DISABLED by default — only the e2e overlay (values-e2e.yaml) enables it.
  testUser2:
    enabled: false
    username: null
    password: null

  # -- Database connection (empty host = use shared local postgres)
  db:
    host: ""
    port: 5432
    user: platform_keycloak
    password: null
    database: keycloak
    # Postgres TLS mode for an external DB: require | verify-ca | verify-full.
    # null = no TLS (the in-cluster postgres). verify-ca/verify-full need caCert.
    sslmode: null
    # CA certificate (PEM) used to verify the external DB's TLS certificate.
    # Required for sslmode verify-ca/verify-full when the DB presents a private CA.
    caCert: ""

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- Ingress (hostnames derived from `domain` and `urls` values above)
#
# Set `enabled: false` to skip rendering the bundled Ingress entirely — useful
# when you're routing traffic via an external Ingress controller, Gateway API,
# service mesh, or LoadBalancer that you manage outside the chart. In that
# mode you should populate the `urls:` block above so the chart's internal
# config (Keycloak issuer, OAuth redirect URIs, NEXTAUTH_URL, KC_HOSTNAME,
# API server browser-facing URLs) matches the hostnames your external router
# actually serves.
#
# When `enabled: true`, the Ingress generates one rule per service:
#   - If a `urls.{service}` override is set, the override hostname is routed.
#   - Otherwise `{prefix}.{domain}` (and any `aliasDomains`) are routed.
ingress:
  enabled: true
  className: ""
  annotations: {}
  # -- Extra alias domains that mirror convention-based subdomain routes
  # (hostname only, no port). Ignored for any service with an explicit
  # `urls.{service}` override.
  aliasDomains: ["localtest.me"]
  # -- When true, adds a host-less Ingress rule for the app (UI + `/api/*`)
  # that matches *any* Host header — including IP literals (`127.0.0.1`)
  # which the K8s Ingress validator otherwise rejects in `host:` fields.
  # Useful for local dev where you want to reach the cluster by IP or by
  # an unplanned alias. Off by default — convention-based hostnames cover
  # production, and a catch-all weakens host-based isolation.
  catchAllAppHost: false
  # -- TLS rules passed through verbatim to `Ingress.spec.tls`. The chart does
  # NOT auto-derive `hosts` from rules — when you set any `urls.{service}`
  # override, you must also list those hostnames here (or reference them via
  # cert-manager annotations on the Ingress) so the certificate covers what
  # the Ingress actually serves. Mismatches will not be caught at lint time.
  tls: []
  # For production with TLS (convention-based hostnames):
  #   aliasDomains: []
  #   tls:
  #     - secretName: platform-tls
  #       hosts: ["example.com", "keycloak.example.com"]
  #
  # For production with TLS + URL overrides — list the override hostnames:
  #   aliasDomains: []
  #   tls:
  #     - secretName: platform-tls
  #       hosts: ["app.example.com", "api.example.com", "auth.example.com"]

# -- UI (nginx serving static SPA, reverse-proxies /api to API server)
ui:
  # -- Extra annotations for the Deployment object / its pod template
  # (merged over commonAnnotations / commonPodAnnotations).
  annotations: {}
  podAnnotations: {}
  image:
    repository: quay.io/dam-agents/ui
    tag: "" # defaults to appVersion
    pullPolicy: IfNotPresent
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# -- API Server
apiServer:
  # -- Extra annotations for the Deployment object / its pod template
  # (merged over commonAnnotations / commonPodAnnotations).
  annotations: {}
  podAnnotations: {}
  image:
    repository: quay.io/dam-agents/api-server
    tag: ""
    pullPolicy: IfNotPresent
  port: 4000
  harnessServerPort: 4001
  # -- Minimum severity emitted by the structured logger
  # (`error`|`warn`|`info`|`debug`). The security audit trail is logged at
  # common levels (denials → warn, allowed/successful actions → info), so the
  # default `info` keeps the full trail on; raise to `warn` to keep only
  # denials/failures, or `error` to silence the trail. There is no separate
  # audit on/off switch — visibility is governed here as usual.
  logLevel: info
  # -- ext_authz gRPC listener for the Envoy sidecar's HITL gate.
  # Single endpoint: Envoy's HTTP filter (L7,
  # TLS-terminated chains) and network filter (L4, catch-all chain) both
  # call this port; the handler reads whichever attributes are populated.
  # Cluster-internal only; never routed via ingress.
  extAuthzPort: 4002
  # -- Slack bot token (xoxb-...) for the platform-wide Slack app. Leave empty to disable Slack integration.
  slackBotToken: ""
  # -- Slack app-level token (xapp-...) for Socket Mode. Required alongside slackBotToken.
  slackAppToken: ""
  # -- Enable the Telegram channel. Each agent can connect its own bot token via the UI.
  telegramEnabled: false
  # -- Activity tracking saga: when enabled, the api-server captures user
  # logins and channel turns into the `activity_events` table for the
  # usage reporting endpoints. Disable to stop all writes (the read
  # endpoints are independently gated by `keycloak.inspectorRole`).
  activityTracking:
    enabled: true
    # -- HMAC key used to pseudonymize Keycloak `sub` values written to
    # `activity_events`, `actor_roles`, and `instances.owner_sub` (GDPR
    # Art. 32 risk reduction). Leave empty to have the chart generate and
    # persist one in a Secret; rotating breaks every existing row, so it
    # must remain stable. Provide your own (≥32 chars) for cross-cluster
    # consistency or compliance audit trails.
    hmacKey: ""
  # -- API keys for headless / CI use.
  apiKeys:
    # -- HMAC pepper for at-rest API-key token digests. Leave empty to have
    # the chart generate and persist one in a Secret; rotating it invalidates
    # every existing API key, so it must remain stable. Provide your own
    # (≥32 chars) for cross-cluster consistency.
    hmacKey: ""
  # -- Default hold window (seconds) for HITL ext_authz approvals. The held
  # call resolves on user verdict or denies on timeout; the durable
  # pending_approvals row outlives the hold and is consumed by the agent's
  # next retry. Default 30 minutes. Per-CLI read
  # timeouts are an external ceiling.
  approvalHoldSeconds: 1800

  # -- Hard ceiling for file-import bundle uploads, in bytes. Enforced at
  # the api-server proxy boundary (rejects oversized Content-Length AND
  # destroys the upstream pipe when streamed bytes pass the cap). The
  # default 5 GiB is generous enough for a `.git/`-bearing project import
  # while sitting below the controller-default agent PVC of 10 GiB.
  # **Lower this on clusters with smaller per-agent PVCs** — e.g. the
  # bundled `claude-code` template ships with `homeMountSize: 5Gi`, so a
  # 5 GiB import could fill the disk.
  maxImportBundleBytes: 5368709120

  # -- Minimum dam CLI version this server accepts (semver, e.g. "1.2.0").
  # Empty/unset means no floor — every CLI is accepted (a soft-warn fires
  # if the CLI is behind the current server version). Set this to retire a
  # known-broken older client.
  minClientCliVersion: ""

  # -- Ingress NetworkPolicy for the api-server pod.
  # Restricts the agent-facing ports (`harness`, `ext-authz`) to ingress from
  # pods carrying `agent-platform.ai/agent` (agent + fork pods) in agentNamespace.
  # The HTTP port stays open so the UI / ingress controller can reach it;
  # JWT auth at the application layer protects that one. Disable in
  # environments without NetworkPolicy support (e.g. some bare clusters).
  networkPolicy:
    enabled: true

  # -- Hosts seeded into the `trusted` egress preset.
  # Each entry becomes an active `(agent, host, *, *, allow, source=preset:trusted)`
  # row when an agent is created with `egressPreset: trusted`. Values are
  # **literal hostnames only** — no wildcards, no schemes, no paths. SNI
  # matches are exact; a `pkg.go.dev` rule does not cover `proxy.golang.org`.
  #
  # Curated to mirror Anthropic's published default-allowed-domain list for
  # Claude Code so harnesses with "claude --trust-defaults" behavior keep
  # working without per-host inbox prompts:
  #   https://code.claude.com/docs/en/claude-code-on-the-web#default-allowed-domains
  #
  # Operators can append, remove, or replace entries here; rules are seeded
  # once at agent-create time, so editing this list does not retroactively
  # touch existing agents (they keep whatever was seeded for them).
  trustedHosts:
    # Anthropic
    - api.anthropic.com
    - statsig.anthropic.com
    - claude.ai
    # NPM / Yarn / pnpm
    - registry.npmjs.org
    - registry.yarnpkg.com
    # Python
    - pypi.org
    - files.pythonhosted.org
    # GitHub
    - github.com
    - api.github.com
    - codeload.github.com
    - objects.githubusercontent.com
    - raw.githubusercontent.com
    # Container registries
    - quay.io
    - registry-1.docker.io
    # Go modules
    - proxy.golang.org
    - sum.golang.org
    - go.dev
    # Rust
    - crates.io
    - static.crates.io
    - sh.rustup.rs
    # CDNs commonly used by toolchains
    - cdn.jsdelivr.net
    - unpkg.com
    # Mise (toolchain manager)
    - mise.jdx.dev
    - cdn.mise.run
    # Bob Shell (IBM)
    - api.us-east.bob.ibm.com

  # -- Optional platform-wide defaults for OAuth app credentials. When a field
  # is set the connect form for the matching app collapses the corresponding
  # input behind an "override" toggle — every user shares the admin-registered
  # app by default, but can still substitute their own credentials when needed.
  # Leave empty to require each user to supply their own client id / secret.
  #
  # `appSlug` is only relevant when the registered app is a GitHub App (not
  # an OAuth App). The slug is the URL-friendly identifier from the app's
  # GitHub URL (`https://github.com/apps/{slug}`). When set, the platform
  # offers users a one-click installation step after authorizing the app —
  # GitHub Apps see no private data without an installation, so without this
  # the user would only have access to public repos. Leave empty for OAuth
  # Apps.
  oauthAppDefaults:
    github:
      clientId: ""
      clientSecret: ""
      appSlug: ""
    githubEnterprise:
      host: ""
      clientId: ""
      clientSecret: ""
      appSlug: ""
    # The Slack app must be registered out of band (Slack offers no dynamic
    # client registration) with the platform OAuth callback as a redirect URL
    # and the Slack MCP user-token scopes enabled.
    slack:
      clientId: ""
      clientSecret: ""

  # -- Database connection (empty host = use shared local postgres)
  db:
    host: ""
    port: 5432
    user: platform_apiserver
    password: null
    database: platform
    # Postgres TLS mode for an external DB: require | verify-ca | verify-full.
    # null = no TLS (the in-cluster postgres). verify-ca/verify-full need caCert.
    sslmode: null
    # CA certificate (PEM) used to verify the external DB's TLS certificate.
    # Required for sslmode verify-ca/verify-full when the DB presents a private CA.
    caCert: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- Controller (Go reconciler + scheduler)
controller:
  # -- Extra annotations for the controller Deployment object / its pod
  # template (merged over commonAnnotations / commonPodAnnotations). These
  # apply to the controller pod itself, not the agent pods it launches (those
  # have their own knobs under controller.agent).
  annotations: {}
  podAnnotations: {}
  image:
    repository: quay.io/dam-agents/controller
    tag: ""
    pullPolicy: IfNotPresent

  # -- slog level for the controller: debug | info | warn | error.
  logLevel: info

  # -- Agent pod configuration. Three layers, applied at reconcile time:
  #   1. `base`             — chart-only platform policy, applied verbatim
  #                           to every agent + fork agent pod.
  #   2. `templateDefaults` — chart-wide fallbacks for fields a template
  #                           can override (template wins when set).
  #   3. agentTemplates[]   — per-template values (further down).
  # Use the literal string `$HOME` in mount paths; the chart substitutes
  # it at render time with the template's `agentHome` if set, else
  # `templateDefaults.agentHome`.
  agent:
    base:
      # Cluster details (immutable per-agent)
      imagePullSecrets: [] # must exist in agentNamespace
      # storageClass must support ReadWriteMany so per-turn fork pods can
      # mount /home/agent concurrently with the long-lived pod. Empty =
      # cluster default. Set to "platform-rwx" for the bundled NFS provisioner.
      storageClass: ""
      accessMode: ReadWriteMany # ReadWriteOnce for single-node dev

      # Lifecycle
      idleTimeout: "1h" # hibernate idle agents; "0s" disables
      terminationGracePeriod: 5 # gateway pods have a hardcoded drain

      # Pod metadata + scheduling
      extraLabels: {}
      extraAnnotations: {}
      nodeSelector: {}
      # If a GPU node is tainted, add a matching toleration here (applies to
      # every agent pod, but only the GPU pod requests nvidia.com/gpu).
      tolerations: []
      affinity: {}
      topologySpreadConstraints: []
      priorityClassName: ""
      runtimeClassName: "" # e.g. "kata" for sandboxed runtimes

      # Probes (each sub-field overrides the controller's built-in probe).
      # Gated by top-level `probes.enabled`.
      probes: {}

      # ━━━ SECURITY DEFAULTS — DO NOT CHANGE WITHOUT REVIEW ━━━
      # These ship the cluster-enforced sandbox boundary the platform relies on.
      # Relaxing them gives the agent container privileges that bypass the
      # paired-pod credential split and the L7 ext_authz gate.
      # Agent ConfigMaps cannot set these — chart-only by design.
      # UID 65532 matches the `USER` directive in packages/*/Dockerfile.
      podSecurityContext:
        runAsUser: 65532
        runAsGroup: 65532
        runAsNonRoot: true
      containerSecurityContext:
        runAsUser: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]

      # ━━━ EGRESS LOCKDOWN — pick ONE mode ━━━
      # Two mutually-exclusive layers (the chart validates). Both ride
      # on top of HTTPS_PROXY (IP-direct), the per-pair NetworkPolicy,
      # and the namespace deny-all baseline.
      #
      #   - iptablesInit: privileged init container, plain OCI runtime.
      #     Requires netfilter modules in the guest.
      #
      #   - npGateInit: unprivileged init container, works on guests
      #     without netfilter (Kata/CoCo on OpenShift Sandboxed Containers).
      iptablesInit:
        enabled: true
        # SIG Release distroless-iptables — same image kube-proxy uses.
        # Ships sh + iptables-wrapper; pinned by tag.
        image: registry.k8s.io/build-image/distroless-iptables:v0.9.2

      # -- Userspace init container that blocks the agent's main
      # container until the egress NetworkPolicy is verifiably enforced.
      # Runs a small shell+curl probe; no caps, works against any guest kernel.
      npGateInit:
        enabled: false
        # Hardened curl image for the probe. The probe is a `sh` loop, so it
        # needs a shell — use the `-builder` variant (the distroless curl image
        # has no shell). Any image works as long as it provides /bin/sh + curl.
        image: registry.access.redhat.com/hi/curl:8.20-builder
        # Hard deadline before the init container fails the pod. OVN-K
        # typically converges in well under a second; 30s is generous
        # for cold node churn / controller restart scenarios.
        timeoutSeconds: 30
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    templateDefaults:
      # HOME inside agent containers — set as the `HOME` env var and used at
      # chart render time to substitute any literal `$HOME` in mount paths.
      # Per-template `agentTemplates[i].agentHome` overrides
      # this for that template's agents. Must match the image's user
      # HOME or pod-files materialization breaks silently. Also plumbed to
      # api-server for pod-files producers (currently one global value).
      agentHome: /home/agent

      # Left unset so Kubernetes applies its native, tag-based pull policy:
      # `Always` for a mutable `:latest` (so a repushed tag is actually
      # re-pulled, not served stale from the node cache) and `IfNotPresent`
      # for the immutable sha/digest tags the harness images use. Hardcoding a
      # value here forces it for ALL tags and silently strands `:latest` agents
      # on a cached image. A template or agent can still set its own override.
      imagePullPolicy: ""
      storageSize: "10Gi"
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
        limits:
          cpu: "1"
          memory: "2Gi"
      mounts:
        - path: $HOME
          persist: true
        - path: /tmp
          persist: false
      # No default env. `PORT` is baked into agent-runtime (defaults to 8080).
      # Platform-injected envs (HOME, HTTPS_PROXY, API_SERVER_URL, etc.) are
      # set unconditionally by the controller.
      env: []
      skillSources: []
      # Shell-expanded at runtime — HOME is set on the init container.
      # Templates that need extras (e.g. pip install) REPLACE this entirely.
      init: |
        #!/bin/bash
        # Seed home from image on first boot
        if [ ! -f $HOME/.initialized ]; then
          cp -rn /app/working-dir/. $HOME/ 2>/dev/null || true
          touch $HOME/.initialized
        fi
        mkdir -p $HOME/work

  # -- Warm PVC pool (#692). A background buffer of pre-provisioned,
  # already-Bound spare workspace volumes that a newly created agent claims
  # instantly, instead of waiting tens of seconds to minutes for dynamic
  # provisioning on first start. Refills in the background. Disabled by default;
  # when off the controller behaves exactly as before.
  warmPool:
    enabled: false
    # -- StorageClass for spare PVCs. MUST be an Immediate-binding class
    # (volumeBindingMode: Immediate) so a spare provisions the instant it is
    # created and sits ready. The bundled NFS class (platform-rwx) is
    # WaitForFirstConsumer and will NOT pre-warm — enable
    # nfsProvisioner.warmPoolClass for an Immediate variant, or point this at a
    # cloud RWX class (EFS/Filestore/Azure Files) configured for Immediate.
    storageClass: ""
    # -- How often the manager reconciles inventory toward target.
    replenishInterval: "30s"
    # -- How long a spare may sit provisioning before it's treated as stuck and
    # reclaimed. Must exceed the worst-case healthy provisioning time on your
    # storage, or a slow-but-healthy spare gets reaped and recreated in a loop.
    maxProvisioningTime: "30m"
    # -- Per-size buffers. Each entry is an independent pool: keep `target`
    # ready spares of `size`. An agent claims from the pool matching its
    # effective workspace size; sizes with no pool fall back to dynamic
    # provisioning. Size the pools to your templates' storageSize values.
    sizes: []
    #  - size: "10Gi"
    #    target: 3
    #  - size: "5Gi"
    #    target: 2
  replicas: 1
  # -- Image for the Envoy credential-injector sidecar.
  # Envoy publishes only to Docker Hub; pulled via mirror.gcr.io (Google's
  # pull-through cache, higher anonymous rate limits) — byte-identical to
  # envoyproxy/envoy:distroless-v1.37.2 (same manifest digest).
  envoyImage: mirror.gcr.io/envoyproxy/envoy:distroless-v1.37.2
  # -- Port the Envoy sidecar listens on inside the agent pod (proxy on 127.0.0.1).
  envoyPort: 10000
  # -- TLS interception support for the credential injector. The chart
  # provisions a self-signed CA via cert-manager and a CA ClusterIssuer
  # (`platform-mitm-ca-issuer`) that the controller uses to mint per-agent leaf
  # certs for Envoy to terminate the agent's TLS and inject credential headers.
  # Requires cert-manager to be installed in the cluster (platform's cluster:install
  # task does this).
  envoyMitm:
    enabled: true
    # -- Names of the bootstrap and CA cluster issuers. Cluster-scoped, so consider
    # collisions with other charts.
    bootstrapIssuerName: platform-selfsigned-bootstrap
    caIssuerName: platform-mitm-ca-issuer
    # -- Where the CA Secret lives. Must equal cert-manager's
    # --cluster-resource-namespace flag (default `cert-manager`).
    caSecretNamespace: cert-manager
    caSecretName: platform-mitm-ca
    # -- CA validity. cert-manager will renew before expiry automatically.
    caDuration: 87600h # 10y
    caRenewBefore: 720h # 30d
    # -- Per-agent leaf cert validity.
    leafDuration: 2160h # 90d
    leafRenewBefore: 360h # 15d
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Agent templates. Each enabled entry renders an agent-template ConfigMap
# in `agentNamespace`. Fields named identically to `controller.agent.templateDefaults.*`
# override the chart-wide default for agents created from this template.
# `$HOME` in mount paths is substituted at chart render time
# using this entry's `agentHome` if set, else `templateDefaults.agentHome`.
# `category` groups the entry in the creation wizard's Step 1: "harness"
# (base coding harnesses; the default when omitted) or "preconfigured"
# (curated workload images, e.g. Bugstone). `experimental: true` badges the
# image as alpha in the wizard.
#
# To predefine an *experimental external agent* (a private-registry image users
# just pick from the template list, with no manual "Private registry" entry),
# add an entry with `imagePullSecret`:
#
#   - name: bugstone
#     enabled: true
#     category: preconfigured
#     experimental: true
#     description: "Experimental DAM bug-hunting agent"
#     image:
#       repository: icr.io/dam-agents/bugstone
#       tag: ""
#     storageSize: "5Gi"
#     imagePullSecret:                 # renders a dockerconfigjson Secret in agentNamespace
#       server: icr.io
#       username: iamapikey
#       password: "<registry-api-key>" # keep out of plaintext values in prod (sealed/SOPS/external secret)
#
agentTemplates:
  - name: claude-code
    enabled: true
    description: "Default Claude Code agent"
    telemetry: true
    image:
      repository: quay.io/dam-agents/claude-code
      tag: ""
    storageSize: "5Gi"

  - name: codex
    enabled: true
    description: "OpenAI Codex coding agent"
    image:
      repository: quay.io/dam-agents/codex
      tag: ""
    storageSize: "5Gi"

  - name: pi-agent
    enabled: true
    description: "Pi coding agent with multi-LLM support"
    image:
      repository: quay.io/dam-agents/pi-agent
      tag: ""
    storageSize: "5Gi"

  - name: bob
    enabled: true
    description: "Bob shell agent"
    image:
      repository: quay.io/dam-agents/bob
      tag: ""
    # Bob recommends ≥4 GB RAM (8 GB nicer); storage only holds the home
    # dir + workspace (the bundle lives in the image), so the agent default
    # of 2 Gi is plenty.
    storageSize: "2Gi"
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"

  - name: k-search
    enabled: false
    category: preconfigured
    experimental: true
    description: "K-Search — LLM-driven GPU kernel optimization (Modal eval)"
    image:
      repository: quay.io/dam-agents/k-search
      tag: ""
    storageSize: "5Gi"
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"

  # Same image as k-search, evaluating on an in-cluster NVIDIA GPU
  # (KSEARCH_EVAL_MODE=local). Disabled by default — stays Pending without a GPU.
  # GPU passthrough under Kata needs a GPU-capable runtime class set per-template
  # below (the chart-wide class can't carry the GPU VM config for every agent).
  - name: k-search-local
    enabled: false
    category: preconfigured
    experimental: true
    description: "K-Search — LLM-driven GPU kernel optimization (local GPU eval)"
    image:
      repository: quay.io/dam-agents/k-search
      tag: ""
    storageSize: "10Gi"
    # GPU Kata runtime class (cluster-specific; e.g. "kata-nvidia-gpu" on
    # OpenShift). Adds a podFixed overhead (~1 CPU / 4Gi).
    # runtimeClassName: "kata-nvidia-gpu"
    # Optional — the GPU request already pins to the GPU node.
    # nodeSelector:
    #   nvidia.com/gpu.present: "true"
    env:
      - name: KSEARCH_EVAL_MODE
        value: "local"
      - name: KSEARCH_TARGET_GPU
        value: "A100"
    resources:
      requests:
        cpu: "1"
        memory: "8Gi"
        nvidia.com/gpu: "1"
      limits:
        cpu: "2"
        memory: "16Gi"
        nvidia.com/gpu: "1"

  # Published by CI (build-nous / merge-nous in cd.yml). Experimental: the
  # harness drives long-running Nous campaigns — see packages/agents/nous/README.md.
  - name: nous
    enabled: false
    category: preconfigured
    experimental: true
    description: "Nous hypothesis-driven experimentation agent"
    image:
      repository: quay.io/dam-agents/nous
      tag: ""
    # Campaigns clone, build, and run target systems (plus per-arm git
    # worktrees and a Python venv), so give it more disk than a chat agent.
    storageSize: "10Gi"
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"

  - name: openevolve
    enabled: false
    category: preconfigured
    experimental: true
    description: "OpenEvolve — evolutionary code-optimization agent"
    image:
      repository: quay.io/dam-agents/openevolve
      tag: ""
    storageSize: "5Gi"

  # Test-only mock agent. Scripted ACP emitter; receives prompts
  # into an in-pod buffer and emits a pre-set sequence of session/update
  # frames in response. Default off — flipped on by the e2e/local install.
  - name: mock
    enabled: false
    description: "Scripted mock agent (E2E test fixture)"
    image:
      repository: quay.io/dam-agents/mock
      tag: ""
    storageSize: "1Gi"

# -- E2E test affordances. Gated test-only surface: the api-server
# registers a control tRPC namespace that drives the mock Agent harness over
# the existing ACP relay. Default off — flipped on by the e2e/local install.
e2e:
  enabled: false

# -- Platform-wide skill sources (shared catalog visible to all users).
# Rendered into the api-server pod as SKILL_SOURCES_SEED. The same
# `{name, gitUrl, path?}` shape works for per-template sources under
# `<templateKey>.skillSources`. `path` is an optional repo-relative
# subdirectory to scan; omit it to scan `skills/` then the repo root.
skills:
  skillSources: []
  # Example:
  # skillSources:
  #   - name: "Anthropic Skills"
  #     gitUrl: "https://github.com/anthropics/skills"
  #   - name: "Acme Monorepo Skills"
  #     gitUrl: "https://github.com/acme/monorepo"
  #     path: ".claude/skills"

# -- Curated catalog of public git repos an agent's working directory can be
# seeded from at creation (cloned once into /home/agent/work, shortly after the
# agent starts, via a one-shot `workspace-seed` event — never tracked or pushed
# afterward). Rendered into the `git-repos` ConfigMap and loaded by the
# api-server at boot. Each entry maps to the harness template names it's
# compatible with; the Add Agent dialog filters by the chosen harness (omit
# `compatibleTemplates` to disable an entry). Public repos only.
gitRepos:
  - id: google-workspace
    name: Google Workspace
    url: https://github.com/dam-agents/google-workspace.git
    description: "Tools and skills for working with Google Workspace"
    compatibleTemplates: [claude-code]
  - id: spotify-dj
    name: Spotify DJ
    url: https://github.com/dam-agents/spotify-dj.git
    description: "Build sets, run playback, curate playlists, and discover music on Spotify"
    compatibleTemplates: [claude-code]
  - id: link-guardian
    name: Link Guardian
    url: https://github.com/dam-agents/link-guardian.git
    description: "Monitor and validate links to guard against broken or malicious URLs"
    compatibleTemplates: [claude-code, bob]

# -- Opt-in in-cluster NFS server + external provisioner. Provides an RWX
# StorageClass for dev clusters whose default provisioner is RWO-only.
# Production deployments should leave this disabled and point
# `controller.agent.base.storageClass` at a cloud-native RWX class (EFS,
# Filestore, Azure Files). The bundled nfs-ganesha image is archived upstream
# and breaks on btrfs-backed exports — set `controller.agent.base.accessMode:
# ReadWriteOnce` instead on btrfs hosts.
nfsProvisioner:
  enabled: false
  # Break-glass annotations for admission controllers (e.g. StackRox) since
  # the upstream image is old and needs elevated capabilities.
  annotations: {}
  podAnnotations: {}
  image: registry.k8s.io/sig-storage/nfs-provisioner:v4.0.8
  # Name of the RWX StorageClass created here. Reference it from
  # `controller.agent.base.storageClass`.
  storageClassName: platform-rwx
  # Immediate-binding RWX StorageClass for the warm PVC pool (#692). The default
  # platform-rwx class binds WaitForFirstConsumer (correct for agent PVCs, which
  # provision when their pod schedules) but useless for pre-warming, since a
  # spare would sit Pending until mounted. This variant binds Immediate so
  # spares provision the moment they're created. Reference its name from
  # `controller.warmPool.storageClass`.
  warmPoolClass:
    enabled: false
    name: platform-rwx-immediate
  # Single backing volume that hosts all NFS exports; individual agent PVCs
  # are carved out as subdirectories.
  size: 20Gi
  # StorageClass for the NFS server's own PVC. Empty = cluster default (RWO is fine).
  storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
