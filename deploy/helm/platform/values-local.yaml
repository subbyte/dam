# Local dev: images built with docker and loaded into k3s directly.
# Used via: helm install -f values-local.yaml

ui:
  image:
    repository: platform-ui
    tag: latest
    pullPolicy: Never

apiServer:
  image:
    repository: platform-api-server
    tag: latest
    pullPolicy: Never

controller:
  image:
    repository: platform-controller
    tag: latest
    pullPolicy: Never
  agent:
    base:
      storageClass: platform-rwx
    templateDefaults:
      imagePullPolicy: Never

nfsProvisioner:
  enabled: true

# Helm replaces lists wholesale — this `agentTemplates` array fully
# overrides the one in values.yaml. Every field that the chart sets on
# bundled templates must be repeated here, plus the locally-built image.
# All four templates are enabled by default for local dev.
agentTemplates:
  - name: claude-code
    enabled: true
    description: "Default Claude Code agent"
    image:
      repository: platform-claude-code
      tag: latest
    storageSize: "5Gi"
    skillPaths:
      - $HOME/.claude/skills/

  - name: google-workspace
    enabled: true
    description: "Google Workspace agent with Drive and Gmail via gws CLI"
    image:
      repository: platform-google-workspace-agent
      tag: latest
    storageSize: "2Gi"
    skillPaths:
      - $HOME/.claude/skills/

  - name: pi-agent
    enabled: true
    description: "Pi coding agent with multi-LLM support"
    image:
      repository: platform-pi-agent
      tag: latest
    storageSize: "2Gi"
    skillPaths:
      - $HOME/.pi/agent/skills/

  - name: code-guardian
    enabled: true
    description: "PR code review agent (gh + Claude Code)"
    image:
      repository: platform-code-guardian
      tag: latest
    storageSize: "10Gi"             # larger — clones real repos
    skillPaths:
      - $HOME/.claude/skills/
    # Empty repo = the agent detects via `gh repo view`.
    env:
      - name: GITHUB_REPO
        value: ""

  - name: bob
    enabled: true
    description: "Bob shell agent"
    image:
      repository: platform-bob
      tag: latest
    storageSize: "2Gi"
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"

# Local dev convenience: route requests with any Host header (including
# IP literals like 127.0.0.1) to the app, so the cluster is reachable
# however the developer happens to address it.
ingress:
  catchAllAppHost: true

# Bootstrap a known dev/dev user for local cluster — never enabled in production.
keycloak:
  testUser:
    enabled: true
    username: dev
    password: dev
  extraRedirectUris:
    - "*"
  extraWebOrigins:
    - "*"
