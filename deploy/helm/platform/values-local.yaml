# Local dev: images built with docker and loaded into k3s directly.
# Used via: helm install -f values-local.yaml

ui:
  image:
    repository: platform-ui
    tag: latest
    pullPolicy: Never

apiServer:
  image:
    repository: platform-api-server
    tag: latest
    pullPolicy: Never

controller:
  image:
    repository: platform-controller
    tag: latest
    pullPolicy: Never
  logLevel: debug
  agent:
    base:
      storageClass: platform-rwx
    templateDefaults:
      imagePullPolicy: IfNotPresent

nfsProvisioner:
  enabled: true

# Helm replaces lists wholesale — this `agentTemplates` array fully
# overrides the one in values.yaml. Every field that the chart sets on
# bundled templates must be repeated here, plus the locally-built image.
# All four templates are enabled by default for local dev.
agentTemplates:
  - name: claude-code
    enabled: true
    description: "Default Claude Code agent"
    image:
      repository: platform-claude-code
      tag: latest
    storageSize: "5Gi"

  - name: codex
    enabled: false
    description: "OpenAI Codex coding agent"
    image:
      repository: platform-codex
      tag: latest
    storageSize: "5Gi"

  - name: pi-agent
    enabled: false
    description: "Pi coding agent with multi-LLM support"
    image:
      repository: platform-pi-agent
      tag: latest
    storageSize: "2Gi"

  - name: bob
    enabled: false
    description: "Bob shell agent"
    image:
      repository: platform-bob
      tag: latest
    storageSize: "2Gi"
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"

  - name: mock
    enabled: true
    description: "Scripted mock agent (E2E test fixture)"
    image:
      repository: platform-mock
      tag: latest
    storageSize: "1Gi"
    env:
      - name: MOCK_DEFAULT_REPLY
        value: "Hello from the mock agent."

# Local dev convenience: route requests with any Host header (including
# IP literals like 127.0.0.1) to the app, so the cluster is reachable
# however the developer happens to address it.
ingress:
  catchAllAppHost: true

keycloak:
  # Known dev admin password for the local cluster — never used in production.
  admin:
    password: admin
  image:
    repository: platform-keycloak
    tag: latest
    pullPolicy: Never
  # Bootstrap a known dev/dev user for local cluster — never enabled in production.
  testUser:
    enabled: true
    username: dev
    password: dev
  extraRedirectUris:
    - "*"
  extraWebOrigins:
    - "*"
  # Human-readable Keycloak logs for `mise run cluster:logs` during dev.
  log:
    consoleOutput: "default"

# terms.* are required by the chart validators. Dev placeholder so a
# local install renders and installs without extra flags.
terms:
  version: dev
  text: "Dev placeholder Terms of Use."
