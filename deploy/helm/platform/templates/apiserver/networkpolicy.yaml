{{- if .Values.apiServer.networkPolicy.enabled }}
{{- /*
  Pruned to a coarse perimeter only.

  Per-agent / per-pair admission moved entirely to mesh AuthorizationPolicy
  (the controller renders per-agent policies; chart renders the pod-level
  DENY in auth-policy-pod-deny.yaml). NetworkPolicy in ambient mode is
  identity-blind and sees mesh-to-mesh traffic only as HBONE 15008, so
  fine-grained gating here would be either trivially permissive or trivially
  broken. Coarse perimeter remains useful: it bounds blast radius if the
  mesh control plane fails and keeps non-mesh traffic out.

  Shape:
    - http (4000) from anywhere — UI, ingress controller, in-cluster.
      Application-layer auth (Keycloak JWT) is the gate.
    - harness (4001) from the release namespace only — the waypoint Pod
      synthesised by Istio lives here. The cryptographic per-agent
      check is the per-agent AuthorizationPolicy on the harness path,
      not netpol.
    - ext-authz (4002) from the agent namespace only — per-agent
      Services route from gateway pods here. The cryptographic per-
      agent check is the per-agent AuthorizationPolicy on each
      per-agent Service.
    - HBONE (15008) listed alongside each app port so the kernel-level
      netpol sees the right thing for ambient-routed traffic (Istio
      iptables redirect happens in NAT/MANGLE before FILTER).
*/}}
{{- $appName := printf "%s-apiserver" (include "platform.fullname" .) | trunc 63 | trimSuffix "-" }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $appName }}-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: apiserver
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
  ingress:
    # Public HTTP (tRPC). UI, mobile, ingress controller, anything in-cluster.
    - ports:
        - protocol: TCP
          port: {{ .Values.apiServer.port }}

    # Harness — only from release namespace (where the istio waypoint Pod
    # lives). The waypoint enforces the per-agent principal-to-`:id`
    # check; this rule just keeps the port off-limits to other namespaces.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace | quote }}
      ports:
        - protocol: TCP
          port: {{ .Values.apiServer.harnessServerPort }}
        - protocol: TCP
          port: 15008  # HBONE — required for any mesh-to-mesh hop

    # ext-authz — only from the agent namespace (where gateway pods dial
    # per-agent ext-authz Services). The per-agent AuthorizationPolicy
    # ensures only the matching agent's SA can reach its own Service.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.agentNamespace | quote }}
      ports:
        - protocol: TCP
          port: {{ .Values.apiServer.extAuthzPort }}
        - protocol: TCP
          port: 15008
{{- end }}
