# ADR-041: Istio waypoint that fronts the api-server's harness Service.
# Istio's mesh-controller observes this Gateway resource (gatewayClassName:
# istio-waypoint) and synthesises the waypoint Deployment + Pod itself —
# this chart never declares Pod/Deployment YAML for the waypoint. The
# waypoint terminates inbound HBONE from ztunnel so per-instance L7
# AuthorizationPolicies can apply.
#
# Label discipline: the waypoint Pod inherits this resource's labels.
# `app.kubernetes.io/component: apiserver` is deliberately OMITTED — it
# would collide with the harness Service's pod selector and turn the
# waypoint Pod into a phantom endpoint, breaking the harness path with
# ECONNRESET on every other request.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.istio.waypointName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.selectorLabels" . | nindent 4 }}
    # Standard Istio label that narrows the waypoint to Service-targeted
    # (HBONE) traffic.
    istio.io/waypoint-for: service
spec:
  gatewayClassName: istio-waypoint
  listeners:
    - name: mesh
      port: 15008
      protocol: HBONE
