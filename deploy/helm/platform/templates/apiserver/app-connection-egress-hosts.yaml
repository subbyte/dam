{{/*
Per-provider egress hosts for app-connection grants (ADR-035).
Mounted into the api-server as a JSON file at
/etc/platform/app-connection-egress-hosts. Read once at boot and used by
`setAgentConnections` to insert/revoke `connection:<id>` egress rules per
host when a user grants/ungrants an app connection.

This map is the operator-owned seam for per-provider host info. Editing
the list does not retroactively touch existing grants — only new grant
changes pick it up.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "platform.fullname" . }}-app-connection-egress-hosts
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
data:
  app-connection-egress-hosts.json: |
    {{- toJson (default dict .Values.apiServer.appConnectionEgressHosts) | nindent 4 }}
