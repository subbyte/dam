{{- $appName := printf "%s-apiserver" (include "platform.fullname" .) | trunc 63 | trimSuffix "-" }}
{{- $harnessSvc := printf "%s-harness" $appName | trunc 63 | trimSuffix "-" }}
---
# Public Service. ADR-041: carries only the public HTTP/tRPC port; harness
# moves to the -harness Service (waypoint-fronted) and ext-authz moves to
# per-agent Services rendered by the controller. This Service therefore
# never carries the istio.io/use-waypoint label — browser traffic continues
# to authenticate via Keycloak JWT, no mesh hop needed.
apiVersion: v1
kind: Service
metadata:
  name: {{ $appName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.apiServer.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: apiserver
    app.kubernetes.io/instance: {{ .Release.Name }}
---
# Harness Service (ADR-041). The `istio.io/use-waypoint` LABEL (NOT
# annotation — Istio 1.21+ silently ignores the annotation form) routes
# inbound traffic via the waypoint Gateway declared in waypoint.yaml. The
# waypoint terminates HBONE and applies per-agent AuthorizationPolicies
# (rendered by the controller) before forwarding to the api-server pod.
# A request that reaches the api-server has already been admitted against
# the URL `:id`; handlers can treat `:id` as authenticated.
apiVersion: v1
kind: Service
metadata:
  name: {{ $harnessSvc }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
    istio.io/use-waypoint: {{ .Values.istio.waypointName | quote }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.apiServer.harnessServerPort }}
      targetPort: harness
      protocol: TCP
      name: harness
  selector:
    app.kubernetes.io/component: apiserver
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $appName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/component: apiserver
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "platform.labels" . | nindent 8 }}
        app.kubernetes.io/component: apiserver
    spec:
      {{- include "platform.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "platform.apiserver.serviceAccountName" . }}
      terminationGracePeriodSeconds: 45
      containers:
        - name: apiserver
          image: "{{ .Values.apiServer.image.repository }}:{{ .Values.apiServer.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.apiServer.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: {{ .Values.apiServer.port }}
              name: http
            - containerPort: {{ .Values.apiServer.harnessServerPort }}
              name: harness
            - containerPort: {{ .Values.apiServer.extAuthzPort }}
              name: ext-authz
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "platform.apiserver.db.password.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: {{ include "platform.apiserver.postgres.dsn" . | quote }}
            - name: NAMESPACE
              value: {{ .Values.agentNamespace | quote }}
            # ADR-041: api-server parses agent ID out of the per-agent
            # ext-authz Service hostname Envoy dialled. The release name is
            # the prefix.
            - name: PLATFORM_RELEASE_NAME
              value: {{ include "platform.fullname" . | quote }}
            - name: PORT
              value: {{ .Values.apiServer.port | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.apiServer.logLevel | quote }}
            - name: MCP_PORT
              value: {{ .Values.apiServer.harnessServerPort | quote }}
            - name: PLATFORM_HARNESS_SERVER_URL
              value: "http://{{ include "platform.fullname" . }}-apiserver-harness.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.apiServer.harnessServerPort }}"
            - name: EXT_AUTHZ_PORT
              value: {{ .Values.apiServer.extAuthzPort | quote }}
            - name: UI_BASE_URL
              value: {{ include "platform.url.ui" . | quote }}
            {{- if .Values.apiServer.minClientCliVersion }}
            - name: MIN_CLIENT_CLI_VERSION
              value: {{ .Values.apiServer.minClientCliVersion | quote }}
            {{- end }}
            {{- if .Values.apiServer.slackBotToken }}
            - name: SLACK_BOT_TOKEN
              value: {{ .Values.apiServer.slackBotToken | quote }}
            {{- end }}
            {{- if .Values.apiServer.slackAppToken }}
            - name: SLACK_APP_TOKEN
              value: {{ .Values.apiServer.slackAppToken | quote }}
            {{- end }}
            {{- if .Values.apiServer.telegramEnabled }}
            - name: TELEGRAM_ENABLED
              value: "true"
            {{- end }}
            {{- if .Values.e2e.enabled }}
            - name: E2E_ENABLED
              value: "true"
            {{- end }}
            {{- if .Values.apiServer.activityTracking.enabled }}
            - name: ACTIVITY_TRACKING_ENABLED
              value: "true"
            {{- end }}
            - name: ACTIVITY_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "platform.fullname" . }}-apiserver-activity
                  key: ACTIVITY_HMAC_KEY
            {{- if .Values.keycloak.enabled }}
            - name: KEYCLOAK_URL
              value: "http://{{ include "platform.keycloak.fullname" . }}:{{ .Values.keycloak.port }}"
            - name: KEYCLOAK_EXTERNAL_URL
              value: {{ include "platform.url.keycloak" . | quote }}
            - name: KEYCLOAK_REALM
              value: {{ .Values.keycloak.realm | quote }}
            - name: KEYCLOAK_CLIENT_ID
              value: {{ .Values.keycloak.clientId | quote }}
            - name: KEYCLOAK_CLI_CLIENT_ID
              value: {{ .Values.keycloak.cliClientId | quote }}
            - name: KEYCLOAK_API_AUDIENCE
              value: {{ .Values.keycloak.apiAudience | quote }}
            - name: KEYCLOAK_API_CLIENT_ID
              value: {{ .Values.keycloak.apiClientId | quote }}
            - name: KEYCLOAK_API_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "platform.keycloak.secrets.fullname" . }}
                  key: PLATFORM_API_CLIENT_SECRET
            {{- if .Values.keycloak.requiredRole }}
            - name: KEYCLOAK_REQUIRED_ROLE
              value: {{ .Values.keycloak.requiredRole | quote }}
            {{- end }}
            {{- if .Values.keycloak.inspectorRole }}
            - name: KEYCLOAK_INSPECTOR_ROLE
              value: {{ .Values.keycloak.inspectorRole | quote }}
            {{- end }}
            {{- end }}
            - name: AGENT_HOME
              value: {{ .Values.controller.agent.templateDefaults.agentHome | quote }}
            {{- if .Values.skills.skillSources }}
            - name: SKILL_SOURCES_SEED
              value: {{ .Values.skills.skillSources | toJson | quote }}
            {{- end }}
            {{- with .Values.apiServer.oauthAppDefaults.github }}
            {{- if .clientId }}
            - name: PLATFORM_DEFAULT_GITHUB_CLIENT_ID
              value: {{ .clientId | quote }}
            {{- end }}
            {{- if .clientSecret }}
            - name: PLATFORM_DEFAULT_GITHUB_CLIENT_SECRET
              value: {{ .clientSecret | quote }}
            {{- end }}
            {{- if .appSlug }}
            - name: PLATFORM_DEFAULT_GITHUB_APP_SLUG
              value: {{ .appSlug | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.apiServer.oauthAppDefaults.githubEnterprise }}
            {{- if .host }}
            - name: PLATFORM_DEFAULT_GHE_HOST
              value: {{ .host | quote }}
            {{- end }}
            {{- if .clientId }}
            - name: PLATFORM_DEFAULT_GHE_CLIENT_ID
              value: {{ .clientId | quote }}
            {{- end }}
            {{- if .clientSecret }}
            - name: PLATFORM_DEFAULT_GHE_CLIENT_SECRET
              value: {{ .clientSecret | quote }}
            {{- end }}
            {{- if .appSlug }}
            - name: PLATFORM_DEFAULT_GHE_APP_SLUG
              value: {{ .appSlug | quote }}
            {{- end }}
            {{- end }}
            - name: REDIS_URL
              value: {{ include "platform.redis.url" . | quote }}
            {{- if .Values.redis.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-auth" (include "platform.redis.fullname" .) }}
                  key: password
            {{- end }}
            - name: APPROVAL_HOLD_SECONDS
              value: {{ .Values.apiServer.approvalHoldSeconds | quote }}
            {{- if .Values.apiServer.maxImportBundleBytes }}
            - name: MAX_IMPORT_BUNDLE_BYTES
              value: {{ .Values.apiServer.maxImportBundleBytes | quote }}
            {{- end }}
            - name: TRUSTED_HOSTS_PATH
              value: /etc/platform/trusted-hosts
            # Brand — drives UI title/theme, OAuth client_name, Slack
            # slash command, skill-publish git author + branch prefix.
            - name: BRAND_NAME
              value: {{ .Values.brand.name | quote }}
            - name: BRAND_SHORT
              value: {{ .Values.brand.short | quote }}
            - name: BRAND_TAGLINE
              value: {{ .Values.brand.tagline | quote }}
            - name: BRAND_THEME_LIGHT_ACCENT
              value: {{ .Values.brand.theme.light.accent | quote }}
            - name: BRAND_THEME_LIGHT_ACCENT_HOVER
              value: {{ .Values.brand.theme.light.accentHover | quote }}
            - name: BRAND_THEME_LIGHT_ACCENT_LIGHT
              value: {{ .Values.brand.theme.light.accentLight | quote }}
            - name: BRAND_THEME_DARK_ACCENT
              value: {{ .Values.brand.theme.dark.accent | quote }}
            - name: BRAND_THEME_DARK_ACCENT_HOVER
              value: {{ .Values.brand.theme.dark.accentHover | quote }}
            - name: BRAND_THEME_DARK_ACCENT_LIGHT
              value: {{ .Values.brand.theme.dark.accentLight | quote }}
            {{- if .Values.brand.icon }}
            - name: BRAND_ICON_SVG
              value: {{ .Values.brand.icon | quote }}
            {{- end }}
            - name: TERMS_VERSION
              value: {{ .Values.terms.version | quote }}
            - name: TERMS_TEXT
              value: {{ .Values.terms.text | quote }}
          volumeMounts:
            - name: trusted-hosts
              mountPath: /etc/platform/trusted-hosts
              subPath: trusted-hosts
              readOnly: true
          {{- if .Values.probes.enabled }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          {{- end }}
          resources:
            {{- toYaml .Values.apiServer.resources | nindent 12 }}
      volumes:
        - name: trusted-hosts
          configMap:
            name: {{ include "platform.fullname" . }}-trusted-hosts
            items:
              - key: trusted-hosts
                path: trusted-hosts
