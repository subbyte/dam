{{- /* HMAC key for pseudonymizing Keycloak `sub` values stored by the activity
       tracking subsystem (GDPR Art. 32 risk reduction). Persisted across helm
       upgrades by reading the existing Secret first; rotating it orphans every
       existing row, so it must remain stable. */ -}}
{{- $secretName := printf "%s-apiserver-activity" (include "platform.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $hmacKey := "" }}
{{- if $existing }}
  {{- $hmacKey = index $existing.data "ACTIVITY_HMAC_KEY" | b64dec }}
{{- else }}
  {{- $hmacKey = default (randAlphaNum 48) .Values.apiServer.activityTracking.hmacKey }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
type: Opaque
data:
  ACTIVITY_HMAC_KEY: {{ $hmacKey | b64enc | quote }}
---
{{- /* HMAC pepper for at-rest API-key token digests. Persisted across helm
       upgrades by reading the existing Secret first; rotating it invalidates
       every existing API key, so it must remain stable. */ -}}
{{- $apiKeySecretName := printf "%s-apiserver-apikeys" (include "platform.fullname" .) }}
{{- $apiKeyExisting := lookup "v1" "Secret" .Release.Namespace $apiKeySecretName }}
{{- $apiKeyHmacKey := "" }}
{{- if $apiKeyExisting }}
  {{- $apiKeyHmacKey = index $apiKeyExisting.data "API_KEY_HMAC_KEY" | b64dec }}
{{- else }}
  {{- $apiKeyHmacKey = default (randAlphaNum 48) .Values.apiServer.apiKeys.hmacKey }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $apiKeySecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
type: Opaque
data:
  API_KEY_HMAC_KEY: {{ $apiKeyHmacKey | b64enc | quote }}
