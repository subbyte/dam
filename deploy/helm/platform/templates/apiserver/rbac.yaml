{{/*
API Server RBAC — ServiceAccount, Roles, RoleBindings (release ns + agent ns)
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "platform.apiserver.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
---
# Read-only Role in release namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "platform.apiserver.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "platform.apiserver.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "platform.apiserver.serviceAccountName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "platform.apiserver.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Read/write Role in agent namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "platform.apiserver.serviceAccountName" . }}
  namespace: {{ .Values.agentNamespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    # `delete` powers agent restart: deleting pod-{id}-0 makes the StatefulSet
    # recreate it with the current spec — functionally equivalent to a rolling
    # restart for replicas=1 without racing against the controller's reconcile.
    verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "platform.apiserver.serviceAccountName" . }}
  namespace: {{ .Values.agentNamespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "platform.apiserver.serviceAccountName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "platform.apiserver.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
