{{- if .Values.apiServer.db.password }}
{{- /* External-DB password Secret. The in-cluster postgres password is
       chart-generated (postgres-secrets.yaml, gated on postgres.enabled); for an
       external DB the operator supplies apiServer.db.password and the chart
       materialises it here. The key matches the api-server's secretKeyRef
       (POSTGRES_APISERVER_PASSWORD) so it resolves whether the password comes
       from here or from the shared postgres Secret. Operator-supplied, so no
       generate-and-persist lookup is needed. */ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "platform.apiserver.secrets.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_APISERVER_PASSWORD: {{ .Values.apiServer.db.password | b64enc | quote }}
{{- end }}
