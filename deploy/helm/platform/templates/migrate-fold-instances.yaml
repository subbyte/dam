{{- /*
ADR-046 migration: fold legacy `agent-platform.ai/type=agent-instance`
ConfigMaps into their parent `type=agent` CMs, and remap every Postgres
row's `instance_id` value to the parent `agent_id`.

Runs as a Helm POST-upgrade hook so the new controller is already in
place by the time we mutate the CMs. The controller can't reconcile the
pre-merge two-CM shape — between the new image rolling out and this Job
finishing, the existing StatefulSets sit unreconciled but not deleted.

A fresh install is a no-op: there are no `agent-instance` CMs to fold.

Permissions: the Job needs `get/list/patch/delete` on ConfigMaps in the
agent namespace, plus the same DATABASE_URL the api-server uses.
*/ -}}
{{- $jobName := printf "%s-migrate-fold-instances" (include "platform.fullname" .) | trunc 63 | trimSuffix "-" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $jobName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $jobName }}
  namespace: {{ .Values.agentNamespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $jobName }}
  namespace: {{ .Values.agentNamespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $jobName }}
subjects:
  - kind: ServiceAccount
    name: {{ $jobName }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $jobName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-upgrade
    helm.sh/hook-weight: "1"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "platform.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ $jobName }}
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: "{{ .Values.apiServer.image.repository }}:{{ .Values.apiServer.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.apiServer.image.pullPolicy | default "IfNotPresent" }}
          command:
            - node
            - dist/scripts/migrate-fold-instances.js
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "platform.apiserver.db.password.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: {{ include "platform.apiserver.postgres.dsn" . | quote }}
            - name: NAMESPACE
              value: {{ .Values.agentNamespace | quote }}
