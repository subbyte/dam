{{/*
agent-platform.ai CRDs (Agent, Fork) — ADR-058.

The manifests under files/crds/ are generated from the controller's Go types
by `mise run controller:generate` (controller-gen). This wrapper ships them as
ordinary templated resources so `helm upgrade` propagates schema changes —
unlike the chart `crds/` directory, which Helm never upgrades. controller-gen
only ever writes files/crds/, so regeneration never clobbers this gate.

Templates remain ConfigMaps (chart-shipped, not custom resources), so the chart
contains no CR instances and there is no CRD-before-CR install ordering hazard.
*/}}
{{- if .Values.crds.enabled }}
{{- range $path, $_ := .Files.Glob "files/crds/*.yaml" }}
{{ $.Files.Get $path }}
{{- end }}
{{- end }}
