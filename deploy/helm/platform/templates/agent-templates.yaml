{{/*
Agent template ConfigMaps. One per enabled entry in `.Values.agentTemplates`.
Each becomes an agent-template ConfigMap the api-server lists by the
`agent-platform.ai/type: agent-template` label.

Only fields the template differs on are rendered. Anything omitted falls
through at reconcile time to `controller.agent.templateDefaults.*` (chart
fallback) or `controller.agent.base.*` (chart-only policy).

The literal string `$HOME` in mount paths and skillPaths is substituted
HERE (chart render time) using the template's `agentHome` if set, else
`controller.agent.templateDefaults.agentHome`. The rendered ConfigMap
ships absolute paths — the controller and agent-runtime never see `$HOME`.
*/}}
{{- range $tmpl := .Values.agentTemplates }}
{{- if $tmpl.enabled }}
{{- $home := $tmpl.agentHome | default $.Values.controller.agent.templateDefaults.agentHome }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $tmpl.name }}
  namespace: {{ $.Values.agentNamespace }}
  labels:
    {{- include "platform.labels" $ | nindent 4 }}
    agent-platform.ai/type: agent-template
data:
  spec.yaml: |
    version: agent-platform.ai/v1
    image: "{{ $tmpl.image.repository }}:{{ $tmpl.image.tag | default $.Chart.AppVersion }}"
    description: {{ $tmpl.description | quote }}
    agentHome: {{ $home | quote }}
    {{- with $tmpl.image.pullPolicy }}
    imagePullPolicy: {{ . | quote }}
    {{- end }}
    {{- with $tmpl.storageSize }}
    storageSize: {{ . | quote }}
    {{- end }}
    {{- with $tmpl.resources }}
    resources:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $tmpl.mounts }}
    mounts:
      {{- range . }}
      - path: {{ .path | replace "$HOME" $home | quote }}
        persist: {{ .persist }}
        {{- with .size }}
        size: {{ . | quote }}
        {{- end }}
      {{- end }}
    {{- end }}
    {{- with $tmpl.env }}
    env:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $tmpl.skillPaths }}
    skillPaths:
      {{- range . }}
      - {{ . | replace "$HOME" $home | quote }}
      {{- end }}
    {{- end }}
    {{- with $tmpl.skillSources }}
    skillSources:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $tmpl.init }}
    init: |
      {{- . | nindent 6 }}
    {{- end }}
{{- end }}
{{- end }}
