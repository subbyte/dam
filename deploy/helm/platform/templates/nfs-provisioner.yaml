{{/*
In-cluster NFS server + external provisioner — opt-in.

Ships an RWX-capable StorageClass (`platform-rwx` by default) so dev clusters
(k3s-on-lima, kind, minikube) whose default provisioner is RWO-only can
satisfy the agent instance PVC's ReadWriteMany access mode. The agent PVC
needs RWX because per-turn foreign-user "fork" pods (ADR DRAFT — Slack
per-turn user impersonation) mount the same /home/agent volume as the
main pod concurrently.

Production deployments on managed K8s should leave this disabled and
point `controller.agentStorageClass` at the cloud-native RWX class
(EFS / Filestore / Azure Files).
*/}}
{{- if .Values.nfsProvisioner.enabled }}
{{- $name := printf "%s-nfs-provisioner" (include "platform.fullname" .) | trunc 63 | trimSuffix "-" }}
{{- $provisioner := printf "agent-platform.ai/%s" $name }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: nfs-provisioner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $name }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: nfs-provisioner
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "update"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "update", "patch"]
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $name }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: nfs-provisioner
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ $name }}
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}-leader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: nfs-provisioner
rules:
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}-leader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: nfs-provisioner
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ $name }}-leader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: nfs-provisioner
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: nfs-provisioner
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: nfs
      port: 2049
      protocol: TCP
    - name: nfs-udp
      port: 2049
      protocol: UDP
    - name: nlockmgr
      port: 32803
      protocol: TCP
    - name: nlockmgr-udp
      port: 32803
      protocol: UDP
    - name: mountd
      port: 20048
      protocol: TCP
    - name: mountd-udp
      port: 20048
      protocol: UDP
    - name: rquotad
      port: 875
      protocol: TCP
    - name: rquotad-udp
      port: 875
      protocol: UDP
    - name: rpcbind
      port: 111
      protocol: TCP
    - name: rpcbind-udp
      port: 111
      protocol: UDP
    - name: statd
      port: 662
      protocol: TCP
    - name: statd-udp
      port: 662
      protocol: UDP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: nfs-provisioner
  {{- with .Values.nfsProvisioner.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  serviceName: {{ $name }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: nfs-provisioner
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "platform.labels" . | nindent 8 }}
        app.kubernetes.io/component: nfs-provisioner
      {{- with .Values.nfsProvisioner.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- include "platform.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ $name }}
      terminationGracePeriodSeconds: 10
      containers:
        - name: nfs-provisioner
          image: {{ .Values.nfsProvisioner.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: nfs
              containerPort: 2049
              protocol: TCP
            - name: nfs-udp
              containerPort: 2049
              protocol: UDP
            - name: nlockmgr
              containerPort: 32803
              protocol: TCP
            - name: nlockmgr-udp
              containerPort: 32803
              protocol: UDP
            - name: mountd
              containerPort: 20048
              protocol: TCP
            - name: mountd-udp
              containerPort: 20048
              protocol: UDP
            - name: rquotad
              containerPort: 875
              protocol: TCP
            - name: rquotad-udp
              containerPort: 875
              protocol: UDP
            - name: rpcbind
              containerPort: 111
              protocol: TCP
            - name: rpcbind-udp
              containerPort: 111
              protocol: UDP
            - name: statd
              containerPort: 662
              protocol: TCP
            - name: statd-udp
              containerPort: 662
              protocol: UDP
          securityContext:
            capabilities:
              add:
                - DAC_READ_SEARCH
                - SYS_RESOURCE
          args:
            - "-provisioner={{ $provisioner }}"
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SERVICE_NAME
              value: {{ $name }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            {{- toYaml .Values.nfsProvisioner.resources | nindent 12 }}
          volumeMounts:
            - name: export
              mountPath: /export
  volumeClaimTemplates:
    - metadata:
        name: export
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.nfsProvisioner.storageClass }}
        storageClassName: {{ .Values.nfsProvisioner.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.nfsProvisioner.size }}
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.nfsProvisioner.storageClassName }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: nfs-provisioner
provisioner: {{ $provisioner }}
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
parameters:
  mountOptions: "vers=4.1"
{{- end }}
