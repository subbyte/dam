{{- if .Values.postgres.enabled }}
{{- /* Per-role PostgreSQL credentials. Three roles, three
       independent passwords. Persisted across helm upgrades by reading
       the existing Secret first. */ -}}
{{- $pgSecretName := include "platform.postgres.secrets.fullname" . }}
{{- $existingPgSecret := lookup "v1" "Secret" .Release.Namespace $pgSecretName }}
{{- $apiserverPassword := "" }}
{{- $keycloakPassword := "" }}
{{- $adminPassword := "" }}
{{- $legacyPassword := "" }}
{{- if $existingPgSecret }}
  {{- $apiserverPassword = index $existingPgSecret.data "POSTGRES_APISERVER_PASSWORD" | default "" | b64dec }}
  {{- $keycloakPassword = index $existingPgSecret.data "POSTGRES_KEYCLOAK_PASSWORD" | default "" | b64dec }}
  {{- $adminPassword = index $existingPgSecret.data "POSTGRES_ADMIN_PASSWORD" | default "" | b64dec }}
  {{- /* Upgrade from the single-superuser chart, which stored one shared
         POSTGRES_PASSWORD: that is the existing bootstrap superuser's real
         password. Carry it forward as the admin password so the migration
         Job can still authenticate as that role on the running database. */ -}}
  {{- $legacyPassword = index $existingPgSecret.data "POSTGRES_PASSWORD" | default "" | b64dec }}
{{- end }}
{{- if not $apiserverPassword }}
  {{- $apiserverPassword = default (randAlphaNum 32) .Values.postgres.apiserverPassword }}
{{- end }}
{{- if not $keycloakPassword }}
  {{- $keycloakPassword = default (randAlphaNum 32) .Values.postgres.keycloakPassword }}
{{- end }}
{{- if not $adminPassword }}
  {{- $adminPassword = .Values.postgres.adminPassword | default $legacyPassword | default (randAlphaNum 32) }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $pgSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_APISERVER_PASSWORD: {{ $apiserverPassword | b64enc | quote }}
  POSTGRES_KEYCLOAK_PASSWORD: {{ $keycloakPassword | b64enc | quote }}
  POSTGRES_ADMIN_PASSWORD: {{ $adminPassword | b64enc | quote }}
{{- end }}
