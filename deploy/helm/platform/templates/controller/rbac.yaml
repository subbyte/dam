{{/*
Controller RBAC — ServiceAccount, Role/ClusterRole, RoleBinding/ClusterRoleBinding.
When agentNamespace == release namespace, namespace-scoped RBAC is used (no cluster-admin required).
*/}}
{{- $clusterScoped := ne .Values.agentNamespace .Release.Namespace -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "platform.controller.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
---
apiVersion: rbac.authorization.k8s.io/v1
{{- if $clusterScoped }}
kind: ClusterRole
{{- else }}
kind: Role
{{- end }}
metadata:
  name: {{ include "platform.controller.serviceAccountName" . }}
  {{- if not $clusterScoped }}
  namespace: {{ .Release.Namespace }}
  {{- end }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ADR-041: per-instance ServiceAccounts give the agent + gateway pods
  # their SPIFFE workload identity. Owner-refed to the instance CM; K8s
  # GC reaps them on instance deletion.
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ADR-041: per-instance Istio AuthorizationPolicies (gateway admission,
  # harness path-prefix at the waypoint, ext-authz Service principal).
  - apiGroups: ["security.istio.io"]
    resources: ["authorizationpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Per-pair agent egress NetworkPolicy. Mesh AuthorizationPolicy gates
  # ingress to the gateway pod; this NP closes the symmetric egress hole
  # at the kernel layer so the agent process cannot bypass HTTPS_PROXY.
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
{{- if and .Values.controller .Values.controller.envoyMitm .Values.controller.envoyMitm.enabled }}
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
{{- if $clusterScoped }}
kind: ClusterRoleBinding
{{- else }}
kind: RoleBinding
{{- end }}
metadata:
  name: {{ include "platform.controller.serviceAccountName" . }}
  {{- if not $clusterScoped }}
  namespace: {{ .Release.Namespace }}
  {{- end }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  {{- if $clusterScoped }}
  kind: ClusterRole
  {{- else }}
  kind: Role
  {{- end }}
  name: {{ include "platform.controller.serviceAccountName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "platform.controller.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
