{{/*
Controller RBAC — ServiceAccount, Role/ClusterRole, RoleBinding/ClusterRoleBinding.
When agentNamespace == release namespace, namespace-scoped RBAC is used (no cluster-admin required).
*/}}
{{- $clusterScoped := ne .Values.agentNamespace .Release.Namespace -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "platform.controller.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
---
apiVersion: rbac.authorization.k8s.io/v1
{{- if $clusterScoped }}
kind: ClusterRole
{{- else }}
kind: Role
{{- end }}
metadata:
  name: {{ include "platform.controller.serviceAccountName" . }}
  {{- if not $clusterScoped }}
  namespace: {{ .Release.Namespace }}
  {{- end }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
rules:
  # ADR-058: the reconciled resources are agent-platform.ai/v1 Agent + Fork
  # custom resources. The controller watches them and is the sole writer of
  # their status subresource (ADR-059); the api-server owns spec.
  - apiGroups: ["agent-platform.ai"]
    resources: ["agents", "forks"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["agent-platform.ai"]
    resources: ["agents/status", "forks/status"]
    verbs: ["get", "update", "patch"]
  # The children the controller renders (Envoy bootstrap CM, StatefulSets,
  # Services, …) are owner-refed to the Agent/Fork CR with blockOwnerDeletion.
  # K8s admission only permits that if the creator can update the owner's
  # finalizers, so the controller needs the agents/forks finalizers subresource.
  # (Pre-ADR-058 the children were owned by the agent ConfigMap, hence the old
  # configmaps/finalizers grant — now dead.)
  - apiGroups: ["agent-platform.ai"]
    resources: ["agents/finalizers", "forks/finalizers"]
    verbs: ["update"]
  # ConfigMaps for the chart-shipped templates and the controller-rendered Envoy
  # bootstrap CM (owner-refed to the Agent/Fork).
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ADR-041: per-agent ServiceAccounts give the agent + gateway pods
  # their SPIFFE workload identity. Owner-refed to the agent CM; K8s
  # GC reaps them on agent deletion.
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ADR-041: per-agent Istio AuthorizationPolicies (gateway admission,
  # harness path-prefix at the waypoint, ext-authz Service principal).
  - apiGroups: ["security.istio.io"]
    resources: ["authorizationpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Per-pair agent egress NetworkPolicy. Mesh AuthorizationPolicy gates
  # ingress to the gateway pod; this NP closes the symmetric egress hole
  # at the kernel layer so the agent process cannot bypass HTTPS_PROXY.
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Agent workspace PVCs: list/delete for reclamation + orphan GC. The warm
  # pool (#692) additionally creates pre-provisioned spares and updates them to
  # claim one for a new agent (relabel), so create/update/patch are required
  # when it's enabled — harmless to grant unconditionally.
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Read-only StorageClass access so the warm pool can warn at startup when its
  # configured class binds WaitForFirstConsumer (which defeats pre-warming).
  # Best-effort: the manager degrades to a logged warning without this (e.g.
  # under namespace-scoped RBAC, where cluster-scoped StorageClasses aren't
  # grantable).
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    # Per-fork gateway Pod (ADR-038): the fork's paired gateway is a bare
    # Pod, not a StatefulSet, so the controller needs full CRUD on pods
    # in the agent namespace to bring it up and tear it down with the
    # fork Job. Owner-refed to the fork ConfigMap.
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
{{- if and .Values.controller .Values.controller.envoyMitm .Values.controller.envoyMitm.enabled }}
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
{{- if $clusterScoped }}
kind: ClusterRoleBinding
{{- else }}
kind: RoleBinding
{{- end }}
metadata:
  name: {{ include "platform.controller.serviceAccountName" . }}
  {{- if not $clusterScoped }}
  namespace: {{ .Release.Namespace }}
  {{- end }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  {{- if $clusterScoped }}
  kind: ClusterRole
  {{- else }}
  kind: Role
  {{- end }}
  name: {{ include "platform.controller.serviceAccountName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "platform.controller.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
