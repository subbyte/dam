{{/*
Controller Deployment — Go reconciler + scheduler
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "platform.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
  {{- include "platform.annotations" (dict "root" $ "component" .Values.controller) | nindent 2 }}
spec:
  replicas: {{ .Values.controller.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        {{- include "platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller
      {{- include "platform.podAnnotations" (dict "root" $ "component" .Values.controller) | nindent 6 }}
    spec:
      {{- include "platform.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "platform.controller.serviceAccountName" . }}
      containers:
        - name: controller
          image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: LOG_LEVEL
              value: {{ .Values.controller.logLevel | default "info" | quote }}
            - name: PLATFORM_RELEASE_NAME
              value: {{ include "platform.fullname" . }}
            # Value of `app.kubernetes.io/instance` on chart-rendered apiserver
            # pods — i.e. the literal Helm `.Release.Name`. (`instance` here is
            # the standard K8s release label, unrelated to the retired Instance
            # domain concept.) Used by the controller to populate the selector
            # on per-agent ext-authz Services so they actually resolve to
            # apiserver pods even when release name and `platform.fullname`
            # diverge.
            - name: PLATFORM_INSTANCE_LABEL
              value: {{ .Release.Name | quote }}
            - name: PLATFORM_AGENT_NAMESPACE
              value: {{ .Values.agentNamespace }}
            - name: PLATFORM_RELEASE_NAMESPACE
              value: {{ .Release.Namespace }}
            # Three layers shape controller-rendered pods. Each ships as its
            # own JSON env var; the controller fails loudly on unknown fields
            # so values.yaml typos surface at startup.
            #   - AGENT_BASE: chart-only platform policy (security, scheduling,
            #     cluster details). Never overridable by an agent ConfigMap.
            #   - AGENT_TEMPLATE_DEFAULTS: chart-wide fallbacks for fields a
            #     template can override (template wins when set).
            - name: AGENT_BASE
              value: {{ .Values.controller.agent.base | toJson | quote }}
            # `$HOME` literals in mount paths are substituted at
            # chart render time using templateDefaults.agentHome, so the
            # controller and api-server only ever see absolute paths.
            - name: AGENT_TEMPLATE_DEFAULTS
              value: {{ .Values.controller.agent.templateDefaults | toJson | replace "$HOME" .Values.controller.agent.templateDefaults.agentHome | quote }}
            # Warm PVC pool (#692): pre-provisioned spare workspace volumes a new
            # agent claims instantly. Disabled by default; see controller.warmPool.
            - name: WARM_POOL
              value: {{ .Values.controller.warmPool | toJson | quote }}
            # harness traffic routes through the waypoint-fronted
            # `-apiserver-harness` Service. The bare apiserver Service no
            # longer carries the harness port.
            - name: PLATFORM_HARNESS_SERVER_URL
              value: "http://{{ include "platform.fullname" . }}-apiserver-harness.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.apiServer.harnessServerPort }}"
            - name: PLATFORM_HARNESS_SERVER_PORT
              value: {{ .Values.apiServer.harnessServerPort | quote }}
            # SPIFFE trust domain — used to render the principal
            # string in the per-agent AuthorizationPolicies the
            # controller writes alongside each agent.
            - name: PLATFORM_ISTIO_TRUST_DOMAIN
              value: {{ .Values.istio.trustDomain | quote }}
            - name: PLATFORM_ISTIO_WAYPOINT_NAME
              value: {{ .Values.istio.waypointName | quote }}
            - name: PLATFORM_RELEASE_DOMAIN
              value: "svc.cluster.local"
            - name: ENVOY_IMAGE
              value: {{ .Values.controller.envoyImage | default "mirror.gcr.io/envoyproxy/envoy:distroless-v1.37.2" | quote }}
            - name: ENVOY_PORT
              value: {{ .Values.controller.envoyPort | default 10000 | quote }}
            - name: AGENT_HOME
              value: {{ .Values.controller.agent.templateDefaults.agentHome | quote }}
            # ext-authz uses per-agent Services rendered by the
            # controller (one Service per agent, AuthorizationPolicy-gated
            # to the agent's own SA principal). The host is computed at
            # render time as `<release>-extauthz-<id>.<release-ns>.svc.cluster.local`
            # from PLATFORM_RELEASE_NAME + PLATFORM_RELEASE_NAMESPACE; no
            # static EXT_AUTHZ_HOST is needed.
            - name: AGENT_PROBES_ENABLED
              value: {{ .Values.probes.enabled | quote }}
            - name: EXT_AUTHZ_PORT
              value: {{ .Values.apiServer.extAuthzPort | quote }}
            - name: EXT_AUTHZ_HOLD_SECONDS
              value: {{ .Values.apiServer.approvalHoldSeconds | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
