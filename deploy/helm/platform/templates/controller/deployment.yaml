{{/*
Controller Deployment — Go reconciler + scheduler
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "platform.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.controller.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        {{- include "platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller
    spec:
      {{- include "platform.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "platform.controller.serviceAccountName" . }}
      containers:
        - name: controller
          image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: PLATFORM_RELEASE_NAME
              value: {{ include "platform.fullname" . }}
            - name: PLATFORM_AGENT_NAMESPACE
              value: {{ .Values.agentNamespace }}
            - name: PLATFORM_RELEASE_NAMESPACE
              value: {{ .Release.Namespace }}
            - name: AGENT_IMAGE_PULL_POLICY
              value: {{ .Values.controller.agentImagePullPolicy | default "IfNotPresent" }}
            {{- with .Values.controller.agentImagePullSecrets }}
            - name: AGENT_IMAGE_PULL_SECRETS
              value: {{ include "platform.nameList" . }}
            {{- end }}
            {{- with .Values.controller.agentStorageClass }}
            - name: AGENT_STORAGE_CLASS
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.controller.agentAccessMode }}
            - name: AGENT_ACCESS_MODE
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.controller.agentStorageSize }}
            - name: AGENT_STORAGE_SIZE
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.controller.agentPodAnnotations }}
            - name: AGENT_POD_ANNOTATIONS
              value: {{ toJson . | quote }}
            {{- end }}
            - name: PLATFORM_API_SERVER_HOST
              value: "{{ include "platform.fullname" . }}-apiserver.{{ .Release.Namespace }}.svc.cluster.local"
            - name: PLATFORM_HARNESS_SERVER_URL
              value: "http://{{ include "platform.fullname" . }}-apiserver.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.apiServer.harnessServerPort }}"
            - name: PLATFORM_HARNESS_SERVER_PORT
              value: {{ .Values.apiServer.harnessServerPort | quote }}
            - name: PLATFORM_IDLE_TIMEOUT
              value: {{ .Values.controller.idleTimeout | default "1h" | quote }}
            - name: PLATFORM_TERMINATION_GRACE_PERIOD
              value: {{ .Values.controller.terminationGracePeriod | default 5 | quote }}
            - name: ENVOY_IMAGE
              value: {{ .Values.controller.envoyImage | default "envoyproxy/envoy:distroless-v1.37.2" | quote }}
            - name: ENVOY_PORT
              value: {{ .Values.controller.envoyPort | default 10000 | quote }}
            - name: AGENT_HOME
              value: {{ .Values.agentHome | quote }}
            - name: EXT_AUTHZ_HOST
              # FQDN: agent pods live in a different namespace (`agents`) from
              # the apiserver Service (`{{ .Release.Namespace }}`), so the
              # bare service name doesn't resolve in the agent's DNS scope.
              value: {{ printf "%s-apiserver.%s.svc.cluster.local" (include "platform.fullname" .) .Release.Namespace | quote }}
            - name: EXT_AUTHZ_PORT
              value: {{ .Values.apiServer.extAuthzPort | quote }}
            - name: EXT_AUTHZ_HOLD_SECONDS
              value: {{ .Values.apiServer.approvalHoldSeconds | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
