{{/*
Controller Deployment — Go reconciler + scheduler
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "platform.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.controller.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        {{- include "platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller
    spec:
      {{- include "platform.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "platform.controller.serviceAccountName" . }}
      containers:
        - name: controller
          image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: PLATFORM_RELEASE_NAME
              value: {{ include "platform.fullname" . }}
            # Value of `app.kubernetes.io/instance` on chart-rendered apiserver
            # pods — i.e. the literal Helm `.Release.Name`. Used by the
            # controller to populate the selector on per-instance ext-authz
            # Services so they actually resolve to apiserver pods even when
            # release name and `platform.fullname` diverge.
            - name: PLATFORM_INSTANCE_LABEL
              value: {{ .Release.Name | quote }}
            - name: PLATFORM_AGENT_NAMESPACE
              value: {{ .Values.agentNamespace }}
            - name: PLATFORM_RELEASE_NAMESPACE
              value: {{ .Release.Namespace }}
            - name: AGENT_IMAGE_PULL_POLICY
              value: {{ .Values.controller.agentImagePullPolicy | default "IfNotPresent" }}
            {{- with .Values.controller.agentImagePullSecrets }}
            - name: AGENT_IMAGE_PULL_SECRETS
              value: {{ include "platform.nameList" . }}
            {{- end }}
            {{- with .Values.controller.agentStorageClass }}
            - name: AGENT_STORAGE_CLASS
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.controller.agentAccessMode }}
            - name: AGENT_ACCESS_MODE
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.controller.agentStorageSize }}
            - name: AGENT_STORAGE_SIZE
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.controller.agentPodAnnotations }}
            - name: AGENT_POD_ANNOTATIONS
              value: {{ toJson . | quote }}
            {{- end }}
            # ADR-041: harness traffic routes through the waypoint-fronted
            # `-apiserver-harness` Service. The bare apiserver Service no
            # longer carries the harness port.
            - name: PLATFORM_HARNESS_SERVER_URL
              value: "http://{{ include "platform.fullname" . }}-apiserver-harness.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.apiServer.harnessServerPort }}"
            - name: PLATFORM_HARNESS_SERVER_PORT
              value: {{ .Values.apiServer.harnessServerPort | quote }}
            # ADR-041: SPIFFE trust domain — used to render the principal
            # string in the per-instance AuthorizationPolicies the
            # controller writes alongside each instance.
            - name: PLATFORM_ISTIO_TRUST_DOMAIN
              value: {{ .Values.istio.trustDomain | quote }}
            - name: PLATFORM_ISTIO_WAYPOINT_NAME
              value: {{ .Values.istio.waypointName | quote }}
            - name: PLATFORM_RELEASE_DOMAIN
              value: "svc.cluster.local"
            - name: PLATFORM_IDLE_TIMEOUT
              value: {{ .Values.controller.idleTimeout | default "1h" | quote }}
            - name: PLATFORM_TERMINATION_GRACE_PERIOD
              value: {{ .Values.controller.terminationGracePeriod | default 5 | quote }}
            - name: ENVOY_IMAGE
              value: {{ .Values.controller.envoyImage | default "envoyproxy/envoy:distroless-v1.37.2" | quote }}
            - name: ENVOY_PORT
              value: {{ .Values.controller.envoyPort | default 10000 | quote }}
            - name: AGENT_HOME
              value: {{ .Values.agentHome | quote }}
            # ADR-041: ext-authz uses per-instance Services rendered by the
            # controller (one Service per instance, AuthorizationPolicy-gated
            # to the instance's own SA principal). The host is computed at
            # render time as `<release>-extauthz-<id>.<release-ns>.svc.cluster.local`
            # from PLATFORM_RELEASE_NAME + PLATFORM_RELEASE_NAMESPACE; no
            # static EXT_AUTHZ_HOST is needed.
            - name: AGENT_PROBES_ENABLED
              value: {{ .Values.probes.enabled | quote }}
            - name: EXT_AUTHZ_PORT
              value: {{ .Values.apiServer.extAuthzPort | quote }}
            - name: EXT_AUTHZ_HOLD_SECONDS
              value: {{ .Values.apiServer.approvalHoldSeconds | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
