{{/* Renders `.Values.gitRepos` into a ConfigMap the api-server loads at boot
     (see values.yaml for semantics; apiserver/app.yaml for the mount). */}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "platform.fullname" . }}-git-repos
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
data:
  git-repos.yaml: |
    {{- toYaml .Values.gitRepos | nindent 4 }}
