{{- if .Values.redis.enabled }}
{{- $redisName := include "platform.redis.fullname" . }}
{{- $authSecretName := printf "%s-auth" $redisName }}
{{- /*
  Stable per-release password. `lookup` returns the existing Secret on
  upgrades so the password persists; on first install the Secret doesn't
  exist yet and we generate fresh. `helm template` (no cluster) also
  takes the fresh path — that's fine, it's a render-time tool.
*/}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $authSecretName }}
{{- $password := "" }}
{{- if and $existing $existing.data $existing.data.password }}
  {{- $password = index $existing.data "password" | b64dec }}
{{- else }}
  {{- $password = randAlphaNum 32 }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $authSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
type: Opaque
data:
  password: {{ $password | b64enc | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $redisName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.redis.port }}
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    app.kubernetes.io/component: redis
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $redisName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  serviceName: {{ $redisName }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: redis
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: redis
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- include "platform.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          # AOF appendfsync everysec — relaxed durability matches the platform
          # rule that Redis is allowed to lose recent ephemeral data on restart.
          command: ["sh", "-c"]
          args:
            - 'exec valkey-server --appendonly yes --appendfsync everysec --requirepass "$REDIS_PASSWORD"'
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $authSecretName }}
                  key: password
          ports:
            - containerPort: 6379
              name: redis
          {{- if .Values.probes.enabled }}
          readinessProbe:
            exec:
              # `--no-auth-warning` keeps the probe log clean; the server
              # would otherwise emit a noisy NOAUTH warning per check.
              command: ["sh", "-c", 'valkey-cli -a "$REDIS_PASSWORD" --no-auth-warning ping']
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["sh", "-c", 'valkey-cli -a "$REDIS_PASSWORD" --no-auth-warning ping']
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
          {{- end }}
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        {{- if .Values.redis.storageClass }}
        storageClassName: {{ .Values.redis.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.storage }}
{{- end }}
