{{- if .Values.keycloak.enabled }}
{{- $appName := include "platform.keycloak.fullname" . }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $appName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.keycloak.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: keycloak
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $appName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: keycloak
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "platform.labels" . | nindent 8 }}
        app.kubernetes.io/component: keycloak
      annotations: {}
    spec:
      {{- include "platform.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.postgres.image }}
          command: ["sh", "-c"]
          args:
            - |
              until pg_isready -h {{ include "platform.keycloak.db.host" . }} -U {{ .Values.keycloak.db.user }}; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
      containers:
        - name: keycloak
          image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.keycloak.image.pullPolicy | default "IfNotPresent" }}
          args: [{{ if eq .Values.scheme "https" }}"start"{{ else }}"start-dev"{{ end }}, "--features=token-exchange,admin-fine-grained-authz:v1"]
          ports:
            - containerPort: {{ .Values.keycloak.port }}
              name: http
          env:
            - name: KC_DB
              value: "postgres"
            - name: KC_DB_URL
              value: {{ include "platform.keycloak.db.url" . | quote }}
            - name: KC_DB_USERNAME
              value: {{ .Values.keycloak.db.user | quote }}
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "platform.keycloak.db.password.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: {{ .Values.keycloak.admin.user | quote }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "platform.keycloak.secrets.fullname" . }}
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_HEALTH_ENABLED
              value: "true"
            # Keycloak 26.6/26.6.1 ship /opt/keycloak/data/tmp root-owned and
            # not group-writable, so under a non-root UID (OpenShift's
            # arbitrary SCC UID) the gzip resource cache fails to initialise and
            # every static /resources/* asset 404s under `Accept-Encoding: gzip`
            # — i.e. in every browser (keycloak/keycloak#48566). Point the io
            # tmpdir at world-writable /tmp so the cache initialises under any
            # UID. The cache holds only public theme assets. Remove once on
            # Keycloak >= 26.7.0 (fix: keycloak/keycloak#48608).
            - name: JAVA_OPTS_APPEND
              value: "-Dkc.io.tmpdir=/tmp"
            - name: KC_LOG_CONSOLE_OUTPUT
              value: {{ .Values.keycloak.log.consoleOutput | quote }}
            - name: KC_SPI_EVENTS_LISTENER_JBOSS_LOGGING_SUCCESS_LEVEL
              value: {{ .Values.keycloak.events.successLevel | quote }}
            - name: KC_SPI_EVENTS_LISTENER_JBOSS_LOGGING_ERROR_LEVEL
              value: {{ .Values.keycloak.events.errorLevel | quote }}
            - name: KC_HTTP_PORT
              value: {{ .Values.keycloak.port | quote }}
            - name: KC_HOSTNAME
              value: {{ include "platform.url.keycloak" . | quote }}
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC
              value: "true"
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            {{- if eq .Values.scheme "https" }}
            - name: KC_HTTP_ENABLED
              value: "true"
            {{- end }}
          {{- if .Values.probes.enabled }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 30
          {{- end }}
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
{{- end }}
