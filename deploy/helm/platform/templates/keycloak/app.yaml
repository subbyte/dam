{{- if .Values.keycloak.enabled }}
{{- $appName := include "platform.keycloak.fullname" . }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $appName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.keycloak.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: keycloak
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $appName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
  {{- include "platform.annotations" (dict "root" $ "component" .Values.keycloak) | nindent 2 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: keycloak
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "platform.labels" . | nindent 8 }}
        app.kubernetes.io/component: keycloak
      {{- include "platform.podAnnotations" (dict "root" $ "component" .Values.keycloak) | nindent 6 }}
    spec:
      {{- include "platform.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.postgres.image }}
          command: ["sh", "-c"]
          args:
            - |
              until pg_isready -h {{ include "platform.keycloak.db.host" . }} -p {{ .Values.keycloak.db.port }} -U {{ .Values.keycloak.db.user }}; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
      containers:
        - name: keycloak
          image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.keycloak.image.pullPolicy | default "IfNotPresent" }}
          args: [{{ if eq .Values.scheme "https" }}"start"{{ else }}"start-dev"{{ end }}, "--features=token-exchange,admin-fine-grained-authz:v1{{ range .Values.keycloak.extraFeatures }},{{ . }}{{ end }}"]
          ports:
            - containerPort: {{ .Values.keycloak.port }}
              name: http
          env:
            - name: KC_DB
              value: "postgres"
            - name: KC_DB_URL
              value: {{ include "platform.keycloak.db.url" . | quote }}
            - name: KC_DB_USERNAME
              value: {{ .Values.keycloak.db.user | quote }}
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "platform.keycloak.db.password.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: {{ .Values.keycloak.admin.user | quote }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "platform.keycloak.secrets.fullname" . }}
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_LOG_CONSOLE_OUTPUT
              value: {{ .Values.keycloak.log.consoleOutput | quote }}
            - name: KC_SPI_EVENTS_LISTENER_JBOSS_LOGGING_SUCCESS_LEVEL
              value: {{ .Values.keycloak.events.successLevel | quote }}
            - name: KC_SPI_EVENTS_LISTENER_JBOSS_LOGGING_ERROR_LEVEL
              value: {{ .Values.keycloak.events.errorLevel | quote }}
            - name: KC_HTTP_PORT
              value: {{ .Values.keycloak.port | quote }}
            - name: KC_HOSTNAME
              value: {{ include "platform.url.keycloak" . | quote }}
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC
              value: "true"
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            {{- if eq .Values.scheme "https" }}
            - name: KC_HTTP_ENABLED
              value: "true"
            {{- end }}
            {{- with .Values.keycloak.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.probes.enabled }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 30
          {{- end }}
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
          volumeMounts:
            - name: gzip-cache
              mountPath: /opt/keycloak/data/tmp
            {{- if .Values.keycloak.db.caCert }}
            - name: pg-ca
              mountPath: /etc/keycloak/pg-ca
              readOnly: true
            {{- end }}
      volumes:
        # Keycloak 26.6/26.6.1 ship /opt/keycloak/data/tmp root-owned and not
        # group-writable (0755), so under a non-root UID — i.e. OpenShift's
        # arbitrary SCC UID — GzipResourceEncodingProviderFactory can't create
        # its cache dir, and from then on every static /resources/* theme asset
        # 404s under `Accept-Encoding: gzip`, which every browser sends
        # (keycloak/keycloak#48566). A writable emptyDir at that path lets the
        # gzip cache initialise under any UID. It holds only the gzip cache of
        # public theme assets — regenerable, non-sensitive. Drop once on
        # Keycloak >= 26.7.0, which fixes the perms upstream (keycloak#48608).
        - name: gzip-cache
          emptyDir: {}
        {{- if .Values.keycloak.db.caCert }}
        - name: pg-ca
          configMap:
            name: {{ include "platform.fullname" . }}-keycloak-db-ca
        {{- end }}
{{- end }}
