{{- if .Values.keycloak.enabled }}
{{- $secretName := include "platform.keycloak.secrets.fullname" . }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $adminPassword := "" }}
{{- if .Values.keycloak.admin.password }}
  {{- /* Explicit password always wins (e.g. --set keycloak.admin.password=admin) */ -}}
  {{- $adminPassword = .Values.keycloak.admin.password }}
{{- else if $existingSecret }}
  {{- $adminPassword = index $existingSecret.data "KEYCLOAK_ADMIN_PASSWORD" | b64dec }}
{{- else }}
  {{- $adminPassword = randAlphaNum 32 }}
{{- end }}
{{- /* platform-api client secret (for confidential client) */ -}}
{{- $apiClientSecret := "" }}
{{- if .Values.keycloak.apiClientSecret }}
  {{- $apiClientSecret = .Values.keycloak.apiClientSecret }}
{{- else if $existingSecret }}
  {{- if hasKey $existingSecret.data "PLATFORM_API_CLIENT_SECRET" }}
    {{- $apiClientSecret = index $existingSecret.data "PLATFORM_API_CLIENT_SECRET" | b64dec }}
  {{- else }}
    {{- $apiClientSecret = randAlphaNum 40 }}
  {{- end }}
{{- else }}
  {{- $apiClientSecret = randAlphaNum 40 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
type: Opaque
{{- /* When keycloak.db.password is set (external DB), the KC_DB_PASSWORD
       secretKeyRef resolves to POSTGRES_PASSWORD here — see
       platform.keycloak.db.password.secretName. The in-cluster postgres password
       lives in postgres-secrets instead. */}}
data:
  KEYCLOAK_ADMIN_PASSWORD: {{ $adminPassword | b64enc | quote }}
  PLATFORM_API_CLIENT_SECRET: {{ $apiClientSecret | b64enc | quote }}
  {{- if .Values.keycloak.db.password }}
  POSTGRES_PASSWORD: {{ .Values.keycloak.db.password | b64enc | quote }}
  {{- end }}
{{- end }}
