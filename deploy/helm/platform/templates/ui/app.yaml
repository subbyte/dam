{{- $appName := printf "%s-ui" (include "platform.fullname" .) | trunc 63 | trimSuffix "-" }}
{{- $apiserverName := printf "%s-apiserver" (include "platform.fullname" .) | trunc 63 | trimSuffix "-" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $appName }}-nginx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
data:
  default.conf: |
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    # Structured JSON access log, one object per line on stdout.
    log_format json_access escape=json
        '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"x_forwarded_for":"$http_x_forwarded_for"'
        '}';

    server {
        listen {{ .Values.ui.port }};
        root /usr/share/nginx/html;
        index index.html;

        access_log /dev/stdout json_access;

        location /api/ {
            proxy_pass http://{{ $apiserverName }}:{{ .Values.apiServer.port }};
            proxy_http_version 1.1;

            # WebSocket support (ACP + terminal relay) — only upgrade when client requests it
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            # Strip compression negotiation — the ws library on the API server
            # does not enable permessage-deflate; passing this header through
            # causes the browser to send compressed frames that ws rejects.
            proxy_set_header Sec-WebSocket-Extensions "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $appName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.ui.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: ui
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $appName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: ui
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "platform.labels" . | nindent 8 }}
        app.kubernetes.io/component: ui
      annotations:
        checksum/nginx-config: {{ toYaml .Values.ui | sha256sum }}
    spec:
      {{- include "platform.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: {{ .Values.ui.port }}
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          {{- if .Values.probes.enabled }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          {{- end }}
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ $appName }}-nginx
