{{- if .Values.postgres.enabled }}
{{- /* Shared PostgreSQL password (used by every service connecting to the
       in-cluster postgres). Persisted across helm upgrades by reading the
       existing Secret first. */ -}}
{{- $pgSecretName := include "humr.postgres.secrets.fullname" . }}
{{- $existingPgSecret := lookup "v1" "Secret" .Release.Namespace $pgSecretName }}
{{- $pgPassword := "" }}
{{- if $existingPgSecret }}
  {{- $pgPassword = index $existingPgSecret.data "POSTGRES_PASSWORD" | b64dec }}
{{- else }}
  {{- /* Legacy upgrade path: pre-ADR-033 charts stored the password in the
         OneCLI Secret. Read it once during the OneCLI removal upgrade so a
         running deployment doesn't lose its database password. */ -}}
  {{- $legacySecret := lookup "v1" "Secret" .Release.Namespace (printf "%s-onecli-secrets" (include "humr.fullname" .)) }}
  {{- if $legacySecret }}
    {{- $pgPassword = index $legacySecret.data "POSTGRES_PASSWORD" | b64dec }}
  {{- else }}
    {{- $pgPassword = default (randAlphaNum 32) .Values.postgres.password }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $pgSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_PASSWORD: {{ $pgPassword | b64enc | quote }}
{{- end }}
