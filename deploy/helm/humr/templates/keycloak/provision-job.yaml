{{- if .Values.keycloak.enabled }}
{{- $appName := include "humr.keycloak.fullname" . }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $appName }}-provision
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-provision
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "5"
spec:
  template:
    metadata:
      labels:
        {{- include "humr.labels" . | nindent 8 }}
        app.kubernetes.io/component: keycloak-provision
    spec:
      {{- include "humr.imagePullSecrets" . | nindent 6 }}
      restartPolicy: OnFailure
      initContainers:
        - name: config-cli
          image: {{ .Values.keycloak.configCliImage }}
          env:
            - name: KEYCLOAK_URL
              value: "http://{{ $appName }}:{{ .Values.keycloak.port }}"
            - name: KEYCLOAK_USER
              value: {{ .Values.keycloak.admin.user | quote }}
            - name: KEYCLOAK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "humr.keycloak.secrets.fullname" . }}
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: IMPORT_FILES_LOCATIONS
              value: "/config/*"
            - name: KEYCLOAK_AVAILABILITYCHECK_ENABLED
              value: "true"
            - name: KEYCLOAK_AVAILABILITYCHECK_TIMEOUT
              value: "120s"
            - name: IMPORT_VARSUBSTITUTION_ENABLED
              value: "true"
            - name: HUMR_API_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "humr.keycloak.secrets.fullname" . }}
                  key: HUMR_API_CLIENT_SECRET
          volumeMounts:
            - name: realm-config
              mountPath: /config
      containers:
        {{- /* Grant view-users from realm-management to the API service account
               so the api-server can resolve user emails / subs via the Admin API. */}}
        - name: realm-management-grants
          image: {{ .Values.keycloak.provisionImage }}
          env:
            - name: KC_URL
              value: "http://{{ $appName }}:{{ .Values.keycloak.port }}"
            - name: KC_REALM
              value: {{ .Values.keycloak.realm | quote }}
            - name: KC_ADMIN_USER
              value: {{ .Values.keycloak.admin.user | quote }}
            - name: KC_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "humr.keycloak.secrets.fullname" . }}
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: API_CLIENT_ID
              value: {{ .Values.keycloak.apiClientId | quote }}
          command: ["sh", "-c"]
          args:
            - |
              set -ex
              ARCH=$(uname -m); case "$ARCH" in aarch64) ARCH=arm64;; x86_64) ARCH=amd64;; esac
              curl -fsSL -o /tmp/jq "https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-$ARCH"
              chmod +x /tmp/jq
              export PATH="/tmp:$PATH"

              TOKEN=$(curl -f -s -X POST "$KC_URL/realms/master/protocol/openid-connect/token" \
                -d "client_id=admin-cli&grant_type=password&username=$KC_ADMIN_USER&password=$KC_ADMIN_PASSWORD" | \
                jq -r '.access_token')
              AUTH="Authorization: Bearer $TOKEN"

              client_uuid() {
                curl -f -s -H "$AUTH" "$KC_URL/admin/realms/$KC_REALM/clients?clientId=$1" | jq -r '.[0].id'
              }

              RM_UUID=$(client_uuid "realm-management")
              API_UUID=$(client_uuid "$API_CLIENT_ID")
              SA_USER_ID=$(curl -f -s -H "$AUTH" \
                "$KC_URL/admin/realms/$KC_REALM/clients/$API_UUID/service-account-user" | jq -r '.id')
              VIEW_USERS_ROLE=$(curl -f -s -H "$AUTH" \
                "$KC_URL/admin/realms/$KC_REALM/clients/$RM_UUID/roles/view-users")
              curl -f -s -X POST -H "$AUTH" -H "Content-Type: application/json" \
                "$KC_URL/admin/realms/$KC_REALM/users/$SA_USER_ID/role-mappings/clients/$RM_UUID" \
                -d "[$VIEW_USERS_ROLE]" > /dev/null
              echo "Granted view-users to $API_CLIENT_ID service account"
      volumes:
        - name: realm-config
          configMap:
            name: {{ $appName }}-realm
{{- end }}
