{{- if .Values.defaultTemplate.enabled }}
{{- $home := .Values.defaultTemplate.agentHome }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.defaultTemplate.name }}
  namespace: {{ .Values.agentNamespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
    humr.ai/type: agent-template
data:
  spec.yaml: |
    version: humr.ai/v1
    image: "{{ .Values.defaultTemplate.image.repository }}:{{ .Values.defaultTemplate.image.tag | default .Chart.AppVersion }}"
    description: {{ .Values.defaultTemplate.description | quote }}
    mounts:
      - path: {{ $home }}
        persist: true
        {{- with .Values.defaultTemplate.homeMountSize }}
        size: {{ . | quote }}
        {{- end }}
      - path: /tmp
        persist: false
    init: |
      #!/bin/bash
      # Seed home from image on first boot
      if [ ! -f {{ $home }}/.initialized ]; then
        cp -rn /app/working-dir/. {{ $home }}/ 2>/dev/null || true
        touch {{ $home }}/.initialized
      fi
      mkdir -p {{ $home }}/work
      if [ -f {{ $home }}/work/requirements.txt ]; then
        pip install -r {{ $home }}/work/requirements.txt
      fi
    env:
      - name: PORT
        value: "8080"
    resources:
      requests:
        cpu: {{ .Values.defaultTemplate.resources.requests.cpu | quote }}
        memory: {{ .Values.defaultTemplate.resources.requests.memory | quote }}
      limits:
        cpu: {{ .Values.defaultTemplate.resources.limits.cpu | quote }}
        memory: {{ .Values.defaultTemplate.resources.limits.memory | quote }}
    securityContext:
      readOnlyRootFilesystem: false
    skillPaths:
      - {{ $home }}/.claude/skills/
    {{- with .Values.defaultTemplate.skillSources }}
    skillSources:
      {{- range . }}
      - name: {{ .name | quote }}
        gitUrl: {{ .gitUrl | quote }}
      {{- end }}
    {{- end }}
{{- end }}
