{{- if .Values.ingress.enabled }}
{{- $domains := list .Values.domain }}
{{- range .Values.ingress.aliasDomains }}
{{- if . }}
{{- $domains = append $domains . }}
{{- end }}
{{- end }}
{{- /*
  Resolve override hosts. When `urls.{service}` is set, the bundled Ingress
  routes that hostname instead of generating convention-based rules for
  that service.
*/ -}}
{{- $uiHost := "" -}}
{{- if .Values.urls.ui -}}
{{- $uiHost = include "humr.url.host" .Values.urls.ui -}}
{{- end -}}
{{- $apiHost := "" -}}
{{- if .Values.urls.api -}}
{{- $apiHost = include "humr.url.host" .Values.urls.api -}}
{{- end -}}
{{- $keycloakHost := "" -}}
{{- if .Values.urls.keycloak -}}
{{- $keycloakHost = include "humr.url.host" .Values.urls.keycloak -}}
{{- end -}}
{{- $uiSvc := printf "%s-ui" (include "humr.fullname" .) | trunc 63 | trimSuffix "-" -}}
{{- $apiSvc := printf "%s-apiserver" (include "humr.fullname" .) | trunc 63 | trimSuffix "-" -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "humr.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- /* Override hostnames: one rule per service, no alias mirroring. */ -}}
    {{- if $uiHost }}
    - host: {{ $uiHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $uiSvc }}
                port:
                  name: http
    {{- end }}
    {{- if and .Values.keycloak.enabled $keycloakHost }}
    - host: {{ $keycloakHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "humr.keycloak.fullname" . }}
                port:
                  name: http
    {{- end }}
    {{- if $apiHost }}
    - host: {{ $apiHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $apiSvc }}
                port:
                  name: http
    {{- end }}
    {{- /* Convention-based rules: only for services without an override. */ -}}
    {{- range $domain := $domains }}
    {{- if not $uiHost }}
    - host: {{ printf "humr.%s" $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $uiSvc }}
                port:
                  name: http
    {{- end }}
    {{- if and $.Values.keycloak.enabled (not $keycloakHost) }}
    - host: {{ printf "keycloak.%s" $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "humr.keycloak.fullname" $ }}
                port:
                  name: http
    {{- end }}
    {{- if not $apiHost }}
    - host: {{ printf "humr-api.%s" $domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $apiSvc }}
                port:
                  name: http
    {{- end }}
    {{- end }}
{{- end }}
