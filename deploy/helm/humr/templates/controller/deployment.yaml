{{/*
Controller Deployment — Go reconciler + scheduler
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "humr.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "humr.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.controller.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "humr.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        {{- include "humr.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller
    spec:
      {{- include "humr.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "humr.controller.serviceAccountName" . }}
      containers:
        - name: controller
          image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: HUMR_RELEASE_NAME
              value: {{ include "humr.fullname" . }}
            - name: HUMR_AGENT_NAMESPACE
              value: {{ .Values.agentNamespace }}
            - name: ONECLI_URL
              value: "http://{{ include "humr.onecli.fullname" . }}:{{ .Values.onecli.web.port }}"
            {{- if .Values.keycloak.enabled }}
            - name: KEYCLOAK_URL
              value: "http://{{ include "humr.keycloak.fullname" . }}:{{ .Values.keycloak.port }}"
            - name: KEYCLOAK_REALM
              value: {{ .Values.keycloak.realm | quote }}
            - name: KEYCLOAK_CLIENT_ID
              value: {{ .Values.keycloak.controllerClientId | quote }}
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "humr.keycloak.secrets.fullname" . }}
                  key: HUMR_CONTROLLER_CLIENT_SECRET
            - name: ONECLI_AUDIENCE
              value: {{ .Values.onecli.oauth.audience | quote }}
            {{- end }}
            - name: HUMR_RELEASE_NAMESPACE
              value: {{ .Release.Namespace }}
            - name: ONECLI_GATEWAY_HOST
              value: {{ include "humr.onecli.fullname" . }}
            - name: ONECLI_GATEWAY_PORT
              value: {{ .Values.onecli.gateway.port | quote }}
            - name: CA_CERT_INIT_IMAGE
              value: {{ .Values.controller.caCertInitImage | default "busybox:stable" }}
            - name: AGENT_IMAGE_PULL_POLICY
              value: {{ .Values.controller.agentImagePullPolicy | default "IfNotPresent" }}
            {{- with .Values.controller.agentImagePullSecrets }}
            - name: AGENT_IMAGE_PULL_SECRETS
              value: {{ include "humr.nameList" . }}
            {{- end }}
            {{- with .Values.controller.agentStorageClass }}
            - name: AGENT_STORAGE_CLASS
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.controller.agentStorageSize }}
            - name: AGENT_STORAGE_SIZE
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.controller.agentPodAnnotations }}
            - name: AGENT_POD_ANNOTATIONS
              value: {{ toJson . | quote }}
            {{- end }}
            - name: HUMR_API_SERVER_HOST
              value: "{{ include "humr.fullname" . }}-apiserver.{{ .Release.Namespace }}.svc.cluster.local"
            - name: HUMR_HARNESS_SERVER_URL
              value: "http://{{ include "humr.fullname" . }}-apiserver.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.apiServer.harnessServerPort }}"
            - name: HUMR_HARNESS_SERVER_PORT
              value: {{ .Values.apiServer.harnessServerPort | quote }}
            - name: HUMR_IDLE_TIMEOUT
              value: {{ .Values.controller.idleTimeout | default "1h" | quote }}
            - name: HUMR_TERMINATION_GRACE_PERIOD
              value: {{ .Values.controller.terminationGracePeriod | default 5 | quote }}
            - name: ENVOY_IMAGE
              value: {{ .Values.controller.envoyImage | default "envoyproxy/envoy:distroless-v1.37.2" | quote }}
            - name: ENVOY_PORT
              value: {{ .Values.controller.envoyPort | default 10000 | quote }}
            - name: AGENT_HOME
              value: {{ .Values.agentHome | quote }}
            - name: EXT_AUTHZ_HOST
              # FQDN: agent pods live in a different namespace (`agents`) from
              # the apiserver Service (`{{ .Release.Namespace }}`), so the
              # bare service name doesn't resolve in the agent's DNS scope.
              value: {{ printf "%s-apiserver.%s.svc.cluster.local" (include "humr.fullname" .) .Release.Namespace | quote }}
            - name: EXT_AUTHZ_PORT
              value: {{ .Values.apiServer.extAuthzPort | quote }}
            - name: EXT_AUTHZ_HOLD_SECONDS
              value: {{ .Values.apiServer.approvalHoldSeconds | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
