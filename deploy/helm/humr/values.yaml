# -- Base domain for all services (subdomains: humr., humr-api., keycloak., onecli.)
# Override for production, e.g. "example.com"
domain: localhost
# -- Port appended to public URLs (empty for standard 80/443)
port: "4444"
# -- URL scheme (http for local dev, https for production)
scheme: http

# -- Explicit external URLs for each service.
#
# When set, each entry takes precedence over the convention-derived URL
# ({scheme}://{prefix}.{domain}{:port}). Use this when:
#   - You're disabling the bundled Ingress (`ingress.enabled: false`) and
#     routing traffic via an external Ingress, Gateway API, service mesh,
#     or LoadBalancer that you manage separately.
#   - Services live on independent hostnames that don't share a base domain.
#
# Each override must be a complete URL including scheme. The hostname is
# what the cluster expects in the Host header (used as the rule host when
# `ingress.enabled: true`); Keycloak uses the full URL as its issuer and as
# `KC_HOSTNAME`, OneCLI uses it for `APP_URL`/`NEXTAUTH_URL`/redirect URIs,
# and the API server uses it for browser-facing redirects.
#
# If you keep the bundled Ingress enabled with TLS, remember to align
# `ingress.tls[].hosts` with the override hostnames — see the note on
# `ingress.tls` below.
urls:
  ui: ""        # default: {scheme}://humr.{domain}{:port}
  api: ""       # default: {scheme}://humr-api.{domain}{:port}
  keycloak: ""  # default: {scheme}://keycloak.{domain}{:port}
  onecli: ""    # default: {scheme}://onecli.{domain}{:port} (or onecli.externalHostname)

# -- Pull secrets for all pods managed by this chart.
# Agent pods (managed by the controller) also inherit these secrets.
# Example:
#   imagePullSecrets:
#     - name: my-registry-secret
imagePullSecrets: []

# -- Target namespace for agent workloads (instances, templates, schedules)
agentNamespace: humr-agents

# -- Whether to create the agent namespace (disable if it already exists or is managed externally)
createAgentNamespace: true

# -- Home directory inside agent containers. Used for the HOME env var, the
# pod-files sidecar mount paths, and pod-files producer paths in api-server.
# Must match the HOME of the agent image's user — a mismatch silently breaks
# pod-files materialization (sidecar writes to a path the agent never reads).
# humr-base sets this; user-supplied images that differ should override here.
agentHome: /home/agent

# -- Shared local PostgreSQL instance
# Set enabled: false when using external/cloud DBs for all services.
postgres:
  enabled: true
  image: postgres:18-alpine
  user: humr
  # password is auto-generated if not set
  password: ""
  storage: 5Gi
  storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- OneCLI (credential proxy — gateway + web run in a single container)
onecli:
  # Single Docker image containing both Rust gateway and Node.js web app
  image: ghcr.io/kagenti/onecli:0.0.23
  replicas: 1

  # -- Override the external hostname for OneCLI (empty = onecli.{{ domain }}).
  # Set to "localhost" for local dev to enable Google OAuth — plain localhost
  # is exempt from Google's HTTPS redirect URI requirement, while subdomains
  # like onecli.localhost are not. See: https://github.com/kagenti/humr/issues/154
  externalHostname: ""

  # -- Database connection (empty host = use shared local postgres)
  db:
    host: ""
    port: 5432
    user: humr
    password: ""
    database: onecli

  # -- Gateway settings (Rust binary, runs inside the OneCLI container)
  gateway:
    port: 10255
    # secretEncryptionKey: base64-encoded 32-byte key, auto-generated if not set
    secretEncryptionKey: ""

  # -- Web app settings (Node.js, runs inside the OneCLI container)
  web:
    port: 10254

  # -- OAuth / OIDC configuration (requires keycloak.enabled: true)
  # AUTH_MODE is set automatically: "oauth" when keycloak is enabled, "local" otherwise.
  oauth:
    clientId: onecli
    # clientSecret: auto-generated if not set, must match Keycloak client config
    clientSecret: ""
    audience: onecli
    # nextAuthSecret: auto-generated if not set
    nextAuthSecret: ""

  # -- GitHub OAuth App credentials (shared across all users).
  # Register a GitHub OAuth App and set these to enable "Connect GitHub" for all users.
  # Callback URL in form `{onecli external URL}/api/apps/github/callback`
  # which has to be set up in the gh OAuth app can be found in the onecli ui under the GitHub app
  github:
    clientId: ""
    clientSecret: ""

  # -- MITM CA: auto-generated by OneCLI gateway on first start.
  # Agent pods fetch the CA cert at startup via init container.
  data:
    size: 1Gi

  # -- Egress NetworkPolicy for the OneCLI pod.
  # Prevents an SSRF gadget: without this, an agent can use the proxy to reach
  # in-cluster targets (Kubernetes API, kubelet, other pods, cloud metadata).
  # Allows: DNS, in-cluster Postgres/Keycloak by component label, and the
  # public internet (0.0.0.0/0 with private/special-use ranges excepted).
  networkPolicy:
    enabled: true
    # -- Cluster service CIDR. Set this when your CNI evaluates egress
    # NetworkPolicy before DNAT (e.g. OVN-Kubernetes on OpenShift). Without
    # this, podSelector-based allow rules won't match traffic sent to service
    # ClusterIPs, and blockedCIDRs will block them.
    # Common values: "10.43.0.0/16" (k3s), "172.30.0.0/16" (OpenShift)
    serviceCIDR: ""
    # Private and special-use IPv4 ranges blocked from gateway egress.
    # Covers all RFC1918, CGNAT, link-local (cloud metadata), loopback, and
    # IETF reserved space — so it's correct on any cluster regardless of which
    # CIDRs the CNI assigned to pods/services.
    # If you need to reach a private network (VPC peering, on-prem VPN), remove
    # the relevant range here.
    blockedCIDRs:
      - 10.0.0.0/8 # RFC1918 — covers k3s pod/service CIDRs and most cluster CNIs
      - 172.16.0.0/12 # RFC1918 — Docker default, kubeadm common range
      - 192.168.0.0/16 # RFC1918
      - 100.64.0.0/10 # RFC6598 carrier-grade NAT (used by EKS for pods)
      - 169.254.0.0/16 # link-local + cloud metadata (AWS/GCP/Azure IMDS at 169.254.169.254)
      - 127.0.0.0/8 # loopback (note: doesn't block in-pod loopback — kernel bypasses CNI)
      - 0.0.0.0/8 # IETF "this network"
      - 224.0.0.0/4 # multicast
      - 240.0.0.0/4 # IETF reserved

  # -- Force local auth mode (skip NEXTAUTH_SECRET injection).
  # Useful for test clusters where OneCLI doesn't have a browser-based OAuth provider.
  forceLocalAuth: false

  # -- Combined container resources
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- Keycloak (OIDC identity provider)
keycloak:
  enabled: true
  image: quay.io/keycloak/keycloak:26.5.4
  configCliImage: adorsys/keycloak-config-cli:latest-26.5.4
  provisionImage: curlimages/curl:8.19.0
  port: 8080

  # -- Admin credentials (for Keycloak admin console)
  admin:
    user: admin
    # password is auto-generated if not set
    password: ""

  # -- Realm and OIDC client configuration
  realm: humr
  clientId: humr-ui
  apiAudience: humr-api
  # -- Realm role required to access the API. Users without this role get 403.
  # Leave empty to allow all authenticated users.
  requiredRole: ""
  # -- Confidential client for API server (token exchange with OneCLI)
  apiClientId: humr-api
  apiClientSecret: ""
  # -- Confidential client for controller (impersonation via token exchange)
  controllerClientId: humr-controller
  controllerClientSecret: ""

  # -- Test user bootstrapped via realm import.
  # DISABLED by default — production deployments must not ship a known credential.
  # Local dev and e2e tests (via values-local.yaml) enable it.
  testUser:
    enabled: false
    username: ""
    password: ""

  # -- Database connection (empty host = use shared local postgres)
  db:
    host: ""
    port: 5432
    user: humr
    password: ""
    database: keycloak

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- Ingress (hostnames derived from `domain` and `urls` values above)
#
# Set `enabled: false` to skip rendering the bundled Ingress entirely — useful
# when you're routing traffic via an external Ingress controller, Gateway API,
# service mesh, or LoadBalancer that you manage outside the chart. In that
# mode you should populate the `urls:` block above so the chart's internal
# config (Keycloak issuer, OAuth redirect URIs, NEXTAUTH_URL, KC_HOSTNAME,
# API server browser-facing URLs) matches the hostnames your external router
# actually serves.
#
# When `enabled: true`, the Ingress generates one rule per service:
#   - If a `urls.{service}` override is set, the override hostname is routed.
#   - Otherwise `{prefix}.{domain}` (and any `aliasDomains`) are routed.
ingress:
  enabled: true
  className: ""
  annotations: {}
  # -- Extra alias domains that mirror convention-based subdomain routes
  # (hostname only, no port). Ignored for any service with an explicit
  # `urls.{service}` override.
  aliasDomains: ["localtest.me"]
  # -- TLS rules passed through verbatim to `Ingress.spec.tls`. The chart does
  # NOT auto-derive `hosts` from rules — when you set any `urls.{service}`
  # override, you must also list those hostnames here (or reference them via
  # cert-manager annotations on the Ingress) so the certificate covers what
  # the Ingress actually serves. Mismatches will not be caught at lint time.
  tls: []
  # For production with TLS (convention-based hostnames):
  #   aliasDomains: []
  #   tls:
  #     - secretName: humr-tls
  #       hosts: ["humr.example.com", "humr-api.example.com", "keycloak.example.com", "onecli.example.com"]
  #
  # For production with TLS + URL overrides — list the override hostnames:
  #   aliasDomains: []
  #   tls:
  #     - secretName: humr-tls
  #       hosts: ["app.example.com", "api.example.com", "auth.example.com", "secrets.example.com"]

# -- UI (nginx serving static SPA, reverse-proxies /api to API server)
ui:
  image:
    repository: ghcr.io/kagenti/humr/ui
    tag: "" # defaults to appVersion
    pullPolicy: IfNotPresent
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# -- API Server
apiServer:
  image:
    repository: ghcr.io/kagenti/humr/api-server
    tag: ""
    pullPolicy: IfNotPresent
  port: 4000
  harnessServerPort: 4001
  # -- Slack bot token (xoxb-...) for the platform-wide Slack app. Leave empty to disable Slack integration.
  slackBotToken: ""
  # -- Slack app-level token (xapp-...) for Socket Mode. Required alongside slackBotToken.
  slackAppToken: ""
  # -- Enable the Telegram channel. Each instance can connect its own bot token via the UI.
  telegramEnabled: false

  # -- Optional platform-wide defaults for OAuth app credentials. When a field
  # is set the connect form for the matching app drops the corresponding
  # input — every user shares the admin-registered OAuth app. Leave empty
  # to require each user to supply their own client id / secret.
  oauthAppDefaults:
    github:
      clientId: ""
      clientSecret: ""
    githubEnterprise:
      host: ""
      clientId: ""
      clientSecret: ""

  # -- Database connection (empty host = use shared local postgres)
  db:
    host: ""
    port: 5432
    user: humr
    password: ""
    database: humr
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- Controller (Go reconciler + scheduler)
controller:
  image:
    repository: ghcr.io/kagenti/humr/controller
    tag: ""
    pullPolicy: IfNotPresent
  caCertInitImage: busybox:stable
  agentImagePullPolicy: IfNotPresent
  # -- Pull secrets for agent pods (in agentNamespace, separate from chart-level imagePullSecrets).
  # The referenced secrets must exist in agentNamespace.
  agentImagePullSecrets: []
  # -- StorageClass for per-instance agent PVCs. Must support ReadWriteMany
  # so per-turn foreign-user fork pods can mount the same /home/agent volume
  # concurrently with the main pod (see ADR DRAFT — Slack per-turn user
  # impersonation). Empty = cluster default (which must itself support RWX).
  # Set to "humr-rwx" to use the bundled in-cluster NFS provisioner below.
  agentStorageClass: ""
  # -- PVC size requested for persistent agent mounts (e.g. /home/agent).
  # Empty = controller default (10Gi). Lower this on resource-constrained
  # clusters such as the e2e test VM.
  agentStorageSize: ""
  # -- Extra annotations stamped on every agent pod. Useful for admission-webhook
  # break-glass annotations (e.g. `admission.stackrox.io/break-glass: ticket-1234`)
  # or for cluster-specific scheduling/observability hints.
  agentPodAnnotations: {}
  replicas: 1
  # -- Idle timeout before auto-hibernating running instances (Go duration, 0 = disabled)
  idleTimeout: "1h"
  # -- Termination grace period in seconds for agent pods
  terminationGracePeriod: 5
  # -- Image for the experimental Envoy credential-injector sidecar (ADR-033). Renders
  # only on instances with `experimentalCredentialInjector: true`.
  envoyImage: envoyproxy/envoy:distroless-v1.37.2
  # -- Port the Envoy sidecar listens on inside the agent pod (proxy on 127.0.0.1).
  envoyPort: 10000
  # -- TLS interception support for the experimental credential injector. When enabled,
  # the chart provisions a self-signed CA via cert-manager and a CA ClusterIssuer
  # (`humr-mitm-ca-issuer`) that the controller uses to mint per-instance leaf
  # certs for Envoy to terminate the agent's TLS and inject credential headers.
  # Requires cert-manager to be installed in the cluster (humr's cluster:install
  # task does this).
  envoyMitm:
    enabled: true
    # -- Names of the bootstrap and CA cluster issuers. Cluster-scoped, so consider
    # collisions with other charts.
    bootstrapIssuerName: humr-selfsigned-bootstrap
    caIssuerName: humr-mitm-ca-issuer
    # -- Where the CA Secret lives. Must equal cert-manager's
    # --cluster-resource-namespace flag (default `cert-manager`).
    caSecretNamespace: cert-manager
    caSecretName: humr-mitm-ca
    # -- CA validity. cert-manager will renew before expiry automatically.
    caDuration: 87600h     # 10y
    caRenewBefore: 720h    # 30d
    # -- Per-instance leaf cert validity.
    leafDuration: 2160h    # 90d
    leafRenewBefore: 360h  # 15d
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- In-cluster NFS server + external provisioner.
# Opt-in RWX storage class for dev clusters (k3s-on-lima, kind, minikube)
# whose default provisioner is RWO-only. The agent instance PVC needs
# ReadWriteMany so per-turn foreign-user fork pods can mount the same
# /home/agent volume concurrently with the main pod.
#
# Production deployments on managed K8s should leave this disabled and
# point `controller.agentStorageClass` at the cloud-native RWX class
# (EFS / Filestore / Azure Files).
nfsProvisioner:
  enabled: false
  # -- Annotations applied to the NFS provisioner StatefulSet. Use this to
  # attach admission-controller break-glass annotations (e.g. StackRox's
  # `admission.stackrox.io/break-glass`) since the upstream provisioner
  # image is old and needs elevated capabilities.
  annotations: {}
  # -- Annotations applied to the NFS provisioner pod template.
  podAnnotations: {}
  image: registry.k8s.io/sig-storage/nfs-provisioner:v4.0.8
  # -- Name of the RWX StorageClass created by this provisioner. Set
  # `controller.agentStorageClass` to this value to use it for agent PVCs.
  storageClassName: humr-rwx
  # -- Size of the single backing volume that hosts all NFS-served exports.
  # Individual agent PVCs are carved out of this pool as subdirectories.
  size: 20Gi
  # -- StorageClass backing the NFS server's own PVC. Empty = cluster
  # default (which only needs to support RWO — the RWX fan-out happens
  # at the NFS layer).
  storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- Default agent template
defaultTemplate:
  enabled: true
  name: claude-code
  image:
    repository: ghcr.io/kagenti/humr/claude-code
    tag: ""
    pullPolicy: IfNotPresent
  description: "Default Claude Code agent"
  agentHome: /home/agent
  # -- PVC size for the persisted /home/agent mount. Empty = controller
  # default (10Gi). See issue #244.
  homeMountSize: "5Gi"
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "2Gi"

# -- Google Workspace agent template
googleWorkspaceTemplate:
  enabled: false
  name: google-workspace
  image:
    repository: ghcr.io/kagenti/humr/google-workspace-agent
    tag: ""
    pullPolicy: IfNotPresent
  description: "Google Workspace agent with Drive and Gmail via gws CLI"
  agentHome: /home/agent
  homeMountSize: "2Gi"
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "2Gi"

# -- Pi coding agent template
piAgentTemplate:
  enabled: false
  name: pi-agent
  image:
    repository: ghcr.io/kagenti/humr/pi-agent
    tag: ""
    pullPolicy: IfNotPresent
  description: "Pi coding agent with multi-LLM support"
  agentHome: /home/agent
  homeMountSize: "2Gi"
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "2Gi"

# -- Code Guardian agent template (PR code review bot built on Claude Code)
codeGuardianTemplate:
  enabled: false
  name: code-guardian
  image:
    repository: ghcr.io/kagenti/humr/code-guardian
    tag: ""
    pullPolicy: IfNotPresent
  description: "PR code review agent (gh + Claude Code)"
  agentHome: /home/agent
  # -- owner/repo slug the agent reviews. Empty = detect via `gh repo view`.
  githubRepo: ""
  # Code Guardian clones real repos — keep the larger default.
  homeMountSize: "10Gi"
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "2Gi"

# -- Platform-wide skill sources (shared catalog visible to all users).
# Rendered into the api-server pod as SKILL_SOURCES_SEED (JSON array, one
# entry per source) and parsed at startup. api-server merges these with
# user-created Postgres rows at read time. Users see these with a "Platform"
# badge in the Skills panel and cannot delete them. The same {name, gitUrl}
# shape works for per-template sources under `<templateKey>.skillSources` —
# an instance derived from that template surfaces them with an "Agent" badge.
skills:
  skillSources: []
  # Example:
  # skillSources:
  #   - name: "Anthropic Skills"
  #     gitUrl: "https://github.com/anthropics/skills"
