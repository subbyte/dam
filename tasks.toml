# -- Aggregation --

["setup"]
depends = ["*:setup"]

["check"]
depends = ["*:check"]

["lint:check"]
dir = "{{config_root}}"
run = "pnpm exec eslint ."

["fix"]
depends = ["*:fix"]

["lint:fix"]
dir = "{{config_root}}"
run = "pnpm exec eslint --fix ."

["test"]
depends = ["*:test", "*:test:unit"]


# -- Git hooks --

["git-hooks:pre-commit"]
hide = true
depends = ["check"]

["git-hooks:commit-msg"]
hide = true
dir = "{{config_root}}"
usage = 'arg "<commit_msg_file>"'
run = '''
#!/usr/bin/env bash
set -eo pipefail
FILE="${1:-}"
[ -z "$FILE" ] && exit 0
MSG=$(cat "$FILE")
# Remove duplicate Assisted-By trailers
CLEANED=$(echo "$MSG" | awk '!seen[$0]++ || !/^Assisted-By:/')
echo "$CLEANED" > "$FILE"
'''

# -- Setup --

["common:setup:corepack"]
run = "corepack enable"
sources = ["package.json"]

["common:setup:pnpm"]
depends = ["common:setup:corepack"]
run = "pnpm install"
sources = [
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "packages/*/package.json",
  "packages/agents/pi-agent/workspace/.pi/agent/extensions/*/package.json",
  "package.json",
]

["common:setup:git-hooks"]
run = '''
#!/usr/bin/env bash
set -euo pipefail
MISE_BIN=$(which mise)

mkdir -p .git/hooks

cat > .git/hooks/pre-commit << HOOK
#!/bin/sh
$MISE_BIN run git-hooks:pre-commit
HOOK
chmod +x .git/hooks/pre-commit

cat > .git/hooks/commit-msg << HOOK
#!/bin/sh
$MISE_BIN run git-hooks:commit-msg -- "\$1"
HOOK
chmod +x .git/hooks/commit-msg

echo "Git hooks installed."
'''
