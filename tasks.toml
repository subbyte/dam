sources = ["package.json"]

["common:setup:pnpm"]
depends = ["common:setup:corepack"]
run = "pnpm install"
sources = [
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "packages/*/package.json",
  "packages/agents/pi-agent/workspace/.pi/agent/extensions/*/package.json",
  "package.json",
]

["common:setup:git-hooks"]
run = '''
#!/usr/bin/env bash
set -euo pipefail
MISE_BIN=$(which mise)

mkdir -p .git/hooks

cat > .git/hooks/pre-commit << HOOK
#!/bin/sh
$MISE_BIN run git-hooks:pre-commit
HOOK
chmod +x .git/hooks/pre-commit

cat > .git/hooks/commit-msg << HOOK
#!/bin/sh
$MISE_BIN run git-hooks:commit-msg -- "\$1"
HOOK
chmod +x .git/hooks/commit-msg

echo "Git hooks installed."
'''

# -- Common --

["common:scan"]
depends = ["common:scan:*"]

["common:scan:npm-audit"]
dir = "{{config_root}}"
usage = 'flag "--json" help="Emit pnpm audit JSON instead of text"'
run = '''
#!/usr/bin/env bash
set -uo pipefail
if [[ "${usage_json:-false}" == "true" ]]; then
  exec pnpm audit --prod --json
fi
exec pnpm audit --prod
'''

["common:check"]
depends = ["common:check:*"]

["common:check:zizmor"]
description = "Static security analysis for GitHub Actions workflows"
dir = "{{config_root}}"
run = "zizmor --min-confidence medium .github/workflows/"

["common:check:lockfile-age"]
description = "Verify no lockfile dependency is newer than 7 days"
dir = "{{config_root}}"
sources = ["pnpm-lock.yaml", "pnpm-workspace.yaml"]
run = '''
#!/usr/bin/env bash
set -euo pipefail
DAYS=${MINIMUM_RELEASE_AGE_DAYS:-7}
if date -u -d "-1 days" +%Y >/dev/null 2>&1; then
  export CUTOFF=$(date -u -d "-$DAYS days" +%Y-%m-%dT%H:%M:%SZ)
else
  export CUTOFF=$(date -u -v-"${DAYS}"d +%Y-%m-%dT%H:%M:%SZ)
fi
export LOCKFILE_ENTRIES=$(mktemp); trap 'rm -f "$LOCKFILE_ENTRIES"' EXIT
yq '.packages | keys | .[]' pnpm-lock.yaml | sed 's/\(.*\)@/\1\t/' > "$LOCKFILE_ENTRIES"
# Honour pnpm minimumReleaseAgeExclude — same packages pnpm itself skips
while IFS= read -r excl; do
  [[ -z "$excl" ]] && continue
  excl_name="${excl%@*}"; excl_ver="${excl##*@}"
  tmp=$(mktemp)
  awk -F'\t' -v n="$excl_name" -v v="$excl_ver" '!(n==$1 && v==$2)' "$LOCKFILE_ENTRIES" > "$tmp" && mv "$tmp" "$LOCKFILE_ENTRIES"
done < <(yq '.minimumReleaseAgeExclude // [] | .[]' pnpm-workspace.yaml 2>/dev/null)
check_pkg() {
  export PKG_NAME="$1" PKG_VERSIONS=$(awk -F'\t' -v n="$1" '$1==n{printf(c++?",":"[")"\""$2"\""}END{print"]"}' "$LOCKFILE_ENTRIES")
  curl -sf --max-time 10 -H 'Accept: application/json' \
    "https://registry.npmjs.org/$1" | \
  yq -p json -r '.time as $t | (strenv(PKG_VERSIONS) | fromjson | .[]) as $ver |
    $t[$ver] | select(. != null and . > strenv(CUTOFF)) | "  " + strenv(PKG_NAME) + "@" + $ver + "  " + .' || true
}
export -f check_pkg
bash -c 'type check_pkg' >/dev/null 2>&1 || { echo "FAIL: export -f unsupported"; exit 1; }
HITS=$(cut -f1 "$LOCKFILE_ENTRIES" | sort -u | xargs -P30 -I{} bash -c 'check_pkg "{}"')
if [[ -n "$HITS" ]]; then
  echo ""; echo "$HITS" | sort -rk2
  printf '\nFAIL: packages published <%sd ago (cutoff %s). Wait or pin older.\n' "$DAYS" "$CUTOFF"
  exit 1
fi
echo "OK: $(wc -l < "$LOCKFILE_ENTRIES") lockfile entries all older than ${DAYS}d"
'''

["common:check:version"]
description = "Verify all release-participating packages share the same version"
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
set -euo pipefail
version=$(
  {
    yq -r .version    deploy/helm/platform/Chart.yaml
    yq -r .appVersion deploy/helm/platform/Chart.yaml
    yq -r .version    packages/cli/package.json
  } | sort -u
)
if [[ $(wc -l <<<"$version") -ne 1 ]]; then echo "ERROR: Version mismatch detected: $(echo $version)" >&2; exit 1; fi
if ! [[ $version =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$ ]]; then echo "ERROR: $version is not valid semver (X.Y.Z or X.Y.Z-rcN)" >&2; exit 1; fi
if [[ "${GITHUB_REF:-}" == refs/tags/* ]] && [[ $GITHUB_REF != "refs/tags/v$version" ]]; then echo "ERROR: GITHUB_REF '$GITHUB_REF' does not match 'refs/tags/v$version'" >&2; exit 1; fi
echo "OK: version $version"
'''

# -- Release --

["release:set-version"]
description = "Update version fields in all release-participating packages and commit"
usage = 'arg "<version>" help="The new version to set (format: X.Y.Z or X.Y.Z-rcW)"'
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [[ -n "$(git status --porcelain)" ]]; then
  echo "ERROR: Working directory not clean"
  exit 1
fi

if ! [[ "$usage_version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-rc[0-9]+)?$ ]]; then
  echo "ERROR: Invalid version format: $usage_version"
  echo "Expected format: X.Y.Z or X.Y.Z-rcW (e.g., 1.2.3 or 1.2.3-rc1)"
  exit 1
fi

set -x
yq -i ".version = \"$usage_version\""    deploy/helm/platform/Chart.yaml
yq -i ".appVersion = \"$usage_version\"" deploy/helm/platform/Chart.yaml
yq -i ".version = \"$usage_version\""    packages/cli/package.json
git add .
git commit --signoff --no-verify -m "bump: v$usage_version"
set +x

echo -e "Pending version in \x1b[36m$(git branch --show-current)\x1b[0m bumped to $usage_version"
'''

["release:new"]
description = "Open a new release by creating a release branch from current main"
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [[ -n "$(git status --porcelain)" ]]; then
  echo "ERROR: Working directory not clean"
  exit 1
fi

set -x
git checkout main
git pull
set +x

current_version=$(yq -r '.version' deploy/helm/platform/Chart.yaml)
if ! [[ "$current_version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
  echo "ERROR: Invalid version format: $current_version. Expected format: X.Y.Z"
  exit 1
fi
next_version="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.$((${BASH_REMATCH[3]} + 1))"
release_branch="release-v$current_version"

echo ""
echo "What will happen:"
echo -e "  - Nothing will be published yet."
echo -e "  - Tip of the \x1b[36mmain\x1b[0m branch will be prepared for release $current_version in \x1b[36m$release_branch\x1b[0m branch."
echo -e "  - Pending version in \x1b[36m$release_branch\x1b[0m will be bumped to ${current_version}-rc1."
echo -e "  - A PR bumping pending version in \x1b[36mmain\x1b[0m to $next_version will be opened — it needs one approval, then merge it. (This can be bumped more if the next release needs to be minor/major.)"
echo -e "Want to release a different version than $current_version? Cancel, run \x1b[36mmise run release:set-version <version>\x1b[0m on the \x1b[36mmain\x1b[0m branch and then re-run this task."
gum confirm "Proceed?"

set -x
git checkout -B $release_branch main
{{ mise_bin }} run release:set-version "${current_version}-rc1"
git push --set-upstream origin $release_branch
set +x
echo -e "\x1b[36m$release_branch\x1b[0m branch with pending version ${current_version}-rc1 created."

bump_branch="bump/v$next_version"
bump_namespace="${bump_branch%%/*}"
set -x
if git show-ref --verify --quiet "refs/heads/$bump_namespace"; then
  git branch -D "$bump_namespace"
fi
if git ls-remote --exit-code --heads origin "$bump_namespace" >/dev/null 2>&1; then
  git push origin --delete "$bump_namespace"
fi
git checkout -B "$bump_branch" main
{{ mise_bin }} run release:set-version "$next_version"
git push --force --set-upstream origin "$bump_branch"
set +x
pr_url=$(gh pr create --base main --head "$bump_branch" --title "bump: v$next_version" --body "Bump pending version on \`main\` to $next_version after opening \`$release_branch\`." \
  || gh pr view "$bump_branch" --json url --jq .url)
echo -e "Opened $pr_url bumping \x1b[36mmain\x1b[0m pending version to $next_version. Merge it once approved."

git checkout $release_branch

echo -e "Now you can use \x1b[36mmise run release:publish-rc\x1b[0m to publish a release candidate ${current_version}-rc1, or \x1b[36mmise run release:publish-stable\x1b[0m to publish stable $current_version."
'''

["release:publish-rc"]
description = "Publish the current release branch as a release candidate"
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [[ -n "$(git status --porcelain)" ]]; then
  echo "ERROR: Working directory not clean"
  exit 1
fi

release_branch="$(git branch --show-current)"
if [[ "$release_branch" != "release-v"* ]]; then
  echo "ERROR: Not on a 'release-v*' branch"
  exit 1
fi

set -x
git pull
set +x

current_version=$(yq -r '.version' deploy/helm/platform/Chart.yaml)
if ! [[ "$current_version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)-rc([0-9]+)$ ]]; then
  echo "ERROR: Current version must be an RC version (X.Y.Z-rcN)"
  echo "Current version: $current_version"
  exit 1
fi

next_version="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}-rc$((${BASH_REMATCH[4]} + 1))"

echo ""
echo "What will happen:"
echo -e "  - Tip of the \x1b[36m$release_branch\x1b[0m branch will be tagged \x1b[36mv$current_version\x1b[0m and pushed to GitHub."
echo -e "  - GitHub Action triggered by the tag will publish a release candidate \x1b[36m$current_version\x1b[0m."
echo -e "  - Pending version in \x1b[36m$release_branch\x1b[0m branch will be bumped to \x1b[36m$next_version\x1b[0m."
gum confirm "Proceed?"

set -x
git tag "v$current_version"
git push --atomic origin $release_branch "v$current_version"
set +x
echo -e "Pushed tag v$current_version to \x1b[36morigin/$release_branch\x1b[0m"

{{ mise_bin }} run release:set-version "$next_version"
git push

git checkout $release_branch

echo -e "Check the pipeline progress: https://github.com/dam-agents/dam/actions/workflows/cd.yml"
'''

["release:publish-stable"]
description = "Publish the current release branch as a stable release"
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [[ -n "$(git status --porcelain)" ]]; then
  echo "ERROR: Working directory not clean"
  exit 1
fi

release_branch="$(git branch --show-current)"
if [[ "$release_branch" != "release-v"* ]]; then
  echo "ERROR: Not on a 'release-v*' branch"
  exit 1
fi

set -x
git pull
set +x

current_version=$(yq -r '.version' deploy/helm/platform/Chart.yaml)
publish_version="${current_version%-rc*}"

echo ""
echo "What will happen:"
echo -e "  - Pending version in \x1b[36m$release_branch\x1b[0m branch will be bumped to \x1b[36m$publish_version\x1b[0m."
echo -e "  - Tip of the \x1b[36m$release_branch\x1b[0m branch will be tagged \x1b[36mv$publish_version\x1b[0m and pushed to GitHub."
echo -e "  - GitHub Action triggered by the tag will publish a stable release \x1b[36m$publish_version\x1b[0m."
gum confirm "Proceed?"

{{ mise_bin }} run release:set-version "$publish_version"

set -x
git tag "v$publish_version"
git push --atomic origin $release_branch "v$publish_version"
set +x
echo -e "Pushed tag v$publish_version to \x1b[36morigin/$release_branch\x1b[0m"

echo -e "Check the pipeline progress: https://github.com/dam-agents/dam/actions/workflows/cd.yml"
'''

["release:checkout"]
description = "Checkout the latest release branch"
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
set -euo pipefail

git fetch origin --tags --quiet

branch=$(git branch -r --sort=-version:refname --format "%(refname:short)" | grep 'origin/release-v' | head -n1 | sed 's|origin/||')

if [[ -z "$branch" ]]; then
  echo "ERROR: No release branch found"
  exit 1
fi

if git rev-parse "${branch/release-/}" >/dev/null 2>&1; then
  echo "Latest release $branch already finalized!"
fi

git checkout "$branch"
'''

["release:status"]
description = "Show current release status and latest remote release information"
depends = ["common:check:version"]
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
set -euo pipefail

git fetch origin --tags --quiet

echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
echo "Latest release branch:  $(git branch -r --sort=-version:refname --format "%(refname:short)" | grep 'origin/release-v' | head -n1 | sed 's|origin/||')"
echo "Latest released tag:    $(git ls-remote --tags origin 'v*' | grep -o 'refs/tags/v[0-9]*\.[0-9]*\.[0-9]*\(-rc[0-9]*\)\?$' | sed 's|refs/tags/||;s|-rc|~rc|' | sort -V | tail -n 1 | sed 's|~rc|-rc|')"
echo "CD status:              https://github.com/dam-agents/dam/actions/workflows/cd.yml"
echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
'''
