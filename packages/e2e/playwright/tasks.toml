["e2e-playwright:install-browsers"]
description = "Download the Chromium binary Playwright drives (+ OS libs on Linux)"
dir = "{{config_root}}/packages/e2e/playwright"
depends = ["common:setup:pnpm"]
run = '''
#!/usr/bin/env bash
set -euo pipefail
if [ "$(uname)" = "Linux" ]; then
  pnpm exec playwright install --with-deps chromium
else
  pnpm exec playwright install chromium
fi
'''

["e2e-playwright:run"]
dir = "{{config_root}}/packages/e2e/playwright"
depends = ["common:setup:pnpm", "e2e-playwright:install-browsers"]
run = "pnpm exec playwright test"

["e2e-playwright:run-headed"]
description = "Run Playwright with a visible browser window"
dir = "{{config_root}}/packages/e2e/playwright"
depends = ["common:setup:pnpm", "e2e-playwright:install-browsers"]
run = "pnpm exec playwright test --headed"

["e2e-playwright:run-ui"]
description = "Open Playwright UI mode (time-travel debugger, watch mode)"
dir = "{{config_root}}/packages/e2e/playwright"
depends = ["common:setup:pnpm", "e2e-playwright:install-browsers"]
run = "pnpm exec playwright test --ui"

["e2e-playwright:check"]
depends = ["e2e-playwright:check:*"]

["e2e-playwright:check:tsc"]
dir = "{{config_root}}/packages/e2e/playwright"
depends = ["common:setup:pnpm"]
run = "pnpm exec tsc --noEmit"
sources = ["src/**/*.ts", "playwright.config.ts", "tsconfig.json", "../../dev-config/tsconfig.base.json"]

["e2e-playwright:check:lint"]
dir = "{{config_root}}/packages/e2e/playwright"
depends = ["common:setup:pnpm"]
run = "pnpm exec eslint ."
sources = ["src/**/*.ts", "eslint.config.js", "../../dev-config/eslint.base.js"]

["e2e-playwright:check:format"]
dir = "{{config_root}}/packages/e2e/playwright"
depends = ["common:setup:pnpm"]
run = "pnpm exec prettier --check 'src/**/*.ts' 'playwright.config.ts'"
sources = ["src/**/*.ts", "playwright.config.ts", "../../../.prettierrc"]

["e2e-playwright:fix"]
depends = ["e2e-playwright:fix:*"]

["e2e-playwright:fix:lint"]
dir = "{{config_root}}/packages/e2e/playwright"
depends = ["common:setup:pnpm"]
run = "pnpm exec eslint --fix ."

["e2e-playwright:fix:format"]
dir = "{{config_root}}/packages/e2e/playwright"
depends = ["common:setup:pnpm"]
run = "pnpm exec prettier --write 'src/**/*.ts' 'playwright.config.ts'"
