["agent-runtime:setup"]
dir = "{{config_root}}"
depends = ["common:setup:pnpm"]

["agent-runtime:check"]
depends = ["agent-runtime:check:*"]

["agent-runtime:check:tsc"]
dir = "{{config_root}}/packages/agent-runtime"
depends = ["agent-runtime:setup"]
run = "pnpm exec tsc --noEmit"
sources = ["src/**/*.ts", "tsconfig.json", "../dev-config/tsconfig.base.json"]

["agent-runtime:check:lint"]
dir = "{{config_root}}/packages/agent-runtime"
depends = ["common:setup:pnpm"]
run = "pnpm exec eslint ."
sources = ["src/**/*.ts", "eslint.config.js", "../dev-config/eslint.base.js"]

["agent-runtime:check:format"]
dir = "{{config_root}}/packages/agent-runtime"
depends = ["common:setup:pnpm"]
run = "pnpm exec prettier --check 'src/**/*.ts'"
sources = ["src/**/*.ts", "../../.prettierrc"]

["agent-runtime:fix"]
depends = ["agent-runtime:fix:*"]

["agent-runtime:fix:lint"]
dir = "{{config_root}}/packages/agent-runtime"
depends = ["common:setup:pnpm"]
run = "pnpm exec eslint --fix ."

["agent-runtime:fix:format"]
dir = "{{config_root}}/packages/agent-runtime"
depends = ["common:setup:pnpm"]
run = "pnpm exec prettier --write 'src/**/*.ts'"

["agent-runtime:test"]
description = "Run agent-runtime unit tests"
dir = "{{config_root}}"
run = 'pnpm --filter agent-runtime exec vitest run'

["agent-runtime:dev"]
description = "Run agent-runtime in watch mode (tsx, loads .env)"
dir = "{{config_root}}/packages/agent-runtime"
depends = ["common:setup:pnpm"]
run = "pnpm exec tsx watch --env-file=.env src/server.ts"
