["controller:setup"]
dir = "{{config_root}}/packages/controller"
run = "go mod download"
sources = ["go.mod", "go.sum"]

# Regenerate deepcopy methods and CRD manifests from the api/ Go types
# (controller-gen). Run after editing any type under api/. CRDs land in the
# Helm chart's crds/ directory (ADR-068).
["controller:generate"]
dir = "{{config_root}}/packages/controller"
run = """
controller-gen object paths=./api/...
controller-gen crd paths=./api/... output:crd:dir={{config_root}}/deploy/helm/platform/crds
# controller-gen stamps a "DO NOT EDIT" header on the Go deepcopy output but not
# on CRD YAML; prepend one so the manifests aren't mistaken for hand-editable.
for f in {{config_root}}/deploy/helm/platform/crds/*.yaml; do
  tmp=$(mktemp)
  echo '# Code generated by controller-gen. DO NOT EDIT.' > "$tmp"
  cat "$f" >> "$tmp"
  mv "$tmp" "$f"
done
"""

["controller:check"]
depends = ["controller:check:*"]

["controller:check:fmt"]
dir = "{{config_root}}/packages/controller"
run = """
unformatted=$(gofmt -s -l .)
if [ -n "$unformatted" ]; then
  echo "Files not formatted:" >&2
  echo "$unformatted" >&2
  exit 1
fi
"""
sources = ["**/*.go"]

["controller:check:crd-backwards-compatibility"]
dir = "{{config_root}}"
sources = ["deploy/helm/platform/crds/*.yaml"]
usage = 'flag "--baseline <ref>" help="Git ref to compare against (default: latest v* tag)"'
run = '''
#!/usr/bin/env bash
set -euo pipefail
baseline="${usage_baseline:-$(git tag -l 'v*' --sort=-v:refname | head -1)}"
if [ -z "$baseline" ]; then
  echo "crd-compat: no v* tag found for a baseline; run git fetch --tags or pass --baseline" >&2
  exit 1
fi
if ! git rev-parse -q --verify "$baseline^{commit}" >/dev/null; then
  echo "crd-compat: baseline ref '$baseline' does not resolve to a commit" >&2
  exit 1
fi
crds=deploy/helm/platform/crds
legacy=deploy/helm/platform/files/crds # pre-ADR-068 location at older baselines
status=0
for f in $(git ls-tree -r --name-only "$baseline" -- "$crds" "$legacy"); do
  if [ ! -f "$crds/$(basename "$f")" ]; then
    echo "crd-compat: $f shipped in $baseline but was removed" >&2
    status=1
  fi
done
# Schema-generation bumps are enforced per-PR by controller:check:crd-schema-generation
# (baseline = origin/main, not a release tag) so a schema change can't slip
# through against a v* tag that predates the CRDs.
for f in "$crds"/*.yaml; do
  base="$baseline:$crds/$(basename "$f")"
  if ! git cat-file -e "$base" 2>/dev/null; then
    base="$baseline:$legacy/$(basename "$f")"
  fi
  if ! git cat-file -e "$base" 2>/dev/null; then
    echo "crd-compat: $f is new since $baseline — skipped"
    continue
  fi
  if ! crdify "git://${base%%:*}?path=${base#*:}" "file://$f"; then
    echo "crd-compat: $f is incompatible with $baseline (see findings above)" >&2
    status=1
  fi
done
exit $status
'''

# ADR-068: any CRD .spec change must bump agent-platform.ai/crd-schema-generation.
# Baseline is the origin/main merge-base, so every PR that touches a schema must
# bump (not just the first since a release); an unresolvable baseline is a hard
# error, never a silent skip (a v* tag predating the CRDs is how #932 slipped through).
["controller:check:crd-schema-generation"]
dir = "{{config_root}}"
sources = ["deploy/helm/platform/crds/*.yaml"]
usage = 'flag "--baseline <ref>" help="Git ref to compare against (default: origin/main merge-base)"'
run = '''
#!/usr/bin/env bash
set -euo pipefail
if [ -n "${usage_baseline:-}" ]; then
  base_ref="$usage_baseline"
elif base_ref=$(git merge-base HEAD origin/main 2>/dev/null); then
  :
elif base_ref=$(git merge-base HEAD main 2>/dev/null); then
  :
else
  echo "crd-generation: cannot resolve a baseline (no origin/main or main reachable); pass --baseline <ref>" >&2
  exit 1
fi
if ! git rev-parse -q --verify "$base_ref^{commit}" >/dev/null; then
  echo "crd-generation: baseline ref '$base_ref' does not resolve to a commit" >&2
  exit 1
fi
crds=deploy/helm/platform/crds
gen='.metadata.annotations["agent-platform.ai/crd-schema-generation"] // "0"'
status=0
for f in "$crds"/*.yaml; do
  base="$base_ref:$crds/$(basename "$f")"
  if ! git cat-file -e "$base" 2>/dev/null; then
    echo "crd-generation: $(basename "$f") is new since $base_ref — no prior schema to compare"
    continue
  fi
  if [ "$(git show "$base" | yq '.spec')" = "$(yq '.spec' "$f")" ]; then
    continue
  fi
  new_gen=$(yq "$gen" "$f")
  old_gen=$(git show "$base" | yq "$gen")
  if [ "$new_gen" -le "$old_gen" ]; then
    echo "crd-generation: $(basename "$f") .spec changed vs $base_ref but agent-platform.ai/crd-schema-generation is still $new_gen (was $old_gen) — bump the constant in api/v1/schema_generation.go and its +kubebuilder:metadata:annotations marker, then run mise run controller:generate (ADR-068)" >&2
    status=1
  fi
done
exit $status
'''

["controller:check:vet"]
dir = "{{config_root}}/packages/controller"
run = "go vet ./..."
sources = ["**/*.go", "go.mod", "go.sum"]

["controller:check:staticcheck"]
dir = "{{config_root}}/packages/controller"
run = "staticcheck ./..."
sources = ["**/*.go", "go.mod", "go.sum"]

["controller:check:build"]
dir = "{{config_root}}/packages/controller"
run = "go build -o dist/ ./..."
sources = ["**/*.go", "go.mod", "go.sum"]

["controller:fix"]
depends = ["controller:fix:*"]

["controller:fix:fmt"]
dir = "{{config_root}}/packages/controller"
run = "gofmt -s -w ."

["controller:test"]
dir = "{{config_root}}/packages/controller"
run = "go test ./..."

["controller:scan"]
depends = ["controller:scan:*"]

["controller:scan:govulncheck"]
description = "Check the Go call graph against the vuln DB"
dir = "{{config_root}}/packages/controller"
sources = ["**/*.go", "go.mod", "go.sum"]
usage = 'flag "--json" help="Emit govulncheck streaming JSON instead of text"'
run = '''
#!/usr/bin/env bash
set -uo pipefail
if [[ "${usage_json:-false}" == "true" ]]; then
  exec govulncheck -format json ./...
fi
exec govulncheck ./...
'''

["controller:image"]
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
[ -n "${SKIP_IMAGE_BUILD:-}" ] && exit 0
docker build -t platform-controller:latest packages/controller/
'''

["controller:scan:trivy"]
dir = "{{config_root}}"
usage = '''
flag "--json" help="Emit Trivy JSON (exit 0) instead of failing on findings"
flag "--tag <tag>" help="Scan quay.io/dam-agents/controller:<tag> instead of building locally"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail
if [ -n "${usage_tag:-}" ]; then
  image="quay.io/dam-agents/controller:${usage_tag}"
else
  {{ mise_bin }} run controller:image
  image="platform-controller:latest"
fi
if [[ "${usage_json:-false}" == "true" ]]; then
  exec trivy image --quiet --format json "$image"
fi
exec trivy image --quiet --exit-code 1 "$image"
'''

["controller:build"]
dir = "{{config_root}}/packages/controller"
run = "CGO_ENABLED=0 go build -o dist/controller ."
