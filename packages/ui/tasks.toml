["ui:setup"]
dir = "{{config_root}}"
depends = ["common:setup:pnpm"]

["ui:check"]
depends = ["ui:check:*"]

["ui:check:tsc"]
dir = "{{config_root}}/packages/ui"
depends = ["ui:setup"]
run = "pnpm exec tsc --noEmit"
sources = ["src/**/*.ts", "src/**/*.tsx", "tsconfig.json", "../dev-config/tsconfig.base.json"]

["ui:check:lint"]
dir = "{{config_root}}/packages/ui"
depends = ["common:setup:pnpm"]
run = "pnpm exec eslint ."
sources = ["src/**/*.ts", "src/**/*.tsx", "eslint.config.js", "../dev-config/eslint.base.js"]

["ui:check:format"]
dir = "{{config_root}}/packages/ui"
depends = ["common:setup:pnpm"]
run = "pnpm exec prettier --check 'src/**/*.{ts,tsx,css}'"
sources = ["src/**/*.ts", "src/**/*.tsx", "src/**/*.css", "../../.prettierrc"]

["ui:fix"]
depends = ["ui:fix:*"]

["ui:fix:lint"]
dir = "{{config_root}}/packages/ui"
depends = ["common:setup:pnpm"]
run = "pnpm exec eslint --fix ."

["ui:fix:format"]
dir = "{{config_root}}/packages/ui"
depends = ["common:setup:pnpm"]
run = "pnpm exec prettier --write 'src/**/*.{ts,tsx,css}'"

["ui:test"]
description = "Run UI unit tests"
dir = "{{config_root}}"
run = 'pnpm --filter platform-ui exec vitest run'

["ui:run"]
dir = "{{config_root}}"
run = "pnpm ui"

["ui:image"]
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
[ -n "${SKIP_IMAGE_BUILD:-}" ] && exit 0
docker build -f packages/ui/Dockerfile -t platform-ui:latest .
'''

["ui:scan:trivy"]
dir = "{{config_root}}"
usage = 'flag "--tag <tag>" help="Scan quay.io/dam-agents/ui:<tag> instead of building locally"'
run = '''
#!/usr/bin/env bash
set -euo pipefail
if [ -n "${usage_tag:-}" ]; then
  image="quay.io/dam-agents/ui:${usage_tag}"
else
  {{ mise_bin }} run ui:image
  image="platform-ui:latest"
fi
exec trivy image --quiet --format json "$image"
'''
