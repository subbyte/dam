["agents:codex:image"]
description = "Build the codex agent image"
dir = "{{config_root}}"
depends = ["platform-base:image"]
run = '''
#!/usr/bin/env bash
[ -n "${SKIP_IMAGE_BUILD:-}" ] && exit 0
docker build -t platform-codex:latest packages/agents/codex
'''

["agents:codex:scan:trivy"]
dir = "{{config_root}}"
usage = 'flag "--tag <tag>" help="Scan quay.io/dam-agents/codex:<tag> instead of building locally"'
run = '''
#!/usr/bin/env bash
set -euo pipefail
if [ -n "${usage_tag:-}" ]; then
  image="quay.io/dam-agents/codex:${usage_tag}"
else
  {{ mise_bin }} run agents:codex:image
  image="platform-codex:latest"
fi
exec trivy image --quiet --format json "$image"
'''
