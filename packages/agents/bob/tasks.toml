["agents:bob:image"]
description = "Build the bob agent image, or reuse it from the registry when its source is unchanged"
dir = "{{config_root}}"
depends = ["platform-base:image"]
run = "scripts/resolve-image.sh build-or-reuse bob -- packages/agents/bob"

["agents:bob:scan"]
depends = ["agents:bob:scan:*"]

["agents:bob:scan:trivy"]
dir = "{{config_root}}"
usage = '''
flag "--json" help="Emit Trivy JSON (exit 0) instead of failing on findings"
flag "--tag <tag>" help="Scan quay.io/dam-agents/bob:<tag> instead of building locally"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail
if [ -n "${usage_tag:-}" ]; then
  image="quay.io/dam-agents/bob:${usage_tag}"
else
  {{ mise_bin }} run agents:bob:image
  image="platform-bob:latest"
fi
if [[ "${usage_json:-false}" == "true" ]]; then
  exec trivy image --quiet --format json "$image"
fi
exec trivy image --quiet --exit-code 1 "$image"
'''
