["agents:google-workspace:image"]
description = "Build the google-workspace agent image"
dir = "{{config_root}}"
depends = ["platform-base:image"]
run = '''
#!/usr/bin/env bash
[ -n "${SKIP_IMAGE_BUILD:-}" ] && exit 0
docker build -t platform-google-workspace-agent:latest packages/agents/google-workspace
'''

["agents:google-workspace:scan"]
depends = ["agents:google-workspace:scan:*"]

["agents:google-workspace:scan:trivy"]
dir = "{{config_root}}"
raw = true
usage = '''
flag "--json" help="Emit Trivy JSON (exit 0) instead of failing on findings"
flag "--tag <tag>" help="Scan quay.io/dam-agents/google-workspace-agent:<tag> instead of building locally"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail
if [ -n "${usage_tag:-}" ]; then
  image="quay.io/dam-agents/google-workspace-agent:${usage_tag}"
else
  {{ mise_bin }} run agents:google-workspace:image
  image="platform-google-workspace-agent:latest"
fi
if [[ "${usage_json:-false}" == "true" ]]; then
  exec trivy image --quiet --format json "$image"
fi
exec trivy image --quiet --exit-code 1 "$image"
'''
