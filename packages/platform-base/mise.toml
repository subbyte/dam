[settings]
lockfile = true
minimum_release_age = "7d"

[tools]
# Exact pin (not "24") so minimum_release_age doesn't gate it: node's bundled npm
# vendors the patched brace-expansion/tar/picomatch/ip-address/minimatch only from
# 24.18.0 (npm 11.16.0) onward. Bump in lockstep when patching those CVEs.
node = "24.18.0"
gh = "latest"
ripgrep = "latest"
fd = "latest"
jq = "latest"
uv = "latest"
# Kubernetes/OpenShift connection (#2314): kubeconfig lands via a file
# contribution; these make it usable out of the box.
kubectl = "latest"
oc = "latest"
"npm:@googleworkspace/cli" = "latest"
