["agent-runtime-api:check"]
depends = ["agent-runtime-api:check:*"]

["agent-runtime-api:check:tsc"]
dir = "{{config_root}}/packages/agent-runtime-api"
depends = ["common:setup:pnpm"]
run = "pnpm exec tsc --noEmit"
sources = ["src/**/*.ts", "tsconfig.json", "../dev-config/tsconfig.base.json"]

["agent-runtime-api:check:lint"]
dir = "{{config_root}}/packages/agent-runtime-api"
depends = ["common:setup:pnpm"]
run = "pnpm exec eslint ."
sources = ["src/**/*.ts", "eslint.config.js", "../dev-config/eslint.base.js"]

["agent-runtime-api:check:format"]
dir = "{{config_root}}/packages/agent-runtime-api"
depends = ["common:setup:pnpm"]
run = "pnpm exec prettier --check 'src/**/*.ts'"
sources = ["src/**/*.ts", "../../.prettierrc"]

["agent-runtime-api:fix"]
depends = ["agent-runtime-api:fix:*"]

["agent-runtime-api:fix:lint"]
dir = "{{config_root}}/packages/agent-runtime-api"
depends = ["common:setup:pnpm"]
run = "pnpm exec eslint --fix ."

["agent-runtime-api:fix:format"]
dir = "{{config_root}}/packages/agent-runtime-api"
depends = ["common:setup:pnpm"]
run = "pnpm exec prettier --write 'src/**/*.ts'"
