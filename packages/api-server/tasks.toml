["api-server:gen:proto"]
description = "Regenerate ts-proto types from proto/external_auth.proto"
dir = "{{config_root}}/packages/api-server"
run = '''
mkdir -p src/proto-gen
node_modules/.bin/grpc_tools_node_protoc \
  --plugin=protoc-gen-ts_proto=node_modules/.bin/protoc-gen-ts_proto \
  --ts_proto_out=src/proto-gen \
  --ts_proto_opt=outputServices=grpc-js,esModuleInterop=true,useExactTypes=false,unknownFields=true,outputJsonMethods=false,outputClientImpl=false,fileSuffix=.gen \
  --proto_path=proto \
  proto/external_auth.proto
'''

["api-server:test"]
description = "Run api-server unit tests"
dir = "{{config_root}}"
run = 'pnpm --filter api-server exec vitest run --config vitest.unit.config.ts'

["api-server:e2e"]
description = "Run api-server e2e tests (spins up test cluster, runs tests, tears down)"
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
set -eo pipefail

VM_NAME="platform-k3s-test"
if [ -n "${IS_SANDBOX:-}" ]; then
  KUBECONFIG="/etc/rancher/k3s/k3s.yaml"
else
  KUBECONFIG="$HOME/.lima/$VM_NAME/copied-from-guest/kubeconfig.yaml"
fi

# On any failure, dump cluster diagnostics to aid debugging.
dump_diagnostics() {
  local exit_code=$?
  if [ $exit_code -ne 0 ] && [ -f "$KUBECONFIG" ]; then
    echo ""
    echo "=== FAILURE: dumping cluster diagnostics ==="
    echo ""
    echo "--- Nodes ---"
    kubectl --kubeconfig="$KUBECONFIG" get nodes -o wide 2>&1 || true
    echo ""
    echo "--- Pods (all namespaces) ---"
    kubectl --kubeconfig="$KUBECONFIG" get pods -A -o wide 2>&1 || true
    echo ""
    echo "--- Events (recent, all namespaces) ---"
    kubectl --kubeconfig="$KUBECONFIG" get events -A --sort-by=.lastTimestamp 2>&1 | tail -50 || true
    echo ""
    echo "--- Describe not-ready pods ---"
    kubectl --kubeconfig="$KUBECONFIG" get pods -A -o json 2>/dev/null \
      | jq -r '.items[] | select(.status.phase != "Running" or ([.status.containerStatuses[]?.ready] | all | not)) | "\(.metadata.namespace) \(.metadata.name)"' \
      | while read -r ns name; do
          echo "### $ns/$name ###"
          kubectl --kubeconfig="$KUBECONFIG" describe pod -n "$ns" "$name" 2>&1 || true
          echo ""
        done
    echo ""
    echo "--- Logs from Platform pods ---"
    for ns in default platform-agents; do
      for pod in $(kubectl --kubeconfig="$KUBECONFIG" get pods -n "$ns" -o name 2>/dev/null); do
        echo "### $ns/$pod (current) ###"
        kubectl --kubeconfig="$KUBECONFIG" logs -n "$ns" "$pod" --all-containers --tail=200 2>&1 || true
        echo "### $ns/$pod (previous) ###"
        kubectl --kubeconfig="$KUBECONFIG" logs -n "$ns" "$pod" --all-containers --tail=200 --previous 2>&1 || true
        echo ""
      done
    done
    echo "=== End diagnostics ==="
  fi
  exit $exit_code
}
trap dump_diagnostics EXIT

# Always start from a clean slate — a previous run may have died before
# globalTeardown could fire, leaving a half-provisioned VM whose kubeconfig
# never gets written. cluster:delete --force is a no-op when nothing's there.
if [ -z "${IS_SANDBOX:-}" ]; then
  echo "Nuking any pre-existing test cluster..."
  mise run cluster:delete -- --vm-name="$VM_NAME" --force
fi

INSTALL_ARGS=(--lima-template=deploy/lima-k3s-test.yaml --set=domain=localtest.me --set=port=5555 --set=controller.agent.templateDefaults.storageSize=1Gi --no-restart)
if [ -z "${IS_SANDBOX:-}" ]; then
  INSTALL_ARGS+=(--vm-name="$VM_NAME")
fi
mise run cluster:install -- "${INSTALL_ARGS[@]}"

mise exec -- pnpm --filter api-server exec vitest run
'''
