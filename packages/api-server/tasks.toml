["api-server:check"]
depends = ["api-server:check:*"]

["api-server:check:tsc"]
dir = "{{config_root}}/packages/api-server"
depends = ["common:setup:pnpm"]
run = "pnpm exec tsc --noEmit"
sources = ["src/**/*.ts", "tsconfig.json", "../dev-config/tsconfig.base.json"]

["api-server:check:lint"]
dir = "{{config_root}}/packages/api-server"
depends = ["common:setup:pnpm"]
run = "pnpm exec eslint ."
sources = ["src/**/*.ts", "eslint.config.js", "../dev-config/eslint.base.js"]

["api-server:check:format"]
dir = "{{config_root}}/packages/api-server"
depends = ["common:setup:pnpm"]
run = "pnpm exec prettier --check 'src/**/*.ts' '!src/proto-gen/**'"
sources = ["src/**/*.ts", "../../.prettierrc"]

["api-server:fix"]
depends = ["api-server:fix:*"]

["api-server:fix:lint"]
dir = "{{config_root}}/packages/api-server"
depends = ["common:setup:pnpm"]
run = "pnpm exec eslint --fix ."

["api-server:fix:format"]
dir = "{{config_root}}/packages/api-server"
depends = ["common:setup:pnpm"]
run = "pnpm exec prettier --write 'src/**/*.ts' '!src/proto-gen/**'"

["api-server:gen:proto"]
description = "Regenerate ts-proto types from proto/external_auth.proto"
dir = "{{config_root}}/packages/api-server"
run = '''
mkdir -p src/proto-gen
node_modules/.bin/grpc_tools_node_protoc \
  --plugin=protoc-gen-ts_proto=node_modules/.bin/protoc-gen-ts_proto \
  --ts_proto_out=src/proto-gen \
  --ts_proto_opt=outputServices=grpc-js,esModuleInterop=true,useExactTypes=false,unknownFields=true,outputJsonMethods=false,outputClientImpl=false,fileSuffix=.gen \
  --proto_path=proto \
  proto/external_auth.proto
'''

["api-server:test"]
description = "Run api-server unit tests"
dir = "{{config_root}}"
run = 'pnpm --filter api-server exec vitest run --config vitest.unit.config.ts'

["api-server:dev"]
dir = "{{config_root}}/packages/api-server"
depends = ["common:setup:pnpm"]
run = "pnpm exec tsx watch --env-file=.env src/index.ts"

["api-server:image"]
dir = "{{config_root}}"
run = '''
#!/usr/bin/env bash
[ -n "${SKIP_IMAGE_BUILD:-}" ] && exit 0
docker build -f packages/api-server/Dockerfile -t platform-api-server:latest .
'''

["api-server:scan"]
depends = ["api-server:scan:*"]

["api-server:scan:trivy"]
dir = "{{config_root}}"
usage = '''
flag "--json" help="Emit Trivy JSON (exit 0) instead of failing on findings"
flag "--tag <tag>" help="Scan quay.io/dam-agents/api-server:<tag> instead of building locally"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail
if [ -n "${usage_tag:-}" ]; then
  image="quay.io/dam-agents/api-server:${usage_tag}"
else
  {{ mise_bin }} run api-server:image
  image="platform-api-server:latest"
fi
if [[ "${usage_json:-false}" == "true" ]]; then
  exec trivy image --quiet --format json "$image"
fi
exec trivy image --quiet --exit-code 1 "$image"
'''
