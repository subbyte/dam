["cli:check"]
depends = ["cli:check:*"]

["cli:check:tsc"]
dir = "{{config_root}}/packages/cli"
depends = ["common:setup:pnpm"]
run = "pnpm exec tsc --noEmit"
sources = ["src/**/*.ts", "tsconfig.json", "../dev-config/tsconfig.base.json"]

["cli:check:lint"]
dir = "{{config_root}}/packages/cli"
depends = ["common:setup:pnpm"]
run = "pnpm exec eslint ."
sources = ["src/**/*.ts", "eslint.config.js", "../dev-config/eslint.base.js"]

["cli:check:format"]
dir = "{{config_root}}/packages/cli"
depends = ["common:setup:pnpm"]
run = "pnpm exec prettier --check 'src/**/*.ts'"
sources = ["src/**/*.ts", "../../.prettierrc"]

["cli:fix"]
depends = ["cli:fix:*"]

["cli:fix:lint"]
dir = "{{config_root}}/packages/cli"
depends = ["common:setup:pnpm"]
run = "pnpm exec eslint --fix ."

["cli:fix:format"]
dir = "{{config_root}}/packages/cli"
depends = ["common:setup:pnpm"]
run = "pnpm exec prettier --write 'src/**/*.ts'"

["cli:test"]
description = "Run cli unit tests"
dir = "{{config_root}}"
run = 'pnpm --filter @dam-agents/cli exec vitest run'

["cli:build"]
description = "Build the dam CLI to dist/bin.js"
dir = "{{config_root}}/packages/cli"
depends = ["common:setup:pnpm"]
run = "pnpm exec tsup"

["cli:run"]
description = "Build the dam CLI and run it from dist (pass args after --)"
dir = "{{config_root}}/packages/cli"
depends = ["cli:build"]
run = "node dist/bin.js"
